<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - eFootball HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --primary: #fbbf24; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 25px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; color: var(--primary); text-decoration: none; }

        /* Slider Design */
        .event-slider {
            width: 100%;
            height: 200px;
            overflow: hidden;
            border-radius: 15px;
            border: 2px solid var(--primary);
            position: relative;
            background: #121e36;
        }

        .slider-track {
            display: flex;
            transition: transform 0.5s ease-in-out;
            height: 100%;
        }

        .slider-track img {
            width: 100%;
            flex-shrink: 0;
            object-fit: cover;
            height: 100%;
        }

        .dots-container {
            display: flex;
            justify-content: center;
            margin-top: 15px;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #334155;
            border-radius: 50%;
            transition: 0.3s;
        }

        .dot.active { background: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="font-size: 18px; color: var(--primary);">ACTIVE EVENTS</h2>
    </div>

    <div class="event-slider">
        <div id="slider-track" class="slider-track">
            </div>
    </div>

    <div id="dots-container" class="dots-container">
        </div>

<script>
    let currentIndex = 0;
    let images = [];

    async function loadEvents() {
        const track = document.getElementById('slider-track');
        const dotsContainer = document.getElementById('dots-container');

        try {
            const response = await fetch('event.json');
            const data = await response.json();
            images = data.events;

            if (images.length === 0) {
                track.innerHTML = "<p style='padding:20px;'>No events active!</p>";
                return;
            }

            // Create images and dots
            images.forEach((event, index) => {
                const img = document.createElement('img');
                img.src = event.img;
                track.appendChild(img);

                const dot = document.createElement('div');
                dot.className = index === 0 ? 'dot active' : 'dot';
                dotsContainer.appendChild(dot);
            });

            // Start auto slide
            setInterval(autoSlide, 3000); // 3 second por por shorbe

        } catch (e) {
            track.innerHTML = "Error loading events!";
        }
    }

    function autoSlide() {
        const track = document.getElementById('slider-track');
        const dots = document.querySelectorAll('.dot');
        
        currentIndex++;
        if (currentIndex >= images.length) {
            currentIndex = 0;
        }

        track.style.transform = `translateX(-${currentIndex * 100}%)`;
        
        // Update dots
        dots.forEach(dot => dot.classList.remove('active'));
        dots[currentIndex].classList.add('active');
    }

    window.onload = loadEvents;
</script>
</body>
</html>
