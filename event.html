<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - eFootball HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --primary: #fbbf24; --text: #ffffff; --card: #121e36; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; color: var(--primary); text-decoration: none; }

        /* Slider Section */
        .slider-container { margin-bottom: 30px; }
        .event-slider {
            width: 100%;
            height: 200px;
            overflow: hidden;
            border-radius: 12px;
            border: 2px solid var(--primary);
            position: relative;
            background: var(--card);
            touch-action: pan-y; /* User scroll korle jate page theke na jay */
        }

        .slider-track {
            display: flex;
            transition: transform 0.4s ease-in-out;
            height: 100%;
        }

        .slider-track img {
            width: 100%;
            flex-shrink: 0;
            object-fit: cover;
            height: 100%;
            border-radius: 10px;
        }

        .dots { display: flex; justify-content: center; margin-top: 10px; gap: 6px; }
        .dot { width: 8px; height: 8px; background: #334155; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--primary); width: 20px; border-radius: 10px; }

        /* Niche Niche Sajanor Jonno (Vertical List) */
        .vertical-events { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .v-card {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1e2d4d;
            background: var(--card);
        }
        .v-card img { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="font-size: 18px; color: var(--primary);">ACTIVE EVENTS</h2>
    </div>

    <div class="slider-container">
        <div class="event-slider" id="slider">
            <div id="slider-track" class="slider-track"></div>
        </div>
        <div id="dots" class="dots"></div>
    </div>

    <script>
    let currentIndex = 0;
    let images = [];
    let slideInterval;
    let startX = 0;
    let endX = 0;

    async function loadEvents() {
        const track = document.getElementById('slider-track');
        const dotsContainer = document.getElementById('dots');

        try {
            const response = await fetch('event.json');
            const data = await response.json();
            images = data.events;

            if (images.length === 0) return;

            images.forEach((event, index) => {
                const img = document.createElement('img');
                img.src = event.img;
                track.appendChild(img);

                const dot = document.createElement('div');
                dot.className = index === 0 ? 'dot active' : 'dot';
                dotsContainer.appendChild(dot);
            });

            startAutoSlide();
            setupTouchEvents();

        } catch (e) {
            track.innerHTML = "<p style='text-align:center;'>Loading failed!</p>";
        }
    }

    function startAutoSlide() {
        clearInterval(slideInterval); // Ager auto-slide bondho korbe
        slideInterval = setInterval(nextSlide, 3000); // 3 second por por change hobe
    }

    function nextSlide() {
        currentIndex++;
        if (currentIndex >= images.length) currentIndex = 0;
        updateSlider();
    }

    function prevSlide() {
        currentIndex--;
        if (currentIndex < 0) currentIndex = images.length - 1;
        updateSlider();
    }

    function updateSlider() {
        const track = document.getElementById('slider-track');
        const dots = document.querySelectorAll('.dot');
        
        track.style.transform = `translateX(-${currentIndex * 100}%)`;
