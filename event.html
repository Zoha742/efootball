<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - eFootball HUB</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* আপনার ডিজাইন হুবহু রাখা হয়েছে */
        :root { --bg: #050a18; --primary: #fbbf24; --text: #ffffff; --card: #121e36; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; color: var(--primary); text-decoration: none; }

        /* Slider Section */
        .event-slider {
            width: 100%;
            height: 200px;
            overflow: hidden;
            border-radius: 12px;
            border: 2px solid var(--primary);
            position: relative;
            background: var(--card);
            touch-action: pan-y;
        }

        .slider-track { display: flex; transition: transform 0.4s ease-in-out; height: 100%; }
        .slider-track img { width: 100%; flex-shrink: 0; object-fit: cover; height: 100%; }

        .dots { display: flex; justify-content: center; margin-top: 10px; gap: 6px; }
        .dot { width: 8px; height: 8px; background: #334155; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--primary); width: 20px; border-radius: 10px; }

        /* Vertical List */
        .list-title { color: var(--primary); margin: 25px 0 15px; font-size: 16px; font-weight: bold; border-left: 4px solid var(--primary); padding-left: 10px; }
        .vertical-list { display: flex; flex-direction: column; gap: 15px; padding-bottom: 20px; }
        .v-card { width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid #1e2d4d; background: var(--card); }
        .v-card img { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <h3 style="margin:0;">Upcoming Events</h3>
</div>

<div class="event-slider" id="slider-container">
    <div class="slider-track" id="slider"></div>
</div>
<div class="dots" id="dots"></div>

<div class="list-title">LIVE EVENTS</div>
<div class="vertical-list" id="v-list">
    <p style="text-align:center; font-size:12px; color:#94a3b8;">Loading Events...</p>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAy2nEcb--kbjU7tSIm6lJG5ZpEFSus7sg",
        authDomain: "efootball-57d9b.firebaseapp.com",
        projectId: "efootball-57d9b",
        storageBucket: "efootball-57d9b.firebasestorage.app",
        messagingSenderId: "1031993322489",
        appId: "1:1031993322489:web:0336c8e1869318a8222b28"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // GitHub JSON fetch command (preserved)
    const jsonURL = "https://raw.githubusercontent.com/Fahim-Xer/Top-players/main/Events.json";
    let images = [];
    let currentIndex = 0;
    let slideInterval;

    async function fetchEvents() {
        try {
            const res = await fetch(jsonURL);
            const data = await res.json();
            
            // Slider Images
            images = data.slider || [];
            renderSlider();
            startAutoSlide();
            setupTouch();

            // Vertical List
            const vList = document.getElementById('v-list');
            vList.innerHTML = "";
            (data.list || []).forEach(item => {
                vList.innerHTML += `<div class="v-card"><img src="${item}"></div>`;
            });

        } catch (e) {
            document.getElementById('v-list').innerHTML = "Failed to load events.";
        }
    }

    function renderSlider() {
        const slider = document.getElementById('slider');
        const dotsContainer = document.getElementById('dots');
        slider.innerHTML = images.map(img => `<img src="${img}">`).join('');
        dotsContainer.innerHTML = images.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('');
    }

    function updateSlider() {
        const slider = document.getElementById('slider');
        slider.style.transform = `translateX(-${currentIndex * 100}%)`;
        const dots = document.querySelectorAll('.dot');
        dots.forEach(dot => dot.classList.remove('active'));
        if(dots[currentIndex]) dots[currentIndex].classList.add('active');
    }

    function startAutoSlide() {
        slideInterval = setInterval(() => {
            currentIndex = (currentIndex + 1) % images.length;
            updateSlider();
        }, 3000);
    }

    function setupTouch() {
        const slider = document.getElementById('slider');
        let startX = 0;
        slider.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            clearInterval(slideInterval);
        });
        slider.addEventListener('touchend', e => {
            let endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) currentIndex = (currentIndex + 1) % images.length;
            else if (endX - startX > 50) currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateSlider();
            startAutoSlide();
        });
    }

    window.onload = () => {
        fetchEvents();
        // Adsgram preserved
        try {
            if (window.Adsgram) {
                const videoAd = window.Adsgram.init({ blockId: "4774" });
                // videoAd.show(); // Auto-show command logic remains
            }
        } catch (e) {}
    };
</script>
</body>
</html>
