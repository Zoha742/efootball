<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - eFootball HUB</title>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --primary: #fbbf24; --text: #ffffff; --card: #121e36; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; color: var(--primary); text-decoration: none; }

        /* Slider Section - আপনার অরিজিনাল স্টাইল */
        .event-slider {
            width: 100%;
            height: 200px;
            overflow: hidden;
            border-radius: 12px;
            border: 2px solid var(--primary);
            position: relative;
            background: var(--card);
            touch-action: pan-y;
        }
        .slider-track { display: flex; transition: transform 0.5s ease-in-out; height: 100%; }
        .slider-item { min-width: 100%; height: 100%; }
        .slider-item img { width: 100%; height: 100%; object-fit: cover; }

        .dots { display: flex; justify-content: center; gap: 8px; margin-top: 12px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #1e2d4d; transition: 0.3s; }
        .dot.active { background: var(--primary); transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="font-size: 18px; color: var(--primary);">UPCOMING EVENTS</h2>
    </div>

    <div class="event-slider" id="slider">
        <div class="slider-track" id="slider-track">
            </div>
    </div>

    <div class="dots" id="dots"></div>

    <div id="banner-container" style="display: flex; justify-content: center; margin-top: 25px; padding-bottom: 20px;"></div>

<script>
    let currentIndex = 0;
    let images = [];
    let slideInterval;
    let startX = 0;

    // আপনার অরিজিনাল fetchEvents ফাংশন (কোনো পরিবর্তন করা হয়নি)
    async function fetchEvents() {
        const track = document.getElementById('slider-track');
        const dotsContainer = document.getElementById('dots');

        try {
            const response = await fetch('event.json');
            const data = await response.json();
            images = data.events || data;

            if (images.length === 0) throw new Error("No events found");

            track.innerHTML = images.map(img => `
                <div class="slider-item">
                    <img src="${img.image}" alt="Event">
                </div>
            `).join('');

            images.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = i === 0 ? 'dot active' : 'dot';
                dotsContainer.appendChild(dot);
            });

            startAutoSlide();
            setupTouch();

        } catch (e) {
            track.innerHTML = `<p style='text-align:center; padding:20px; color:red;'>${e.message}</p>`;
        }
    }

    function startAutoSlide() {
        slideInterval = setInterval(() => {
            currentIndex = (currentIndex + 1) % images.length;
            updateSlider();
        }, 3000);
    }

    function updateSlider() {
        const track = document.getElementById('slider-track');
        const dots = document.querySelectorAll('.dot');
        track.style.transform = `translateX(-${currentIndex * 100}%)`;
        dots.forEach(d => d.classList.remove('active'));
        if(dots[currentIndex]) dots[currentIndex].classList.add('active');
    }

    function setupTouch() {
        const slider = document.getElementById('slider');
        slider.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            clearInterval(slideInterval);
        });
        slider.addEventListener('touchend', e => {
            let endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) currentIndex = (currentIndex + 1) % images.length;
            else if (endX - startX > 50) currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateSlider();
            startAutoSlide();
        });
    }

    // উইন্ডো লোড হওয়ার সময় আপনার স্লাইডার এবং অ্যাডস একসাথে কল হবে
    window.onload = () => {
        fetchEvents(); // আপনার স্লাইডার ফাংশন

        // অ্যাডস লোড করার লজিক (নিচে যোগ করা হয়েছে)
        setTimeout(() => {
            try {
                if (window.Adsgram) {
                    const bannerAd = window.Adsgram.init({ blockId: "আপনার_ব্যানার_BLOCK_ID" });
                    bannerAd.show().catch((err) => console.log("Banner Error"));

                    const videoAd = window.Adsgram.init({ blockId: "আপনার_ভিডিও_BLOCK_ID" });
                    videoAd.show().catch((err) => console.log("Video Error"));
                }
            } catch (e) {
                console.log("Adsgram issue");
            }
        }, 1000);
    };
</script>
</body>
</html>
