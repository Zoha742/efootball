<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Management - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --primary: #3b82f6; --text: #ffffff; --border: #1e2d4d; --red: #ef4444; --green: #22c55e; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }
        
        /* Top Bar - Design Unchanged */
        .top-bar { display: flex; align-items: center; padding: 15px 20px; background: rgba(18, 30, 54, 0.7); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .top-bar a { color: white; text-decoration: none; margin-right: 15px; font-size: 18px; }
        .container { padding: 20px; }

        .wallet-item { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; position: relative; }
        .wallet-item label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { position: relative; display: flex; align-items: center; gap: 10px; }
        input { background: #0f172a; border: 1px solid var(--border); border-radius: 12px; padding: 14px 15px; color: white; font-size: 14px; width: 100%; outline: none; transition: 0.3s; }
        input:disabled { opacity: 0.7; color: #94a3b8; }
        .action-btn { background: #1e293b; border: none; color: white; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-save { background: var(--primary); width: auto; padding: 0 20px; font-weight: bold; font-size: 13px; display: none; }
        .btn-delete { color: var(--red); }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="profile.html"><i class="fas fa-chevron-left"></i></a>
        <span>Wallet Management</span>
    </div>

    <div class="container">
        <div class="wallet-item">
            <label><i class="fas fa-id-card"></i> eFootball ID</label>
            <div class="input-group">
                <input type="text" id="efootball-input" placeholder="Enter ID" disabled>
                <button class="action-btn" id="efootball-edit-btn" onclick="enableEdit('efootball')"><i class="fas fa-edit"></i></button>
                <button class="action-btn btn-save" id="efootball-save-btn" onclick="saveField('efootball')">SAVE</button>
                <button class="action-btn btn-delete" onclick="clearField('efootball')"><i class="fas fa-trash-alt"></i></button>
            </div>
        </div>

        <div class="wallet-item">
            <label><i class="fas fa-wallet"></i> Binance ID (Optional)</label>
            <div class="input-group">
                <input type="text" id="binance-input" placeholder="Enter Binance ID" disabled>
                <button class="action-btn" id="binance-edit-btn" onclick="enableEdit('binance')"><i class="fas fa-edit"></i></button>
                <button class="action-btn btn-save" id="binance-save-btn" onclick="saveField('binance')">SAVE</button>
                <button class="action-btn btn-delete" onclick="clearField('binance')"><i class="fas fa-trash-alt"></i></button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAy2nEcb--kbjU7tSIm6lJG5ZpEFSus7sg",
            authDomain: "efootball-57d9b.firebaseapp.com",
            projectId: "efootball-57d9b",
            storageBucket: "efootball-57d9b.firebasestorage.app",
            messagingSenderId: "1031993322489",
            appId: "1:1031993322489:web:0336c8e1869318a8222b28"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tg = window.Telegram.WebApp;
        const userId = String(tg.initDataUnsafe?.user?.id || "774900");

        // ১. লোড হওয়ার সময় ফায়ারবেস থেকে ওয়ালেট ডেটা আনা
        window.onload = function() {
            db.ref('users/' + userId + '/wallets').once('value').then((snap) => {
                if (snap.exists()) {
                    const data = snap.val();
                    if(data.efootball) document.getElementById('efootball-input').value = data.efootball;
                    if(data.binance) document.getElementById('binance-input').value = data.binance;
                }
            });
        };

        function enableEdit(type) {
            document.getElementById(type + '-input').disabled = false;
            document.getElementById(type + '-input').focus();
            document.getElementById(type + '-edit-btn').style.display = 'none';
            document.getElementById(type + '-save-btn').style.display = 'flex';
        }

        // ২. ফায়ারবেস সার্ভারে সেভ করা
        function saveField(type) {
            const address = document.getElementById(type + '-input').value.trim();
            if (!address) {
                alert("Please enter an address!");
                return;
            }

            db.ref('users/' + userId + '/wallets/' + type).set(address).then(() => {
                document.getElementById(type + '-input').disabled = true;
                document.getElementById(type + '-edit-btn').style.display = 'flex';
                document.getElementById(type + '-save-btn').style.display = 'none';
                alert(type.toUpperCase() + " Saved to Firebase!");
            });
        }

        // ৩. ফায়ারবেস থেকে ডিলিট করা
        function clearField(type) {
            if (confirm("Delete this address?")) {
                db.ref('users/' + userId + '/wallets/' + type).remove().then(() => {
                    document.getElementById(type + '-input').value = "";
                    document.getElementById(type + '-input').disabled = true;
                    document.getElementById(type + '-edit-btn').style.display = 'flex';
                    document.getElementById(type + '-save-btn').style.display = 'none';
                    alert("Deleted!");
                });
            }
        }
    </script>
</body>
</html>
