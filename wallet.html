<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Setup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --primary: #3b82f6; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        .top-bar { display: flex; align-items: center; padding: 15px; background: rgba(18, 30, 54, 0.7); border-bottom: 1px solid #1e2d4d; }
        .top-bar a { color: white; text-decoration: none; font-size: 18px; margin-right: 15px; }
        .container { padding: 20px; }
        .input-box { width: 100%; background: var(--card); border: 1px solid #1e2d4d; padding: 15px; border-radius: 12px; color: white; outline: none; margin-top: 10px; box-sizing: border-box; }
        .btn-save { width: 100%; background: var(--primary); border: none; padding: 15px; border-radius: 12px; color: white; font-weight: bold; margin-top: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="profile.html"><i class="fas fa-chevron-left"></i></a>
        <span>Wallet Setup</span>
    </div>
    <div class="container">
        <h3>TON Wallet Address</h3>
        <p style="font-size: 13px; color: #94a3b8;">পেমেন্ট নেওয়ার জন্য আপনার TON ওয়ালেট অ্যাড্রেসটি সাবমিট করুন।</p>
        <input type="text" id="wallet" class="input-box" placeholder="UQA123...xyz">
        <button class="btn-save" onclick="save()">SAVE WALLET</button>
    </div>
    <script>
        document.getElementById('wallet').value = localStorage.getItem('user_wallet') || "";
        function save() {
            localStorage.setItem('user_wallet', document.getElementById('wallet').value);
            alert("Wallet Address Saved!");
        }
    </script>
</body>
</html>
