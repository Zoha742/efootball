<script>
    // Adsgram initialization
    const AdController = window.Adsgram.init({ blockId: "int-41" });

    async function loadManagers() {
        const container = document.getElementById('manager-container');
        container.innerHTML = "<p style='text-align:center;'>Loading Managers...</p>";
        
        try {
            const response = await fetch('manager.json');
            const data = await response.json();
            const all_managers = data.managers;
            
            container.innerHTML = "";

            all_managers.forEach(manager => {
                const card = document.createElement('div');
                card.className = 'top-card';
                card.innerHTML = `<img src="${manager.img}"><p>${manager.name}</p>`;
                
                card.onclick = () => {
                    if (typeof AdController !== 'undefined') {
                        AdController.show()
                            .then(() => openManagerBio(manager))
                            .catch(() => openManagerBio(manager));
                    } else {
                        openManagerBio(manager);
                    }
                };
                container.appendChild(card);
            });
        } catch (e) { 
            container.innerHTML = "Error loading managers!"; 
        }
    }

    function openManagerBio(manager) {
        // Manager object save kora hocche
        localStorage.setItem('selected_manager', JSON.stringify(manager));
        // Manager bio page-e pathano hocche
        window.location.href = 'managerbio.html';
    }

    window.onload = loadManagers;
</script>
