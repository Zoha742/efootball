<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Agur design hoboho rakha hoyeche */
        body { background: #050a18; color: white; font-family: sans-serif; margin: 0; }
        .top-bar { display: flex; align-items: center; padding: 15px; background: #121e36; border-bottom: 1px solid #1e2d4d; }
        .top-bar a { color: white; text-decoration: none; margin-right: 15px; }
        .container { padding-bottom: 20px; }
        .item { background: #121e36; margin: 10px 15px; padding: 15px; border-radius: 12px; border-left: 4px solid #a78bfa; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .item-title { font-weight: bold; font-size: 15px; }
        .item-status { font-size: 12px; margin-top: 4px; font-weight: 500; }
        .item-date { font-size: 10px; color: #94a3b8; margin-top: 6px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="profile.html"><i class="fas fa-chevron-left"></i></a>
        <span>Transaction History</span>
    </div>

    <div class="container" id="history-list">
        <p style="text-align: center; font-size: 12px; color: #94a3b8; margin-top: 30px;">Loading history...</p>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAy2nEcb--kbjU7tSIm6lJG5ZpEFSus7sg",
            authDomain: "efootball-57d9b.firebaseapp.com",
            projectId: "efootball-57d9b",
            storageBucket: "efootball-57d9b.firebasestorage.app",
            messagingSenderId: "1031993322489",
            appId: "1:1031993322489:web:0336c8e1869318a8222b28"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tg = window.Telegram.WebApp;
        const userId = String(tg.initDataUnsafe?.user?.id || "774900");

        // Firebase theke user-er specific history fetch kora
        db.ref('users/' + userId + '/history').on('value', (snapshot) => {
            const listContainer = document.getElementById('history-list');
            listContainer.innerHTML = ""; 

            if (snapshot.exists()) {
                const historyData = snapshot.val();
                // Latest transaction gulo upore dekhano (Reverse order)
                const keys = Object.keys(historyData).reverse();
                
                keys.forEach(key => {
                    const item = historyData[key];
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'item';
                    
                    // Status onujayi color thik kora
                    let statusColor = "#ef4444"; // Default Red
                    if (item.status === 'Completed') statusColor = "#22c55e";
                    if (item.status === 'Pending') statusColor = "#fbbf24";
                    
                    // Border color logic (Withdraw hole ek color, Earn hole arek color)
                    if (item.amount > 0) {
                        itemDiv.style.borderLeft = "4px solid #22c55e";
                    } else {
                        itemDiv.style.borderLeft = "4px solid #f43f5e";
                    }

                    itemDiv.innerHTML = `
                        <div class="item-title">${item.type || 'Transaction'}</div>
                        <div class="item-status" style="color: ${statusColor};">
                            ${item.amount > 0 ? '+' : ''}${item.amount} GP (${item.status})
                        </div>
                        <div class="item-date"><i class="far fa-clock"></i> ${item.date || ''}</div>
                    `;
                    listContainer.appendChild(itemDiv);
                });
            } else {
                listContainer.innerHTML = `
                    <div style="text-align:center; margin-top:50px;">
                        <i class="fas fa-history" style="font-size:40px; color:#1e2d4d; margin-bottom:10px;"></i>
                        <p style="font-size:12px; color:#94a3b8;">No transaction history found.</p>
                    </div>`;
            }
        });
    </script>
</body>
</html>
