<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legends - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card-dark: #121e36; --primary: #fbbf24; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 25px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; color: var(--primary); text-decoration: none; }
        
        /* আপনার অরিজিনাল গ্রিড ডিজাইন */
        .pos-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .pos-btn { background: var(--card-dark); border: 1px solid var(--border); padding: 10px; border-radius: 10px; color: white; cursor: pointer; font-size: 12px; font-weight: bold; text-align: center; transition: 0.3s; }
        .pos-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        .players-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .top-card { background: var(--card-dark); border-radius: 15px; padding: 10px; text-align: center; border: 1px solid var(--border); transition: 0.3s; }
        .top-card:active { transform: scale(0.95); }
        .top-card img { width: 100%; aspect-ratio: 1; border-radius: 12px; object-fit: cover; margin-bottom: 8px; border: 2px solid var(--border); }
        .top-card p { font-size: 11px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <h3 style="margin:0; text-transform: uppercase; letter-spacing: 1px;">Legend Players</h3>
</div>

<div class="pos-grid">
    <div class="pos-btn active" onclick="changePos('CF', this)">CF</div>
    <div class="pos-btn" onclick="changePos('SS', this)">SS</div>
    <div class="pos-btn" onclick="changePos('LWF', this)">LWF</div>
    <div class="pos-btn" onclick="changePos('RWF', this)">RWF</div>
    <div class="pos-btn" onclick="changePos('AMF', this)">AMF</div>
    <div class="pos-btn" onclick="changePos('CMF', this)">CMF</div>
    <div class="pos-btn" onclick="changePos('DMF', this)">DMF</div>
    <div class="pos-btn" onclick="changePos('LB', this)">LB</div>
    <div class="pos-btn" onclick="changePos('RB', this)">RB</div>
    <div class="pos-btn" onclick="changePos('CB', this)">CB</div>
    <div class="pos-btn" onclick="changePos('GK', this)">GK</div>
</div>

<div class="players-grid" id="players-container"></div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAy2nEcb--kbjU7tSIm6lJG5ZpEFSus7sg",
        authDomain: "efootball-57d9b.firebaseapp.com",
        projectId: "efootball-57d9b",
        storageBucket: "efootball-57d9b.firebasestorage.app",
        messagingSenderId: "1031993322489",
        appId: "1:1031993322489:web:0336c8e1869318a8222b28"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function changePos(pos, btn) {
        document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadLegends(pos);
    }

    async function loadLegends(pos) {
        const container = document.getElementById('players-container');
        container.innerHTML = "<p style='grid-column: span 3; text-align:center; font-size:12px; color:#94a3b8;'>Loading...</p>";
        
        try {
            // JSON fetching command
            const res = await fetch('legendplayer.json'); 
            const data = await res.json();
            
            const filtered = data.filter(p => p.pos === pos);
            container.innerHTML = "";

            if(!filtered || filtered.length === 0) {
                container.innerHTML = "<p style='grid-column: span 3; text-align:center;'>No Data Found!</p>";
                return;
            }

            filtered.forEach(legend => {
                const card = document.createElement('div');
                card.className = 'top-card';
                card.innerHTML = `<img src="${legend.img}"><p>${legend.name}</p>`;
                card.onclick = () => {
                    localStorage.setItem('selected_player', JSON.stringify(legend));
                    window.location.href = 'legendbio.html';
                };
                container.appendChild(card);
            });
        } catch (e) { 
            container.innerHTML = "<p style='grid-column: span 3; text-align:center;'>Error loading data</p>"; 
        }
    }

    window.onload = () => {
        loadLegends('CF'); 
        try {
            if (window.Adsgram) {
                const bannerAd = window.Adsgram.init({ blockId: "4774" });
                bannerAd.show().catch((err) => console.log("Ad error"));
            }
        } catch (e) {}
    };
</script>
</body>
</html>
