<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legends - eFootball HUB</title>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card-dark: #121e36; --primary: #fbbf24; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 25px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; color: var(--primary); text-decoration: none; }
        
        .pos-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .pos-btn { background: var(--card-dark); border: 1px solid var(--primary); padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; color: var(--primary); font-weight: bold; }
        
        .player-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding-bottom: 120px; }
        .top-card { background: var(--card-dark); border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #1e2d4d; }
        .top-card img { width: 100%; border-radius: 8px; margin-bottom: 8px; }
        .top-card p { font-size: 12px; margin: 0; color: #cbd5e1; }

        .bottom-ad-banner {
            position: fixed;
            bottom: 58px; 
            left: 0;
            width: 100%;
            height: 50px;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="font-size: 18px; color: var(--primary);">LEGENDARY PLAYERS</h2>
    </div>

    <div class="pos-grid">
        <div class="pos-btn" onclick="loadLegends('CF')">CF</div>
        <div class="pos-btn" onclick="loadLegends('SS')">SS</div>
        <div class="pos-btn" onclick="loadLegends('LWF')">LWF</div>
        <div class="pos-btn" onclick="loadLegends('RWF')">RWF</div>
        <div class="pos-btn" onclick="loadLegends('AMF')">AMF</div>
        <div class="pos-btn" onclick="loadLegends('CMF')">CMF</div>
        <div class="pos-btn" onclick="loadLegends('DMF')">DMF</div>
        <div class="pos-btn" onclick="loadLegends('LB')">LB</div>
        <div class="pos-btn" onclick="loadLegends('RB')">RB</div>
        <div class="pos-btn" onclick="loadLegends('CB')">CB</div>
        <div class="pos-btn" onclick="loadLegends('GK')">GK</div>
    </div>

    <div id="legend-container" class="player-grid"></div>

    <div class="bottom-ad-banner">
        <span style="font-size: 10px; color: #555;">ADVERTISEMENT</span>
    </div>

<script>
    const AdController = window.Adsgram.init({ blockId: "int-41" });

    async function loadLegends(pos) {
        const container = document.getElementById('legend-container');
        container.innerHTML = "<p style='grid-column: span 3; text-align:center;'>Loading...</p>";
        
        try {
            const response = await fetch('legend.json');
            const data = await response.json();
            
            // JSON-এ players বা legend যে নামেই থাক ডাটা নিবে
            const all_legends = data.players || data.legend; 
            
            const filtered = all_legends.filter(legend => legend.pos === pos);
            container.innerHTML = "";

            if(filtered.length === 0) {
                container.innerHTML = "<p style='grid-column: span 3; text-align:center;'>No Data!</p>";
                return;
            }

            filtered.forEach(legend => {
                const card = document.createElement('div');
                card.className = 'top-card';
                card.innerHTML = `<img src="${legend.img}"><p>${legend.name}</p>`;
                
                card.onclick = () => {
                    if (typeof AdController !== 'undefined') {
                        AdController.show()
                            .then(() => openBio(legend))
                            .catch(() => openBio(legend));
                    } else {
                        openBio(legend);
                    }
                };
                container.appendChild(card);
            });
        } catch (e) { 
            console.error("Error:", e);
            container.innerHTML = "Error!"; 
        }
    }

    // আপনার স্ক্রিপ্টের ভেতরে এই ফাংশনটি রিপ্লেস করুন
function openBio(legend) {
    // ডাটা 'selected_legend' নামে সেভ করা হচ্ছে
    localStorage.setItem('selected_legend', JSON.stringify(legend));
    
    // সরাসরি legendbio.html পেজ ওপেন হবে
    window.location.href = 'legendbio.html';
}

// আপনার loadLegends ফাংশনের ভেতর কার্ড তৈরির লজিক:
filtered.forEach(legend => {
    const card = document.createElement('div');
    card.className = 'top-card';
    card.innerHTML = `<img src="${legend.img}"><p>${legend.name}</p>`;
    
    // কার্ডে ক্লিক করলে সরাসরি openBio কল হবে
    card.onclick = () => {
        if (typeof AdController !== 'undefined') {
            AdController.show()
                .then(() => openBio(legend))
                .catch(() => openBio(legend));
        } else {
            openBio(legend);
        }
    };
    container.appendChild(card);

    window.onload = () => loadLegends('CF');
});

    <div class="bottom-ad-banner">
    <span style="font-size: 10px; color: #555;">ADVERTISEMENT</span>
</div>

</script>
</body>
</html>
