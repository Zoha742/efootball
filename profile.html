<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - eFootball HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card-dark: #121e36; --pink: #d946ef; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; padding-bottom: 90px; }
        
        .profile-container { background: linear-gradient(180deg, rgba(217, 70, 239, 0.2), var(--card-dark)); border-radius: 25px; padding: 30px 20px; text-align: center; border: 1px solid var(--border); margin-top: 20px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--pink); margin-bottom: 15px; box-shadow: 0 0 20px rgba(217, 70, 239, 0.5); }
        .name { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .stat-card { background: rgba(5, 10, 24, 0.6); padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
        .stat-card i { font-size: 24px; color: #fbbf24; margin-bottom: 10px; display: block; }
        .stat-val { font-size: 20px; font-weight: bold; }
        .stat-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; margin-top: 5px; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: rgba(5, 10, 24, 0.85); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000; }
        .nav-item { text-align: center; color: #64748b; text-decoration: none; font-size: 11px; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="https://via.placeholder.com/100" class="avatar">
        <div class="name" id="user-name">User Name</div>
        <p style="color: #94a3b8;">ID: #774900</p>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-coins"></i>
                <div class="stat-val" id="gp-balance">0</div>
                <div class="stat-label">Total GP</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-medal"></i>
                <div class="stat-val" id="total-tasks">0</div>
                <div class="stat-label">Task Done</div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="legend.html" class="nav-item"><i class="fas fa-crown"></i>Legend</a>
        <a href="task.html" class="nav-item"><i class="fas fa-clipboard-check"></i>Task</a>
        <a href="profile.html" class="nav-item" style="color: #d946ef;"><i class="fas fa-user-circle"></i>Profile</a>
    </nav>

    <script>
        // Profile load holei localStorage theke data niye asbe
        window.onload = function() {
            const gp = localStorage.getItem('user_gp') || 0;
            const tasks = localStorage.getItem('tasks_done') || 0;
            
            document.getElementById('gp-balance').innerText = gp;
            document.getElementById('total-tasks').innerText = tasks;
        }
    </script>
</body>
</html>
