<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - eFootball HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card-dark: #121e36; --pink: #d946ef; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; padding-bottom: 90px; margin: 0; }
        
        /* Profile Header */
        .profile-container { background: linear-gradient(180deg, rgba(217, 70, 239, 0.15), var(--card-dark)); border-radius: 20px; padding: 30px 20px; text-align: center; border: 1px solid var(--border); margin-bottom: 25px; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--pink); margin-bottom: 12px; box-shadow: 0 0 15px rgba(217, 70, 239, 0.4); object-fit: cover; }
        .name { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        .user-id { color: #94a3b8; font-size: 12px; }

        /* 6 Action Boxes Grid */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .action-box { background: var(--card-dark); border-radius: 15px; padding: 20px 10px; text-align: center; border: 1px solid var(--border); text-decoration: none; color: white; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; }
        .action-box:active { transform: scale(0.95); }
        .action-box i { font-size: 26px; margin-bottom: 8px; display: block; }
        .action-box span { font-size: 12px; font-weight: bold; }
        .action-box .value { font-size: 16px; font-weight: bold; margin-top: 5px; color: #e2e8f0; }

        /* Icon Colors */
        .box-gp i { color: #fbbf24; } /* Golden */
        .box-task i { color: #22c55e; } /* Green */
        .box-wallet i { color: #3b82f6; } /* Blue */
        .box-withdraw i { color: #ff4b2b; } /* Red */
        .box-history i { color: #d946ef; } /* Pink */
        .box-support i { color: #11998e; } /* Teal */

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: rgba(5, 10, 24, 0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000; }
        .nav-item { text-align: center; color: #64748b; text-decoration: none; font-size: 11px; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="https://via.placeholder.com/100" class="avatar" id="user-avatar">
        <div class="name" id="user-name">Loading...</div>
        <div class="user-id" id="user-id">ID: Fetching...</div>
    </div>

    <div class="action-grid">
        <div class="action-box box-gp">
            <i class="fas fa-coins"></i>
            <span>Total GP</span>
            <div class="value" id="gp-balance">0</div>
        </div>

        <div class="action-box box-task">
            <i class="fas fa-clipboard-check"></i>
            <span>Task Done</span>
            <div class="value" id="total-tasks">0</div>
        </div>

        <a href="wallet.html" class="action-box box-wallet">
            <i class="fas fa-wallet"></i>
            <span>Wallet Setup</span>
            <div class="value" style="font-size: 10px; font-weight: normal; color: #94a3b8; margin-top: 8px;">Connect TON</div>
        </a>

        <a href="withdraw.html" class="action-box box-withdraw">
            <i class="fas fa-money-bill-wave"></i>
            <span>Withdraw</span>
            <div class="value" style="font-size: 10px; font-weight: normal; color: #94a3b8; margin-top: 8px;">Cashout GP</div>
        </a>

        <a href="history.html" class="action-box box-history">
            <i class="fas fa-history"></i>
            <span>History</span>
            <div class="value" style="font-size: 10px; font-weight: normal; color: #94a3b8; margin-top: 8px;">Transactions</div>
        </a>

        <a href="support.html" class="action-box box-support">
            <i class="fas fa-headset"></i>
            <span>Support</span>
            <div class="value" style="font-size: 10px; font-weight: normal; color: #94a3b8; margin-top: 8px;">Help Center</div>
        </a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="legend.html" class="nav-item"><i class="fas fa-crown"></i>Legend</a>
        <a href="task.html" class="nav-item"><i class="fas fa-clipboard-check"></i>Task</a>
        <a href="profile.html" class="nav-item" style="color: #d946ef;"><i class="fas fa-user-circle"></i>Profile</a>
    </nav>

    <script>
        // ১. Telegram Web App Initialize
        const tg = window.Telegram.WebApp;
        tg.expand(); // অ্যাপটি ফুল স্ক্রিন করার জন্য

        // ২. Telegram থেকে ইউজারের ডেটা নেওয়া
        const user = tg.initDataUnsafe?.user;

        if (user) {
            // ইউজারের নাম সেট করা (First Name + Last Name)
            const fullName = user.first_name + (user.last_name ? " " + user.last_name : "");
            document.getElementById('user-name').innerText = fullName;
            
            // ইউজারের আইডি সেট করা
            document.getElementById('user-id').innerText = "ID: #" + user.id;

            // ইউজারের প্রোফাইল ছবি থাকলে সেটা সেট করা
            if (user.photo_url) {
                document.getElementById('user-avatar').src = user.photo_url;
            }
        } else {
            // যদি ব্রাউজার থেকে টেস্ট করেন (টেলিগ্রামের বাইরে)
            document.getElementById('user-name').innerText = "Guest Player";
            document.getElementById('user-id').innerText = "ID: #000000";
        }

        // ৩. LocalStorage থেকে GP এবং Task এর ডেটা লোড করা
        window.onload = function() {
            const gp = localStorage.getItem('user_gp') || 0;
            const tasks = localStorage.getItem('tasks_done') || 0;
            
            document.getElementById('gp-balance').innerText = gp;
            document.getElementById('total-tasks').innerText = tasks;
        }
    </script>
</body>
</html>
