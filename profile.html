<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - eFootball HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card-dark: #121e36; --pink: #d946ef; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; padding-bottom: 90px; margin: 0; }
        .profile-container { background: linear-gradient(180deg, rgba(217, 70, 239, 0.15), var(--card-dark)); border-radius: 20px; padding: 30px 20px; text-align: center; border: 1px solid var(--border); margin-bottom: 25px; }
        .avatar { width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--pink); margin-bottom: 12px; box-shadow: 0 0 15px rgba(217, 70, 239, 0.4); object-fit: cover; }
        .balance-card { background: var(--card-dark); border: 1px solid var(--border); border-radius: 15px; padding: 15px; display: flex; justify-content: space-around; margin-bottom: 20px; }
        .balance-card h3 { margin: 5px 0; font-size: 18px; }
        .balance-card small { color: #94a3b8; font-size: 11px; text-transform: uppercase; }
        .menu-list { display: flex; flex-direction: column; gap: 12px; }
        .menu-item { background: var(--card-dark); border: 1px solid var(--border); padding: 16px; border-radius: 12px; display: flex; align-items: center; text-decoration: none; color: white; transition: 0.3s; }
        .menu-item i { width: 35px; height: 35px; background: rgba(217, 70, 239, 0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 15px; color: var(--pink); font-size: 16px; }
        .menu-item .chevron { margin-left: auto; color: #4b5563; font-size: 12px; }
        .p-notif-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .p-notif-box { background: var(--card-dark); width: 85%; border-radius: 20px; padding: 25px; border: 1px solid var(--pink); text-align: center; transform: scale(0.8); transition: 0.3s; }
        .p-notif-box.show { transform: scale(1); }
        .p-notif-box i { font-size: 45px; color: var(--pink); margin-bottom: 15px; }
        .p-notif-btn { background: var(--pink); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="https://via.placeholder.com/85" id="user-avatar" class="avatar">
        <h2 id="user-name" style="margin: 5px 0;">Guest Player</h2>
        <p id="user-id" style="color: #94a3b8; font-size: 13px; margin: 0;">ID: #000000</p>
    </div>

    <div class="balance-card">
        <div><small>GP Balance</small><h3 id="gp-balance" style="color: #fbbf24;">0</h3></div>
        <div><small>Tasks Done</small><h3 id="total-tasks" style="color: #22c55e;">0</h3></div>
    </div>

    <div class="menu-list">
        <a href="task.html" class="menu-item"><i class="fas fa-tasks"></i><span>Daily Tasks</span><i class="fas fa-chevron-right chevron"></i></a>
        <a href="withdraw.html" class="menu-item"><i class="fas fa-wallet"></i><span>Withdraw GP</span><i class="fas fa-chevron-right chevron"></i></a>
        <a href="setup.html" class="menu-item"><i class="fas fa-key"></i><span>Wallet Setup</span><i class="fas fa-chevron-right chevron"></i></a>
        <a href="support.html" class="menu-item"><i class="fas fa-headset"></i><span>Support</span><i class="fas fa-chevron-right chevron"></i></a>
        <a href="admin.html" class="menu-item"><i class="fas fa-user-shield"></i><span>Admin Panel</span><i class="fas fa-chevron-right chevron"></i></a>
    </div>

    <div class="p-notif-overlay" id="pNotifOverlay">
        <div class="p-notif-box" id="pNotifBox">
            <i class="fas fa-id-badge"></i>
            <h3>Profile Ready!</h3>
            <p style="color: #94a3b8; font-size: 13px;">Manage your GP and track your progress here.</p>
            <button class="p-notif-btn" onclick="hideProfileNotif()">CONTINUE</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user;

        if (user) {
            document.getElementById('user-name').innerText = user.first_name;
            document.getElementById('user-id').innerText = "ID: #" + user.id;
            if (user.photo_url) document.getElementById('user-avatar').src = user.photo_url;
        }

        window.onload = function() {
            // NaN Proof Logic
            let rawGP = localStorage.getItem('user_gp');
            let gp = (rawGP === null || isNaN(Number(rawGP))) ? 0 : Number(rawGP);
            document.getElementById('gp-balance').innerText = gp.toLocaleString();
            
            let rawTasks = localStorage.getItem('tasks_done');
            let tasks = (rawTasks === null || isNaN(Number(rawTasks))) ? 0 : Number(rawTasks);
            document.getElementById('total-tasks').innerText = tasks;
            
            if (!sessionStorage.getItem('profile_notif_shown')) {
                setTimeout(showProfileNotif, 1500);
                sessionStorage.setItem('profile_notif_shown', 'true');
            }
        }

        function showProfileNotif() {
            const overlay = document.getElementById('pNotifOverlay');
            const box = document.getElementById('pNotifBox');
            overlay.style.display = 'flex';
            setTimeout(() => box.classList.add('show'), 100);
        }

        function hideProfileNotif() {
            document.getElementById('pNotifBox').classList.remove('show');
            setTimeout(() => document.getElementById('pNotifOverlay').style.display = 'none', 400);
        }
    </script>
</body>
</html>
