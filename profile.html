<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - eFootball HUB</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* আপনার অরিজিনাল ডিজাইন হুবহু ১:১ রাখা হয়েছে */
        :root { --bg: #050a18; --card-dark: #121e36; --pink: #d946ef; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; padding-bottom: 90px; margin: 0; }
        
        .profile-container { background: linear-gradient(180deg, rgba(217, 70, 239, 0.15), var(--card-dark)); border-radius: 20px; padding: 30px 20px; text-align: center; border: 1px solid var(--border); margin-bottom: 25px; }
        .avatar { width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--pink); margin-bottom: 12px; box-shadow: 0 0 20px rgba(217, 70, 239, 0.3); object-fit: cover; }
        .user-name { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .user-id { font-size: 12px; color: #94a3b8; font-family: monospace; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-dark); padding: 15px; border-radius: 18px; border: 1px solid var(--border); text-align: left; }
        .stat-card i { color: var(--pink); margin-bottom: 10px; font-size: 18px; }
        .stat-label { font-size: 11px; color: #94a3b8; display: block; }
        .stat-value { font-size: 16px; font-weight: bold; margin-top: 5px; }

        .menu-list { display: flex; flex-direction: column; gap: 12px; }
        .menu-item { background: var(--card-dark); padding: 16px; border-radius: 15px; display: flex; align-items: center; text-decoration: none; color: white; border: 1px solid var(--border); transition: 0.3s; }
        .menu-item i { width: 30px; font-size: 18px; color: var(--pink); }
        .menu-item span { flex: 1; font-size: 14px; font-weight: 500; }
        .menu-item .fa-chevron-right { font-size: 12px; color: #334155; }

        /* Notification Overlay Design Preserved */
        .notif-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .notif-box { background: var(--card-dark); width: 100%; border-radius: 20px; border: 1px solid var(--border); padding: 25px; text-align: center; transform: scale(0.8); transition: 0.3s; }
        .notif-box.show { transform: scale(1); }
    </style>
</head>
<body>

    <div class="profile-container">
        <img id="user-avatar" src="https://via.placeholder.com/100" class="avatar">
        <div id="user-name" class="user-name">Loading...</div>
        <div id="user-id" class="user-id">ID: #000000</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <i class="fas fa-coins"></i>
            <span class="stat-label">GP Balance</span>
            <div id="gp-balance" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <i class="fas fa-tasks"></i>
            <span class="stat-label">Tasks Done</span>
            <div id="total-tasks" class="stat-value">0</div>
        </div>
    </div>

    <div class="menu-list">
        <a href="wallet.html" class="menu-item"><i class="fas fa-wallet"></i><span>Wallet Address</span><i class="fas fa-chevron-right"></i></a>
        <a href="history.html" class="menu-item"><i class="fas fa-history"></i><span>Transaction History</span><i class="fas fa-chevron-right"></i></a>
        <a href="#" class="menu-item" onclick="showProfileNotif()"><i class="fas fa-bell"></i><span>Notifications</span><i class="fas fa-chevron-right"></i></a>
    </div>

    <div class="notif-overlay" id="pNotifOverlay">
        <div class="notif-box" id="pNotifBox">
            <i class="fas fa-info-circle" style="font-size: 40px; color: var(--pink); margin-bottom: 15px;"></i>
            <h3>No New Notifications</h3>
            <p style="color: #94a3b8; font-size: 13px;">নতুন কোনো মেসেজ বা আপডেট আসলে এখানে দেখতে পাবেন।</p>
            <button onclick="hideProfileNotif()" style="background: var(--pink); color: white; border: none; padding: 12px 30px; border-radius: 10px; margin-top: 20px; font-weight: bold;">CLOSE</button>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAy2nEcb--kbjU7tSIm6lJG5ZpEFSus7sg",
            authDomain: "efootball-57d9b.firebaseapp.com",
            projectId: "efootball-57d9b",
            storageBucket: "efootball-57d9b.firebasestorage.app",
            messagingSenderId: "1031993322489",
            appId: "1:1031993322489:web:0336c8e1869318a8222b28"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Telegram User Data Integration
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user;
        const userId = String(user?.id || "774900");

        if (user) {
            document.getElementById('user-name').innerText = user.first_name + (user.last_name ? " " + user.last_name : "");
            document.getElementById('user-id').innerText = "ID: #" + user.id;
            if (user.photo_url) document.getElementById('user-avatar').src = user.photo_url;
        }

        // Real-time Firebase Sync for GP and Tasks
        db.ref('users/' + userId).on('value', (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                document.getElementById('gp-balance').innerText = (data.gp || 0).toLocaleString();
                document.getElementById('total-tasks').innerText = data.tasks_done || 0;
            }
        });

        // Notification Logic Preserved
        function showProfileNotif() {
            const overlay = document.getElementById('pNotifOverlay');
            const box = document.getElementById('pNotifBox');
            overlay.style.display = 'flex';
            setTimeout(() => box.classList.add('show'), 100);
        }

        function hideProfileNotif() {
            const overlay = document.getElementById('pNotifOverlay');
            const box = document.getElementById('pNotifBox');
            box.classList.remove('show');
            setTimeout(() => overlay.style.display = 'none', 400);
        }
    </script>
</body>
</html>
