<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players - eFootball HUB</title>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card-dark: #121e36; --primary: #fbbf24; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 25px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; color: var(--primary); text-decoration: none; }
        
        /* All Position Buttons */
        .pos-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .pos-btn { background: var(--card-dark); border: 1px solid var(--primary); padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; color: var(--primary); font-weight: bold; font-size: 14px; }
        
        /* Fixed Player Grid */
        .player-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 10px; 
            padding-bottom: 100px; 
            align-items: stretch; 
        }

        /* Card Uniformity Fix */
        .top-card { 
            background: var(--card-dark); 
            border-radius: 12px; 
            padding: 8px; 
            text-align: center; 
            border: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            height: 100%; 
            cursor: pointer;
        }

        .top-card img { 
            width: 100%; 
            aspect-ratio: 1/1; /* Shob image square hobe */
            object-fit: cover; /* Chobi chapta hobe na */
            object-position: top; 
            border-radius: 8px; 
            margin-bottom: 8px; 
        }

        .top-card p { 
            font-size: 11px; 
            margin: 0; 
            color: #cbd5e1; 
            font-weight: 500; 
            line-height: 1.2;
            height: 2.4em; /* Name jate max 2 line hoy */
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .bottom-ad-banner { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; border-top: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="font-size: 18px;">SELECT POSITION</h2>
    </div>

    <div class="pos-grid">
        <div class="pos-btn" onclick="loadPlayers('CF')">CF</div>
        <div class="pos-btn" onclick="loadPlayers('SS')">SS</div>
        <div class="pos-btn" onclick="loadPlayers('LB')">RWF</div>
        <div class="pos-btn" onclick="loadPlayers('RB')">LWF</div>
        <div class="pos-btn" onclick="loadPlayers('LB')">AMF</div>
        <div class="pos-btn" onclick="loadPlayers('LB')">LMF</div>
        <div class="pos-btn" onclick="loadPlayers('RB')">RMF</div>
        <div class="pos-btn" onclick="loadPlayers('LB')">CMF</div>
        <div class="pos-btn" onclick="loadPlayers('RB')">DMF</div>
        <div class="pos-btn" onclick="loadPlayers('LB')">LB</div>
        <div class="pos-btn" onclick="loadPlayers('RB')">RB</div>
        <div class="pos-btn" onclick="loadPlayers('CB')">CB</div>
        <div class="pos-btn" onclick="loadPlayers('GK')">GK</div>
    </div>

    <div id="player-container" class="player-grid"></div>

   <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Adsgram Initialization
    const AdController = window.Adsgram.init({ blockId: "int-41" });

    async function loadPlayers(pos) {
        const container = document.getElementById('player-container');
        // লোডিং শুরু
        container.innerHTML = "<p style='grid-column: span 3; text-align:center; color: #3b82f6;'>Loading Players...</p>";
        
        try {
            // নিশ্চিত করুন ফাইলের নাম player.json
            const response = await fetch('player.json'); 
            
            if (!response.ok) {
                throw new Error("ফাইল খুঁজে পাওয়া যায়নি (File not found)");
            }

            const data = await response.json();
            
            // পজিশন অনুযায়ী ফিল্টার (যেমন: CF, SS, LB ইত্যাদি)
            const filteredPlayers = data.players.filter(p => p.pos === pos);
            
            container.innerHTML = ""; // লোডিং টেক্সট সরিয়ে ফেলা

            if (filteredPlayers.length === 0) {
                container.innerHTML = "<p style='grid-column: span 3; text-align:center;'>No players found for " + pos + "</p>";
                return;
            }

            filteredPlayers.forEach(p => {
                const card = document.createElement('div');
                card.className = 'top-card';
                card.innerHTML = `
                    <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150'">
                    <p>${p.name}</p>
                `;
                card.onclick = () => {
                    // অ্যাড দেখিয়ে বায়ো পেজে যাওয়া
                    AdController.show().then(() => openBio(p)).catch(() => openBio(p));
                };
                container.appendChild(card);
            });
        } catch (error) {
            console.error(error);
            container.innerHTML = "<p style='grid-column: span 3; text-align:center; color: red;'>ডাটা লোড করতে সমস্যা হয়েছে। দয়া করে player.json ফাইলটি চেক করুন।</p>";
        }
    }

    function openBio(player) {
        // প্লেয়ারের সব ডাটা LocalStorage এ সেভ করা
        localStorage.setItem('selected_player', JSON.stringify(player));
        // playerbio.html পেজে নিয়ে যাওয়া
        window.location.href = 'playerbio.html';
    }

    // পেজ লোড হলে ডিফল্টভাবে CF দেখাবে
    window.onload = () => loadPlayers('CF');
</script>
</body>
</html>
