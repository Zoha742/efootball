<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Database</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #020617; color: white; padding-bottom: 80px; }
        
        /* Header */
        .header { background: linear-gradient(180deg, #1e293b 0%, #020617 100%); padding: 25px 20px; text-align: center; border-bottom: 2px solid #3b82f6; }
        .user-badge { display: inline-block; background: #1d4ed8; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-top: 10px; font-weight: bold; }

        /* Stats Bar */
        .stats-bar { display: flex; justify-content: space-around; background: #0f172a; padding: 15px; margin: 15px; border-radius: 12px; border: 1px solid #1e293b; }
        .stat-item { text-align: center; }
        .stat-item span { display: block; font-size: 10px; color: #94a3b8; text-transform: uppercase; }
        .stat-item b { font-size: 16px; color: #3b82f6; }

        /* Main Grid */
        .container { padding: 0 15px; }
        .section-title { font-size: 16px; margin: 20px 0 15px; display: flex; align-items: center; gap: 8px; color: #3b82f6; }
        
        .db-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .db-card { background: #0f172a; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #1e293b; transition: 0.3s; }
        .db-card:active { transform: scale(0.95); background: #1e293b; }
        .db-card i { font-size: 28px; margin-bottom: 12px; display: block; }
        
        /* Icons Colors */
        .ic-player { color: #60a5fa; }
        .ic-legend { color: #fbbf24; }
        .ic-league { color: #f87171; }
        .ic-country { color: #4ade80; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0f172a; display: flex; border-top: 1px solid #1e293b; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; text-decoration: none; font-size: 11px; }
        .nav-link i { font-size: 20px; margin-bottom: 4px; }
        .nav-link.active { color: #3b82f6; border-top: 2px solid #3b82f6; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 22px; letter-spacing: 1px;">eFootball <span style="color: #3b82f6;">HUB</span></h1>
        <div id="user-name" style="margin-top: 5px; font-weight: 500;">Loading...</div>
        <div class="user-badge" id="user-id">#000000</div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><span>Players</span><b>15K+</b></div>
        <div class="stat-item"><span>Leagues</span><b>50+</b></div>
        <div class="stat-item"><span>Legends</span><b>200+</b></div>
    </div>

    <div class="container">
        <div class="section-title"><i class="fas fa-database"></i> EXPLORE DATABASE</div>
        
        <div class="db-grid">
            <div class="db-card" onclick="openSection('Players')">
                <i class="fas fa-users ic-player"></i>
                <p>All Players</p>
            </div>
            <div class="db-card" onclick="openSection('Legends')">
                <i class="fas fa-star ic-legend"></i>
                <p>Legends</p>
            </div>
            <div class="db-card" onclick="openSection('Leagues')">
                <i class="fas fa-trophy ic-league"></i>
                <p>Leagues</p>
            </div>
            <div class="db-card" onclick="openSection('Countries')">
                <i class="fas fa-globe-americas ic-country"></i>
                <p>Countries</p>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-link active"><i class="fas fa-home"></i>Home</a>
        <a href="#" class="nav-link" onclick="openSection('Database')"><i class="fas fa-search"></i>Database</a>
        <a href="#" class="nav-link" onclick="openSection('Manager')"><i class="fas fa-user-tie"></i>Manager</a>
        <a href="#" class="nav-link" onclick="openSection('Compare')"><i class="fas fa-exchange-alt"></i>Compare</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name;
            document.getElementById('user-id').innerText = "ID: " + user.id;
        }

        function openSection(name) {
            tg.HapticFeedback.impactOccurred('medium');
            alert(name + " section coming soon!");
        }
    </script>
</body>
</html>
