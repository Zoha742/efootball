<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #3b82f6; --bg: #020617; --card-bg: #0f172a; --border: #1e293b; --text-dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; padding-bottom: 80px; }

        .header { background: #0f172a; padding: 20px; border-bottom: 1px solid var(--border); text-align: center; position: sticky; top: 0; z-index: 1000; }
        
        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Main 4 Buttons (ID 1-4) Colorful --- */
        .main-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 10px 0 25px 0; }
        .menu-btn { border: none; padding: 25px; border-radius: 18px; text-align: center; cursor: pointer; transition: 0.2s; color: white; }
        .menu-btn:active { transform: scale(0.95); }
        .menu-btn i { font-size: 28px; margin-bottom: 10px; display: block; color: white; }
        .menu-btn span { font-size: 15px; font-weight: bold; }

        /* ID 1-4 Colors */
        .id-player { background: linear-gradient(135deg, #06b6d4, #0891b2); } /* Cyan */
        .id-manager { background: linear-gradient(135deg, #ec4899, #db2777); } /* Pink */
        .id-event { background: linear-gradient(135deg, #8b5cf6, #7c3aed); } /* Purple */
        .id-legend { background: linear-gradient(135deg, #10b981, #059669); } /* Green */

        /* --- Quick Actions (Bottom 4 Only) --- */
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
        .m-btn { height: 85px; border-radius: 18px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 11px; text-transform: uppercase; border: none; cursor: pointer; }
        
        .c-gold { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .c-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .c-orange { background: linear-gradient(135deg, #f97316, #ea580c); }
        .c-red { background: linear-gradient(135deg, #ef4444, #dc2626); }

        /* Display Area */
        .white-display { background: #ffffff; color: #0f172a; padding: 20px; border-radius: 20px; min-height: 120px; margin-bottom: 25px; }

        /* Position Buttons Style */
        .pos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .pos-btn { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; font-weight: bold; color: #0f172a; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0f172a; display: flex; border-top: 1px solid var(--border); }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); text-decoration: none; font-size: 10px; }
        .nav-link.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <h2>eFootball <span style="color:var(--primary)">HUB</span></h2>
    </div>

    <div id="home" class="page active-page">
        <div class="main-menu">
            <div class="menu-btn id-player" onclick="openPositionMenu()"><i class="fas fa-users"></i><span>Player (ID 1)</span></div>
            <div class="menu-btn id-manager" onclick="showPage('page-manager')"><i class="fas fa-user-tie"></i><span>Manager (ID 2)</span></div>
            <div class="menu-btn id-event" onclick="showPage('page-event')"><i class="fas fa-trophy"></i><span>Events (ID 3)</span></div>
            <div class="menu-btn id-legend" onclick="showPage('page-legend')"><i class="fas fa-crown"></i><span>Legend (ID 4)</span></div>
        </div>

        <h3 style="font-size: 14px; color: var(--primary); margin-bottom: 15px; text-transform: uppercase;">Quick Actions</h3>
        
        <div class="grid-menu">
            <button class="m-btn c-gold" onclick="hAction('store')"><i class="fas fa-shopping-cart"></i>Premium Store</button>
            <button class="m-btn c-blue" onclick="hAction('club')"><i class="fas fa-shield-alt"></i>Club & League</button>
            <button class="m-btn c-orange" onclick="hAction('leader')"><i class="fas fa-users-cog"></i>Leaderboard</button>
            <button class="m-btn c-red" onclick="hAction('orders')"><i class="fas fa-receipt"></i>My Orders</button>
        </div>

        <div class="white-display" id="h-display">
            <div id="display-content">
                <h3 style="margin-top:0; font-size: 16px;">System Message</h3>
                <p style="font-size: 12px; color: #64748b;">Select an option to interact.</p>
            </div>
        </div>
    </div>

    <div id="page-player" class="page">
        <h3 id="pos-title">Players</h3>
        <div class="item-grid" id="all-players-grid"></div>
        <button onclick="showPage('home')" style="margin-top:20px; padding:10px; width:100%; border-radius:10px; border:none; background:var(--primary); color:white;">Back to Home</button>
    </div>
    
    <nav class="bottom-nav">
        <a href="javascript:void(0)" class="nav-link active" onclick="showPage('home', this)"><i class="fas fa-home"></i>Home</a>
        <a href="javascript:void(0)" class="nav-link" onclick="openPositionMenu()"><i class="fas fa-users"></i>Top Player</a>
        <a href="javascript:void(0)" class="nav-link" onclick="showPage('page-task', this)"><i class="fas fa-gem"></i>Task</a>
        <a href="javascript:void(0)" class="nav-link" onclick="showPage('page-profile', this)"><i class="fas fa-user-alt"></i>Profile</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            if(element) {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                element.classList.add('active');
            }
            tg.HapticFeedback.impactOccurred('medium');
        }

        // পজিশন মেনু ওপেন করার ফাংশন
        function openPositionMenu() {
            const display = document.getElementById('display-content');
            display.innerHTML = `
                <h3 style="color:#0891b2">Select Position</h3>
                <div class="pos-grid">
                    <button class="pos-btn" onclick="filterByPos('Forward')">Forward</button>
                    <button class="pos-btn" onclick="filterByPos('Midfielder')">Midfielder</button>
                    <button class="pos-btn" onclick="filterByPos('Defender')">Defender</button>
                    <button class="pos-btn" onclick="filterByPos('Goalkeeper')">Goalkeeper</button>
                </div>
            `;
            tg.HapticFeedback.impactOccurred('light');
        }

        function filterByPos(pos) {
            // এখানে আপনি পরে JSON ফিল্টারিং লজিক অ্যাড করবেন
            alert("Showing all " + pos + " players...");
            showPage('page-player');
            document.getElementById('pos-title').innerText = pos + " List";
        }

        function hAction(type) {
            const box = document.getElementById('display-content');
            const content = {
                'store': '<h3>Premium Store</h3><p>Buy Coins & Boosters.</p>',
                'club': '<h3>Club & League</h3><p>View Teams.</p>',
                'leader': '<h3>Leaderboard</h3><p>Your Referral Stats.</p>',
                'orders': '<h3>My Orders</h3><p>Purchase History.</p>'
            };
            box.innerHTML = content[type] || '<h3>Soon</h3>';
            tg.HapticFeedback.impactOccurred('light');
        }
    </script>
</body>
</html>
