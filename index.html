<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card-dark: #121e36; --primary: #3b82f6; --text: #ffffff; --border: #1e2d4d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; overflow-x: hidden; }
        
        .container { padding: 15px; }
        .hub-title { text-align: center; margin: 15px 0 25px; font-weight: bold; font-size: 20px; text-transform: uppercase; }
        .hub-title span { color: var(--primary); }

        /* Interface Buttons */
        .interface-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .i-btn { background: var(--card-dark); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; text-decoration: none; color: white; transition: 0.3s; }
        .i-btn i { font-size: 24px; color: var(--primary); margin-bottom: 10px; display: block; }
        .i-btn:active { transform: scale(0.95); background: #1a2a4a; }

        /* Banner Slider */
        .slider { width: 100%; height: 160px; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 20px; position: relative; }
        .slider img { width: 100%; height: 100%; object-fit: cover; }

        /* Sections */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .section-header h3 { font-size: 16px; border-left: 4px solid var(--primary); padding-left: 10px; }
        .view-all { color: var(--primary); text-decoration: none; font-size: 13px; }

        .top-card-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .top-card { background: var(--card-dark); border-radius: 10px; padding: 10px; text-align: center; border: 1px solid var(--border); }
        .top-card img { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 8px; border: 2px solid var(--primary); }
        .top-card p { font-size: 11px; font-weight: 500; }

        /* --- Updated Bottom Nav: Glass Black & Colorful Icons --- */
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: rgba(5, 10, 24, 0.8); /* Glass Black Background */
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0; 
            border-top: 1px solid rgba(255, 255, 255, 0.1); 
            z-index: 1000; 
        }

        .nav-item { 
            color: #94a3b8; /* Default Color */
            text-decoration: none; 
            font-size: 11px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 5px; 
            transition: 0.3s;
        }

        .nav-item i { font-size: 20px; }

        /* Active & Colorful States based on Screenshot_32.png */
        .nav-item:nth-child(1).active { color: #3b82f6 !important; } /* Home: Blue */
        .nav-item:nth-child(2).active { color: #fbbf24 !important; } /* Legend: Gold/Yellow */
        .nav-item:nth-child(3).active { color: #22c55e !important; } /* Task: Green */
        .nav-item:nth-child(4).active { color: #d946ef !important; } /* Profile: Pink/Purple */

        .nav-item:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="hub-title">eFootball <span>HUB</span></h1>

        <div class="slider">
            <img src="https://res.cloudinary.com/dyqegwdme/image/upload/v1777218080/6449079_mzh8u9.jpg" alt="Banner">
        </div>

        <div class="interface-grid">
            <a href="player.html" class="i-btn"><i class="fas fa-users"></i>Players</a>
            <a href="manager.html" class="i-btn"><i class="fas fa-user-tie"></i>Managers</a>
            <a href="event.html" class="i-btn"><i class="fas fa-calendar-check"></i>Events</a>
            <a href="pack.html" class="i-btn"><i class="fas fa-box-open"></i>Packs</a>
        </div>

        <div id="ad-container-1" style="width: 100%; background: var(--card-dark); height: 60px; margin-bottom: 20px; border-radius: 10px; display: flex; justify-content: center; align-items: center; border: 1px dashed var(--border);">
            <span style="font-size: 12px; color: #64748b;">BANNER AD SLOT</span>
        </div>

        <div class="section-header">
            <h3>LEGENDARY PLAYERS</h3>
            <a href="legend.html" class="view-all">View All</a>
        </div>

        <div id="home-legend-view" class="top-card-grid">
            </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="legend.html" class="nav-item"><i class="fas fa-crown"></i>Legend</a>
        <a href="task.html" class="nav-item"><i class="fas fa-clipboard-check"></i>Task</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i>Profile</a>
    </nav>

   <script>
    async function loadHomeLegends() {
        const container = document.getElementById('home-legend-view');
        try {
            const response = await fetch('legendplayer.json'); 
            const data = await response.json();
            const players = data.legend || data.players;
            
            container.innerHTML = "";
            players.slice(0, 6).forEach(p => {
                const card = document.createElement('div');
                card.className = 'top-card';
                card.innerHTML = `<img src="${p.img}"><p>${p.name}</p>`;
                
                card.onclick = () => {
                    localStorage.setItem('selected_player', JSON.stringify(p)); 
                    window.location.href = 'legendbio.html'; 
                };
                container.appendChild(card);
            });
        } catch (e) {
            container.innerHTML = "Error loading data";
        }
    }

    // Adsgram logic
    window.onload = () => {
        loadHomeLegends();
        try {
            if (window.Adsgram) {
                const ad = window.Adsgram.init({ blockId: "আপনার_ব্যানার_ID" });
                ad.show().catch(e => console.log(e));
            }
        } catch (e) {}
    };
   </script>
</body>
</html>
