<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #3b82f6; --bg: #020617; --card-bg: #0f172a; --border: #1e293b; --text-dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; padding-bottom: 80px; }

        .header { background: #0f172a; padding: 20px; border-bottom: 1px solid var(--border); text-align: center; position: sticky; top: 0; z-index: 1000; }
        .header h2 { font-size: 20px; letter-spacing: 1px; }

        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Home Menu Styles */
        .main-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 10px 0 25px 0; }
        .menu-btn { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid var(--border); padding: 25px; border-radius: 18px; text-align: center; cursor: pointer; transition: 0.2s; }
        .menu-btn i { font-size: 28px; color: var(--primary); margin-bottom: 10px; display: block; }

        /* Legend Card View */
        .legend-list { display: flex; flex-direction: column; gap: 12px; }
        .legend-card-wide { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; 
            display: flex; align-items: center; padding: 10px; cursor: pointer; 
        }
        .legend-card-wide img { width: 75px; height: 100px; border-radius: 10px; object-fit: cover; border: 1px solid var(--primary); }
        .legend-info { margin-left: 15px; flex-grow: 1; }
        .pos-tag { background: var(--primary); color: white; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; margin-bottom: 5px; display: inline-block; }

        /* Ad Overlay */
        .ad-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .ad-box { background: white; color: black; width: 85%; padding: 20px; border-radius: 15px; text-align: center; position: relative; }
        .close-ad { position: absolute; top: -10px; right: -10px; background: #ef4444; color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0f172a; display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); text-decoration: none; font-size: 10px; }
        .nav-link i { font-size: 22px; margin-bottom: 4px; }
        .nav-link.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <h2>eFootball <span style="color:var(--primary)">HUB</span></h2>
    </div>

    <div id="home" class="page active-page">
        <div class="main-menu">
            <div class="menu-btn" onclick="showPage('page-player')"><i class="fas fa-users"></i><span>Player (ID 1)</span></div>
            <div class="menu-btn" onclick="showPage('page-manager')"><i class="fas fa-user-tie"></i><span>Manager (ID 2)</span></div>
            <div class="menu-btn" onclick="showPage('page-event')"><i class="fas fa-trophy"></i><span>Events (ID 3)</span></div>
            <div class="menu-btn" onclick="showPage('page-legend')"><i class="fas fa-crown"></i><span>Legend (ID 4)</span></div>
        </div>
        <h3 style="font-size: 14px; color: var(--primary); margin-bottom: 15px;">TOP PLAYERS</h3>
        <div id="top-players-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;"></div>
    </div>

    <div id="page-legend" class="page">
        <h3 style="margin-bottom:15px; color: var(--primary);">Legend Card View</h3>
        <div class="legend-list" id="legends-render-area">
            </div>
    </div>

    <div id="page-coming-soon" class="page">
        <div style="text-align: center; margin-top: 50px;">
            <i class="fas fa-clock" style="font-size: 60px; color: var(--primary); margin-bottom: 20px;"></i>
            <h2>Info is Coming Soon</h2>
            <p style="color: var(--text-dim); margin-top: 10px;">We are working on player stats.</p>
            <button onclick="showPage('home')" style="margin-top:20px; padding: 10px 20px; background: var(--border); border: none; color: white; border-radius: 8px;">Back to Home</button>
        </div>
    </div>

    <div id="ad-popup" class="ad-overlay">
        <div class="ad-box">
            <div class="close-ad" onclick="closeAd()">X</div>
            <p style="color: grey; font-size: 10px;">TEST AD</p>
            <div style="height: 150px; background: #eee; margin: 15px 0; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                <b>AdsGram Test Ad</b>
            </div>
            <button style="width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 5px;">Visit Sponsor</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="javascript:void(0)" class="nav-link active" onclick="showPage('home')"><i class="fas fa-home"></i>Home</a>
        <a href="javascript:void(0)" class="nav-link" onclick="showPage('page-legend')"><i class="fas fa-crown"></i>Legend</a>
        <a href="javascript:void(0)" class="nav-link" onclick="showPage('page-coming-soon')"><i class="fas fa-gem"></i>Task</a>
        <a href="javascript:void(0)" class="nav-link" onclick="showPage('home')"><i class="fas fa-user-alt"></i>Profile</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Cloudinary Data (Based on your links)
        const legends = [
            { name: "K. Rummenigge", pos: "CF", img: "https://res.cloudinary.com/dyqegwdme/image/upload/q_auto/f_auto/v1775470946/K._Heinz_Rummenigge_tucqrv.png" },
            { name: "Pele", pos: "SS", img: "https://res.cloudinary.com/dyqegwdme/image/upload/q_auto/f_auto/v1775470969/Pele_wudkac.png" },
            { name: "Lionel Messi", pos: "SS", img: "https://res.cloudinary.com/dyqegwdme/image/upload/q_auto/f_auto/v1775470967/Lionel_Messi_cjusph.png" },
            { name: "Diego Maradona", pos: "SS", img: "https://res.cloudinary.com/dyqegwdme/image/upload/q_auto/f_auto/v1775470966/Diego_Maradona_xjo0gg.png" },
            { name: "Franck Ribery", pos: "LWF", img: "https://res.cloudinary.com/dyqegwdme/image/upload/q_auto/f_auto/v1775471167/Franck_Ribery_kfskxt.png" },
            { name: "Luis Figo", pos: "RWF", img: "https://res.cloudinary.com/dyqegwdme/image/upload/q_auto/f_auto/v1775471160/Luis_Figo_btsf31.png" },
            { name: "Gareth Bale", pos: "LMF", img: "https://res.cloudinary.com/dyqegwdme/image/upload/q_auto/f_auto/v1775471200/Gareth_Bale_vxoe6t.png" },
            { name: "Cafu", pos: "RMF", img: "https://res.cloudinary.com/dyqegwdme/image/upload/q_auto/f_auto/v1775471191/Cafu_u4ctam.png" },
            { name: "Andres Iniesta", pos: "CMF", img: "https://res.cloudinary.com/dyqegwdme/image/upload/q_auto/f_auto/v1775471223/Andres_Iniesta_f6djcy.png" },
            { name: "Andrea Pirlo", pos: "DMF", img: "https://res.cloudinary.com/dyqegwdme/image/upload/q_auto/f_auto/v1775471237/Andrea_Pirlo_psnvig.png" },
            { name: "Franco Baresi", pos: "CB", img: "https://res.cloudinary.com/dyqegwdme/image/upload/q_auto/f_auto/v1775472137/Franco_Baresi_n7ftqj.png" },
            { name: "Cafu", pos: "RB", img: "https://res.cloudinary.com/dyqegwdme/image/upload/q_auto/f_auto/v1775471251/Cafu_q8ip7b.png" },
            { name: "Martin Caceres", pos: "LB", img: "https://res.cloudinary.com/dyqegwdme/image/upload/q_auto/f_auto/v1775472221/Martin_Caceres_sbmmyl.png" },
            { name: "Peter Schmeichel", pos: "GK", img: "https://res.cloudinary.com/dyqegwdme/image/upload/q_auto/f_auto/v1775472276/Peter_Schmeichel_lnpuvq.png" }
        ];

        const posOrder = ["CF", "SS", "LWF", "RWF", "LMF", "RMF", "CMF", "DMF", "CB", "RB", "LB", "GK"];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function renderLegends() {
            const area = document.getElementById('legends-render-area');
            area.innerHTML = '';
            
            posOrder.forEach(pos => {
                const filtered = legends.filter(p => p.pos === pos);
                filtered.forEach(p => {
                    area.innerHTML += `
                        <div class="legend-card-wide" onclick="showAd()">
                            <img src="${p.img}">
                            <div class="legend-info">
                                <div class="pos-tag">${p.pos}</div>
                                <h3>${p.name}</h3>
                            </div>
                            <i class="fas fa-chevron-right" style="color:var(--text-dim)"></i>
                        </div>
                    `;
                });
            });
        }

        function showAd() {
            tg.HapticFeedback.notificationOccurred('success');
            document.getElementById('ad-popup').style.display = 'flex';
        }

        function closeAd() {
            document.getElementById('ad-popup').style.display = 'none';
            showPage('page-coming-soon');
        }

        window.onload = () => {
            renderLegends();
            // Top Players sample on home
            const homeGrid = document.getElementById('top-players-grid');
            legends.slice(0, 6).forEach(p => {
                homeGrid.innerHTML += `<div style="background:var(--card-bg); border-radius:10px; padding:5px; text-align:center;">
                    <img src="${p.img}" style="width:100%; border-radius:8px;">
                    <p style="font-size:10px; margin-top:5px;">${p.name}</p>
                </div>`;
            });
        };
    </script>
</body>
</html>
