<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card-dark: #121e36; --primary: #3b82f6; --text: #ffffff; --border: #1e2d4d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding-bottom: 80px; overflow-x: hidden; }
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UI Elements */
        .hub-title { text-align: center; margin: 15px 0; font-weight: bold; font-size: 20px; color: var(--primary); }
        .id-grid, .pos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .id-btn, .pos-btn { background: var(--card-dark); border: 1px solid var(--border); padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; color: white; }
        
        /* Card View - 2 Cards per row */
        .top-players-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .top-card { background: var(--card-dark); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        .top-card img { width: 100%; height: auto; display: block; }
        
        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #070d19; display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: #94a3b8; font-size: 11px; padding-top: 15px; cursor: pointer; }
        .active-nav { color: var(--primary); font-weight: bold; }

        /* Ads Placeholder */
        #banner-ad { width: 100%; min-height: 50px; background: #121e36; margin: 10px 0; border-radius: 5px; text-align: center; line-height: 50px; font-size: 10px; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="hub-title">eFootball HUB</div>
        
        <div class="id-grid">
            <div class="id-btn" onclick="showPage('page-player')"><i class="fas fa-users"></i><br>Player</div>
            <div class="id-btn" onclick="showPage('page-legend')"><i class="fas fa-crown"></i><br>Legend</div>
        </div>

        <div style="margin: 20px 0; font-weight: bold;">TOP PLAYERS (10)</div>
        <div class="top-players-container" id="home-top-players">
            </div>
    </div>

    <div id="page-player" class="page">
        <div class="hub-title"><i class="fas fa-arrow-left" onclick="showPage('home')" style="float:left;"></i> PLAYER POSITIONS</div>
        <div id="banner-ad">Banner Ad Loading...</div>
        <div class="pos-grid">
            <div class="pos-btn" onclick="openPosition('CF')">CF</div>
            <div class="pos-btn" onclick="openPosition('SS')">SS</div>
            <div class="pos-btn" onclick="openPosition('LWF')">LWF</div>
            <div class="pos-btn" onclick="openPosition('RWF')">RWF</div>
            <div class="pos-btn" onclick="openPosition('AMF')">AMF</div>
            <div class="pos-btn" onclick="openPosition('CMF')">CMF</div>
            <div class="pos-btn" onclick="openPosition('DMF')">DMF</div>
            <div class="pos-btn" onclick="openPosition('CB')">CB</div>
            <div class="pos-btn" onclick="openPosition('LB')">LB</div>
            <div class="pos-btn" onclick="openPosition('RB')">RB</div>
            <div class="pos-btn" onclick="openPosition('GK')">GK</div>
        </div>
    </div>

    <div id="page-legend" class="page">
        <div class="hub-title"><i class="fas fa-arrow-left" onclick="showPage('home')" style="float:left;"></i> LEGEND CARDS</div>
        <div id="banner-ad">Banner Ad Loading...</div>
        <div class="top-players-container" id="legend-list-view">
            </div>
    </div>

    <div id="page-details" class="page">
        <div class="hub-title"><i class="fas fa-arrow-left" onclick="showPage('home')"></i> DETAILS</div>
        <div id="details-content" style="text-align:center; padding:20px;"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active-nav" onclick="showPage('home')"><i class="fas fa-home"></i><br>Home</div>
        <div class="nav-item" onclick="showPage('page-legend')"><i class="fas fa-crown"></i><br>Legend</div>
        <div class="nav-item" onclick="showPage('page-task')"><i class="fas fa-tasks"></i><br>Task</div>
        <div class="nav-item" onclick="showPage('page-profile')"><i class="fas fa-user"></i><br>Profile</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Adsgram Integration
        const AdController = window.Adsgram.init({ blockId: "YOUR_BLOCK_ID" }); // আপনার ID এখানে বসান

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Show Reward Ad when opening a new page
            if(id !== 'home') {
                AdController.show().then((result) => {
                    console.log("Ad completed", result);
                }).catch((result) => {
                    console.error("Ad error", result);
                });
            }
        }

        async function loadHomePlayers() {
            const container = document.getElementById('home-top-players');
            // ১০টি কার্ড জেনারেট করা
            for(let i=1; i<=10; i++) {
                const card = document.createElement('div');
                card.className = 'top-card';
                card.innerHTML = `<img src="https://res.cloudinary.com/dyqegwdme/image/upload/v1775470946/K._Heinz_Rummenigge_tucqrv.png"><p style="font-size:10px; padding:5px; text-align:center;">Top Player ${i}</p>`;
                card.onclick = () => showPage('page-details');
                container.appendChild(card);
            }
        }

        async function loadLegendCards() {
            const container = document.getElementById('legend-list-view');
            container.innerHTML = "";
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                data.legend.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'top-card';
                    card.innerHTML = `<img src="${p.img}"><p style="font-size:10px; padding:5px; text-align:center;">${p.name}</p>`;
                    card.onclick = () => showPage('page-details');
                    container.appendChild(card);
                });
            } catch (e) { console.log("Data Load Error"); }
        }

        function openPosition(pos) {
            alert(pos + " bio ami pore dibo.");
            showPage('page-details');
        }

        // Initial Load
        loadHomePlayers();
        loadLegendCards();
    </script>
</body>
</html>
