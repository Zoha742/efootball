<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card-dark: #121e36; --primary: #3b82f6; --text: #ffffff; --border: #1e2d4d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; overflow-x: hidden; }
        .container { padding: 15px; }
        .hub-title { text-align: center; margin: 15px 0 25px; font-weight: bold; font-size: 20px; text-transform: uppercase; }
        .hub-title span { color: var(--primary); }
        .balance-card { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 20px; border-radius: 20px; border: 1px solid var(--border); text-align: center; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .nav-btn { background: var(--card-dark); border: 1px solid var(--border); padding: 20px; border-radius: 18px; color: white; text-decoration: none; text-align: center; transition: 0.3s; position: relative; overflow: hidden; }
        .nav-btn:active { transform: scale(0.95); }
        .nav-btn i { font-size: 24px; margin-bottom: 10px; display: block; color: var(--primary); }
        .nav-btn span { font-size: 14px; font-weight: 500; }
        .section-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; padding: 0 5px; }
        .top-players-container { display: flex; gap: 15px; overflow-x: auto; padding: 5px; scrollbar-width: none; }
        .top-players-container::-webkit-scrollbar { display: none; }
        .top-card { min-width: 100px; background: var(--card-dark); border-radius: 15px; padding: 10px; text-align: center; border: 1px solid var(--border); }
        .top-card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; border: 2px solid var(--primary); }
        .top-card p { font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .navigation-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(18, 30, 54, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { color: #64748b; text-decoration: none; text-align: center; font-size: 10px; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="hub-title">eFootball <span>HUB</span></div>

        <div class="balance-card">
            <p style="font-size: 12px; color: #94a3b8; letter-spacing: 1px;">TOTAL ASSETS</p>
            <h1 id="user-gp" style="font-size: 36px; margin: 8px 0; font-weight: 800; color: #fbbf24;">0 GP</h1>
            <div style="font-size: 11px; color: #22c55e; background: rgba(34, 197, 94, 0.1); padding: 4px 12px; border-radius: 20px; display: inline-block;">
                <i class="fas fa-shield-alt"></i> Verified Account
            </div>
        </div>

        <div class="btn-grid">
            <a href="earn.html" class="nav-btn"><i class="fas fa-play-circle"></i><span>Earn GP</span></a>
            <a href="task.html" class="nav-btn"><i class="fas fa-tasks"></i><span>Daily Tasks</span></a>
            <a href="wallet.html" class="nav-btn"><i class="fas fa-wallet"></i><span>My Wallet</span></a>
            <a href="withdraw.html" class="nav-btn"><i class="fas fa-money-bill-wave"></i><span>Withdraw</span></a>
            <a href="refer.html" class="nav-btn"><i class="fas fa-user-plus"></i><span>Invite Friends</span></a>
            <a href="support.html" class="nav-btn"><i class="fas fa-headset"></i><span>Support</span></a>
        </div>

        <div class="section-title">
            <span>Top Legends</span>
            <a href="#" style="color: var(--primary); font-size: 12px; text-decoration: none;">View All</a>
        </div>
        <div class="top-players-container" id="players-list">
            </div>
    </div>

    <div class="navigation-bar">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="earn.html" class="nav-item"><i class="fas fa-coins"></i>Earn</a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-exchange-alt"></i>Payout</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i>Profile</a>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAy2nEcb--kbjU7tSIm6lJG5ZpEFSus7sg",
            authDomain: "efootball-57d9b.firebaseapp.com",
            projectId: "efootball-57d9b",
            storageBucket: "efootball-57d9b.firebasestorage.app",
            messagingSenderId: "1031993322489",
            appId: "1:1031993322489:web:0336c8e1869318a8222b28"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe?.user;
        const userId = user ? String(user.id) : "774900";

        // ১. রিয়েল-টাইম ব্যালেন্স আপডেট (Firebase থেকে)
        db.ref('users/' + userId).on('value', (snap) => {
            if (snap.exists()) {
                document.getElementById('user-gp').innerText = (snap.val().gp || 0).toLocaleString() + " GP";
            } else {
                // নতুন ইউজার হলে ডাটাবেসে তৈরি করা
                db.ref('users/' + userId).set({
                    id: userId,
                    name: user ? user.first_name : "Guest",
                    gp: 0,
                    joined: new Date().toLocaleString()
                });
            }
        });

        // ২. রেফারেল বোনাস কমান্ড (Firebase logic)
        const startParam = tg.initDataUnsafe?.start_param;
        if (startParam && startParam !== userId) {
            db.ref('users/' + userId + '/refer_claimed').once('value').then((snap) => {
                if (!snap.exists()) {
                    db.ref('config/refer_bonus').once('value').then((bonusSnap) => {
                        const bonus = bonusSnap.val() || 1000;
                        
                        // নতুন ইউজারকে বোনাস
                        db.ref('users/' + userId + '/gp').transaction(c => (c || 0) + bonus);
                        db.ref('users/' + userId + '/refer_claimed').set(true);
                        
                        // রেফারকারীকে বোনাস
                        db.ref('users/' + startParam + '/gp').transaction(c => (c || 0) + bonus);
                        
                        alert(`Referral link theke join koray apni ${bonus} GP bonus peyechen!`);
                    });
                }
            });
        }

        // ৩. টপ প্লেয়ার লিস্ট লোড করা (JSON command preserved)
        async function loadPlayers() {
            const container = document.getElementById('players-list');
            try {
                const res = await fetch('https://raw.githubusercontent.com/Fahim-Xer/Top-players/main/Players.json');
                const players = await res.json();
                players.slice(0, 6).forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'top-card';
                    card.innerHTML = `<img src="${p.img}"><p>${p.name}</p>`;
                    card.onclick = () => {
                        localStorage.setItem('selected_player', JSON.stringify(p)); 
                        window.location.href = 'legendbio.html'; 
                    };
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = "<p style='font-size:10px;'>Legends Loading...</p>";
            }
        }
        loadPlayers();

        // ৪. Adsgram Initialization (Preserved)
        const AdController = window.Adsgram?.init({ blockId: "YOUR_BLOCK_ID" });
    </script>
</body>
</html>
