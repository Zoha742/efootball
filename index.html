<style>
    /* Home Page Position Card */
    .pos-selection-card {
        background: white;
        border-radius: 25px;
        padding: 20px;
        margin: 20px 0;
        color: #0891b2;
    }
    .pos-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 15px;
    }
    .pos-btn {
        background: #f1f5f9;
        border: none;
        padding: 15px;
        border-radius: 12px;
        font-weight: bold;
        color: #1e293b;
        text-align: center;
    }
    /* Colorful Buttons from your screenshot */
    .btn-premium { background: #f59e0b; }
    .btn-club { background: #3b82f6; }
    .btn-leader { background: #f97316; }
    .btn-order { background: #ef4444; }
</style>

<div id="home" class="page active-page">
    <div class="main-menu">
        <div class="menu-btn btn-premium">PREMIUM STORE</div>
        <div class="menu-btn btn-club">CLUB & LEAGUE</div>
        <div class="menu-btn btn-leader">LEADERBOARD</div>
        <div class="menu-btn btn-order">MY ORDERS</div>
    </div>

    <div class="pos-selection-card">
        <h3>Select Position</h3>
        <div class="pos-grid">
            <div class="pos-btn" onclick="loadData('legend')">Forward</div>
            <div class="pos-btn" onclick="loadData('legend')">Midfielder</div>
            <div class="pos-btn" onclick="loadData('legend')">Defender</div>
            <div class="pos-btn" onclick="loadData('legend')">Goalkeeper</div>
        </div>
    </div>
</div>
