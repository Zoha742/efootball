<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #020617; color: white; padding-bottom: 80px; }

        /* Header & Search */
        .header { background: #0f172a; padding: 15px; border-bottom: 1px solid #1e293b; position: sticky; top: 0; z-index: 100; }
        .search-container { position: relative; width: 100%; margin-top: 10px; }
        .search-container input { width: 100%; padding: 10px 40px 10px 15px; border-radius: 20px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; }
        .search-container i { position: absolute; right: 15px; top: 12px; color: #94a3b8; }

        /* Home Dashboard Grid */
        .container { padding: 15px; }
        .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .home-card { background: #0f172a; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #1e293b; }
        .home-card i { font-size: 20px; display: block; margin-bottom: 8px; color: #3b82f6; }
        .home-card p { font-size: 13px; font-weight: 500; }

        /* Player List (Small Cards) */
        .player-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .player-card { background: #111827; border-radius: 8px; overflow: hidden; border: 1px solid #1e293b; text-align: center; padding-bottom: 5px; }
        .player-card img { width: 100%; height: 80px; object-fit: cover; }
        .player-card p { font-size: 11px; margin-top: 4px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 2px; }

        /* Navigation Bar */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #0f172a; display: flex; border-top: 1px solid #1e293b; z-index: 1000; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; text-decoration: none; font-size: 10px; position: relative; }
        .nav-link i { font-size: 18px; margin-bottom: 3px; }
        .nav-link.active { color: #3b82f6; }

        /* Sub-menu Styles */
        .sub-menu { display: none; position: absolute; bottom: 70px; background: #1e293b; width: 140px; border-radius: 8px; border: 1px solid #334155; box-shadow: 0 10px 15px rgba(0,0,0,0.5); }
        .sub-menu a { display: block; padding: 10px; color: white; text-decoration: none; border-bottom: 1px solid #334155; font-size: 12px; }
        .sub-menu.show { display: block; }

        /* Profile Area (Right Side) */
        .profile-content { text-align: center; padding: 20px; display: none; }
        .profile-content img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #3b82f6; margin-bottom: 10px; }
        
        .page-active { display: block !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header" id="main-header">
        <h2 style="font-size: 18px; text-align: center;">eFootball <span style="color:#3b82f6">HUB</span></h2>
        <div class="search-container">
            <input type="text" placeholder="Search player name..." onkeyup="filterPlayers(this.value)">
            <i class="fas fa-search"></i>
        </div>
    </div>

    <div id="home-page" class="container page-active">
        <div class="home-grid">
            <div class="home-card" onclick="alert('Events')"><i class="fas fa-calendar-alt" style="color:#f87171"></i><p>Events</p></div>
            <div class="home-card" onclick="showPlayerCategory('Legend')"><i class="fas fa-crown" style="color:#fbbf24"></i><p>Legend</p></div>
            <div class="home-card" onclick="alert('Mining Started!')"><i class="fas fa-hammer" style="color:#4ade80"></i><p>Mining</p></div>
            <div class="home-card" onclick="alert('Other Button')"><i class="fas fa-plus-circle" style="color:#a78bfa"></i><p>Extras</p></div>
        </div>

        <h3 style="margin-top:20px; font-size: 14px; color: #3b82f6;">RECOMMENDED PLAYERS</h3>
        <div class="player-grid" id="player-list">
            <div class="player-card"><img src="https://via.placeholder.com/100" alt="P"><p>Messi</p></div>
            <div class="player-card"><img src="https://via.placeholder.com/100" alt="P"><p>Ronaldo</p></div>
            <div class="player-card"><img src="https://via.placeholder.com/100" alt="P"><p>Mbappe</p></div>
            <div class="player-card"><img src="https://via.placeholder.com/100" alt="P"><p>Neymar</p></div>
            <div class="player-card"><img src="https://via.placeholder.com/100" alt="P"><p>Haaland</p></div>
            <div class="player-card"><img src="https://via.placeholder.com/100" alt="P"><p>Vini Jr</p></div>
        </div>
    </div>

    <div id="profile-page" class="profile-content">
        <img src="https://via.placeholder.com/80" id="user-img">
        <h2 id="user-name">Loading...</h2>
        <p id="user-id" style="color:#94a3b8; margin-bottom: 20px;">ID: #00000</p>
        <div style="background:#0f172a; padding:15px; border-radius:10px; border: 1px solid #1e293b;">
            <p>Rank: <span style="color:#fbbf24">Legendary</span></p>
            <p>Total Points: 15,200</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="javascript:void(0)" class="nav-link active" onclick="navigate('home')">
            <i class="fas fa-home"></i>Home
        </a>

        <div class="nav-link" onclick="toggleSubMenu()">
            <i class="fas fa-users"></i>Players
            <div class="sub-menu" id="player-sub">
                <a href="#" onclick="showPlayerCategory('All')">Player List</a>
                <a href="#" onclick="showPlayerCategory('Country')">Country Wise</a>
                <a href="#" onclick="showPlayerCategory('League')">League Wise</a>
                <a href="#" onclick="showPlayerCategory('Legend')">Legends</a>
            </div>
        </div>

        <a href="javascript:void(0)" class="nav-link" onclick="alert('Compare Mode')">
            <i class="fas fa-exchange-alt"></i>Compare
        </a>

        <a href="javascript:void(0)" class="nav-link" onclick="navigate('profile')">
            <i class="fas fa-user-circle"></i>Profile
        </a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ইউজার ডাটা
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name;
            document.getElementById('user-id').innerText = "ID: #" + user.id;
            if(user.photo_url) document.getElementById('user-img').src = user.photo_url;
        }

        // নেভিগেশন লজিক
        function navigate(page) {
            document.getElementById('player-sub').classList.remove('show');
            if(page === 'home') {
                document.getElementById('home-page').classList.add('page-active');
                document.getElementById('profile-page').classList.remove('page-active');
                document.getElementById('main-header').classList.remove('hidden');
            } else if (page === 'profile') {
                document.getElementById('home-page').classList.remove('page-active');
                document.getElementById('profile-page').classList.add('page-active');
                document.getElementById('main-header').classList.add('hidden');
            }
            tg.HapticFeedback.impactOccurred('light');
        }

        // সাব-মেনু টগল
        function toggleSubMenu() {
            document.getElementById('player-sub').classList.toggle('show');
        }

        // প্লেয়ার ফিল্টার (Search Box)
        function filterPlayers(val) {
            const players = document.querySelectorAll('.player-card');
            players.forEach(card => {
                const name = card.innerText.toLowerCase();
                if(name.includes(val.toLowerCase())) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }

        function showPlayerCategory(cat) {
            alert("Loading " + cat + " Players...");
            document.getElementById('player-sub').classList.remove('show');
        }
    </script>
</body>
</html>
