<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card-dark: #121e36; --primary: #3b82f6; --text: #ffffff; --border: #1e2d4d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; }
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .hub-title { text-align: center; margin: 15px 0 25px; font-weight: bold; font-size: 20px; text-transform: uppercase; }
        .hub-title span { color: var(--primary); }

        /* Main Grid Layout */
        .id-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .id-btn { background: var(--card-dark); border: 1px solid var(--border); padding: 25px 15px; border-radius: 18px; text-align: center; cursor: pointer; }
        .id-btn i { font-size: 28px; color: var(--primary); margin-bottom: 12px; display: block; }

        /* Position Grid (CF to GK) */
        .pos-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .pos-btn { background: var(--card-dark); border: 1px solid var(--primary); padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; cursor: pointer; font-size: 12px; }

        /* Quick Actions */
        .section-title { color: var(--text); font-size: 14px; font-weight: bold; text-transform: uppercase; margin: 20px 0 12px; }
        .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .quick-btn { border: none; padding: 20px 10px; border-radius: 12px; text-align: center; cursor: pointer; color: #fff; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .q-store { background: #f97316; } .q-task { background: #ec4899; }
        .q-leader { background: #3b82f6; } .q-club { background: #22c55e; }

        /* Card View (2 per row) */
        .top-players-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .top-card { background: var(--card-dark); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; text-align: center; }
        .top-card img { width: 100%; height: auto; display: block; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #070d19; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { text-align: center; color: #94a3b8; font-size: 11px; cursor: pointer; flex: 1; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .active-nav { color: var(--primary); }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="hub-title">eFootball <span>HUB</span></div>
        <div class="id-grid">
            <div class="id-btn" onclick="openPage('page-player')"><i class="fas fa-users"></i><span>Player</span></div>
            <div class="id-btn" onclick="openPage('page-manager')"><i class="fas fa-user-tie"></i><span>Manager</span></div>
            <div class="id-btn" onclick="openPage('page-event')"><i class="fas fa-trophy"></i><span>Events</span></div>
            <div class="id-btn" onclick="openPage('page-legend')"><i class="fas fa-crown"></i><span>Legend</span></div>
        </div>

        <div class="section-title">QUICK ACTIONS</div>
        <div class="quick-grid">
            <div class="quick-btn q-store" onclick="openPage('page-store')"><i class="fas fa-shopping-cart"></i><span>Store</span></div>
            <div class="quick-btn q-task" onclick="openPage('page-task')"><i class="fas fa-clipboard-check"></i><span>Task</span></div>
            <div class="quick-btn q-leaderboard" onclick="openPage('page-store')"><i class="fas fa-shopping-cart"></i><span>Leaderboard</span></div>
            <div class="quick-btn q-ads" onclick="openPage('page-task')"><i class="fas fa-clipboard-check"></i><span>New Ads</span></div>
        </div>

        <div class="section-title">TOP PLAYERS</div>
        <div class="top-players-container" id="home-top-players">
            </div>
    </div>

    <div id="page-player" class="page">
        <div class="hub-title"><i class="fas fa-arrow-left" onclick="showPage('home')" style="float:left;"></i> SELECT <span>POSITION</span></div>
        <div class="pos-grid">
            <div class="pos-btn" onclick="openBio('CF')">CF</div>
            <div class="pos-btn" onclick="openBio('SS')">SS</div>
            <div class="pos-btn" onclick="openBio('LWF')">LWF</div>
            <div class="pos-btn" onclick="openBio('RWF')">RWF</div>
            <div class="pos-btn" onclick="openBio('AMF')">AMF</div>
            <div class="pos-btn" onclick="openBio('CMF')">CMF</div>
            <div class="pos-btn" onclick="openBio('DMF')">DMF</div>
            <div class="pos-btn" onclick="openBio('CB')">CB</div>
            <div class="pos-btn" onclick="openBio('LB')">LB</div>
            <div class="pos-btn" onclick="openBio('RB')">RB</div>
            <div class="pos-btn" onclick="openBio('GK')">GK</div>
        </div>
    </div>

    <div id="page-legend" class="page">
        <div class="hub-title"><i class="fas fa-arrow-left" onclick="showPage('home')" style="float:left;"></i> LEGEND <span>CARDS</span></div>
        <div class="top-players-container" id="legend-list-view"></div>
    </div>

    <div id="page-details" class="page">
        <div class="hub-title"><i class="fas fa-arrow-left" onclick="showPage('home')"></i> PLAYER <span>DETAILS</span></div>
        <div id="details-content" style="text-align:center;"></div>
    </div>

    <div id="page-task" class="page">Task Page Contents</div>
    <div id="page-profile" class="page">Profile Page Contents</div>

    <nav class="bottom-nav">
        <div class="nav-item active-nav" onclick="showPage('home')"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item" onclick="showPage('page-legend')"><i class="fas fa-crown"></i>Legend</div>
        <div class="nav-item" onclick="showPage('page-task')"><i class="fas fa-clipboard-check"></i>Task</div>
        <div class="nav-item" onclick="showPage('page-profile')"><i class="fas fa-user-circle"></i>Profile</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Adsgram Integration (Block ID আপনারটা বসাবেন)
        const AdController = window.Adsgram.init({ blockId: "YOUR_BLOCK_ID" });

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');

            // Ads command on new page
            if(id !== 'home') {
                AdController.show().catch(() => { console.log("Ad Error"); });
            }

            if(id === 'page-legend') loadLegendData();
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            tg.HapticFeedback.impactOccurred('light');
        }

        function openPage(pageId) { showPage(pageId); }

        function loadHomePlayers() {
            const container = document.getElementById('home-top-players');
            container.innerHTML = "";
            const sampleImg = "https://res.cloudinary.com/dyqegwdme/image/upload/v1775470946/K._Heinz_Rummenigge_tucqrv.png";
            
            for(let i=1; i<=10; i++) {
                const card = document.createElement('div');
                card.className = 'top-card';
                card.innerHTML = `<img src="${sampleImg}"><p style="font-size:10px; padding:5px;">Top Player ${i}</p>`;
                card.onclick = () => openBio("Top Player " + i);
                container.appendChild(card);
            }
        }

        async function loadLegendData() {
            const container = document.getElementById('legend-list-view');
            container.innerHTML = "Loading...";
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                container.innerHTML = "";
                data.legend.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'top-card';
                    card.innerHTML = `<img src="${p.img}"><p style="font-size:10px; padding:5px;">${p.name}</p>`;
                    card.onclick = () => openBio(p.name);
                    container.appendChild(card);
                });
            } catch (e) { container.innerHTML = "Error!"; }
        }

        function openBio(title) {
            showPage('page-details');
            document.getElementById('details-content').innerHTML = `<h2>${title}</h2><p>Bio details soon...</p>`;
        }

        window.onload = loadHomePlayers;
    </script>
</body>
</html>
