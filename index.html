<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121a2d; --primary: #3b82f6; --text: #f8fafc; --accent: #4ade80; --border: #1e293b; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .page { display: none; padding: 15px; }
        .active { display: block; }

        /* Navigation Buttons */
        .id-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .id-btn { background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 15px; text-align: center; }
        .id-btn i { font-size: 22px; color: var(--primary); margin-bottom: 8px; display: block; }

        /* Quick Action Bottom Grid */
        .quick-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .qa-btn { background: var(--card); border: 1px solid var(--border); padding: 12px 2px; border-radius: 10px; text-align: center; font-size: 10px; cursor: pointer; }
        .qa-btn i { font-size: 18px; color: #f59e0b; margin-bottom: 5px; display: block; }

        /* Stats Overlay - 2 Column Fix */
        .stats-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .stat-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid #1e293b; }
        .stat-val { color: var(--accent); font-weight: bold; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0f172a; display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; font-size: 11px; cursor: pointer; }
        .nav-item.active-nav { color: var(--primary); }
        
        /* Card UI */
        .player-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 10px; }
        .player-card img { width: 100%; display: block; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <h3 style="text-align:center;">eFootball HUB</h3>
        <div class="id-grid">
            <div class="id-btn" onclick="showPage('page-player')"><i class="fas fa-users"></i>Player</div>
            <div class="id-btn" onclick="showPage('page-manager')"><i class="fas fa-user-tie"></i>Manager</div>
            <div class="id-btn" onclick="showPage('page-legend')"><i class="fas fa-crown"></i>Legend</div>
            <div class="id-btn" onclick="showPage('page-event')"><i class="fas fa-calendar-alt"></i>Event</div>
        </div>

        <div style="color:var(--primary); font-size:12px; font-weight:bold;">QUICK ACTIONS</div>
        <div class="quick-grid">
            <div class="qa-btn"><i class="fas fa-shopping-bag"></i>Store</div>
            <div class="qa-btn" onclick="showPage('page-task')"><i class="fas fa-hammer"></i>Mining</div>
            <div class="qa-btn"><i class="fas fa-list-ol"></i>Leaders</div>
            <div class="qa-btn" onclick="showPage('page-profile')"><i class="fas fa-cog"></i>Settings</div>
        </div>
    </div>

    <div id="stats-view" class="stats-overlay">
        <div style="display:flex; align-items:center; gap:15px;">
            <img id="st-img" src="" style="width:70px; border-radius:10px;">
            <div><h2 id="st-name" style="margin:0"></h2><p id="st-pos" style="color:var(--primary); margin:0;"></p></div>
        </div>
        <div class="stats-grid">
            <div><b style="font-size:11px; color:gray;">ATTACKING</b><div id="atk-stats"></div></div>
            <div><b style="font-size:11px; color:gray;">ATHLETICISM</b><div id="ath-stats"></div></div>
        </div>
        <button onclick="closeStats()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; margin-top:30px;">BACK</button>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active-nav" onclick="showPage('home')"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item" onclick="showPage('page-player')"><i class="fas fa-star"></i>Top Player</div>
        <div class="nav-item" onclick="showPage('page-task')"><i class="fas fa-tasks"></i>Task</div>
        <div class="nav-item" onclick="showPage('page-profile')"><i class="fas fa-user-circle"></i>Profile</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            tg.HapticFeedback.impactOccurred('medium');
        }
        function closeStats() { document.getElementById('stats-view').style.display = 'none'; }
        // ডাটা লোড ও অন্যান্য লজিক আগের মতোই থাকবে...
    </script>
</body>
</html>
