<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB - Official</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #020617; color: white; padding-bottom: 80px; }

        /* Header & Search Bar */
        .header { background: #0f172a; padding: 15px; border-bottom: 1px solid #1e293b; position: sticky; top: 0; z-index: 100; }
        .search-box { position: relative; width: 100%; margin-top: 10px; }
        .search-box input { width: 100%; padding: 12px 40px 12px 15px; border-radius: 25px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; }
        .search-box i { position: absolute; right: 15px; top: 14px; color: #3b82f6; }

        /* Navigation Layout */
        .container { padding: 15px; }
        .page { display: none; }
        .active-page { display: block; }

        /* Grid for IDs (Player, Manager, etc.) */
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card-small { background: #0f172a; border-radius: 10px; overflow: hidden; border: 1px solid #1e293b; text-align: center; padding-bottom: 8px; transition: 0.3s; }
        .card-small:active { transform: scale(0.95); }
        .card-small img { width: 100%; height: 80px; object-fit: cover; }
        .card-small p { font-size: 11px; font-weight: bold; margin-top: 5px; }

        /* Home Dashboard */
        .home-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .menu-btn { background: linear-gradient(145deg, #1e293b, #0f172a); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #334155; }
        .menu-btn i { font-size: 24px; color: #3b82f6; margin-bottom: 8px; display: block; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0f172a; display: flex; border-top: 1px solid #1e293b; justify-content: space-around; align-items: center; }
        .nav-item { color: #94a3b8; text-decoration: none; text-align: center; font-size: 10px; cursor: pointer; flex: 1; position: relative; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; display: block; }
        .nav-item.active { color: #3b82f6; }

        /* Sub-menu Popup */
        .sub-menu { display: none; position: absolute; bottom: 75px; background: #1e293b; width: 150px; border-radius: 10px; border: 1px solid #334155; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .sub-menu a { display: block; padding: 12px; color: white; text-decoration: none; font-size: 12px; border-bottom: 1px solid #334155; }
        .sub-menu.show { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-size: 18px; text-align: center;">eFootball <span style="color:#3b82f6">HUB</span></h2>
        <div class="search-box">
            <input type="text" placeholder="Search by name or ID..." onkeyup="searchGlobal(this.value)">
            <i class="fas fa-search"></i>
        </div>
    </div>

    <div id="home" class="container page active-page">
        <div class="home-menu">
            <div class="menu-btn" onclick="showPage('page-3')"><i class="fas fa-calendar-check"></i>Events (ID 3)</div>
            <div class="menu-btn" onclick="showPage('page-4')"><i class="fas fa-crown"></i>Legend (ID 4)</div>
            <div class="menu-btn" onclick="alert('Mining Started')"><i class="fas fa-microchip"></i>Mining</div>
            <div class="menu-btn" onclick="showPage('task-page')"><i class="fas fa-tasks"></i>Task</div>
        </div>
        <h3 style="font-size: 14px; color: #3b82f6; margin-bottom: 10px;">TOP PLAYERS</h3>
        <div class="grid-3" id="top-player-list">
            </div>
    </div>

    <div id="page-1" class="container page">
        <h3 class="section-title">PLAYER LIST (ID 1)</h3>
        <div class="grid-3" id="list-id-1"></div>
    </div>

    <div id="page-2" class="container page">
        <h3 class="section-title">MANAGER LIST (ID 2)</h3>
        <div class="grid-3" id="list-id-2"></div>
    </div>

    <div id="profile" class="container page" style="text-align: center;">
        <img src="" id="u-img" style="width: 100px; border-radius: 50%; border: 3px solid #3b82f6; margin-top: 20px;">
        <h2 id="u-name" style="margin-top: 10px;">User</h2>
        <p id="u-id" style="color: #94a3b8;">#000000</p>
        </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home')"><i class="fas fa-home"></i>Home</div>
        
        <div class="nav-item" onclick="toggleSub()">
            <i class="fas fa-users"></i>Players
            <div class="sub-menu" id="sub-menu">
                <a href="#" onclick="showPage('page-1')">Player List (ID 1)</a>
                <a href="#" onclick="showPage('page-2')">Manager List (ID 2)</a>
                <a href="#" onclick="showPage('page-4')">Legends (ID 4)</a>
            </div>
        </div>

        <div class="nav-item" onclick="showPage('task-page')"><i class="fas fa-coins"></i>Tasks</div>
        <div class="nav-item" onclick="showPage('profile')"><i class="fas fa-user-circle"></i>Profile</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ইউজার ইনফো সেট করা
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('u-name').innerText = user.first_name;
            document.getElementById('u-id').innerText = "ID: #" + user.id;
            if(user.photo_url) document.getElementById('u-img').src = user.photo_url;
        }

        // পেজ সুইচিং ফাংশন
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            document.getElementById('sub-menu').classList.remove('show');
            tg.HapticFeedback.impactOccurred('light');
        }

        function toggleSub() {
            document.getElementById('sub-menu').classList.toggle('show');
        }

        // তোমার ডিজাইন অনুযায়ী অটোমেটিক ২০টি বাটন/কার্ড জেনারেট করা
        function generateData(containerId, count, prefix) {
            const container = document.getElementById(containerId);
            for(let i=1; i<=count; i++) {
                container.innerHTML += `
                    <div class="card-small" onclick="alert('Details of ${prefix} ${i}')">
                        <img src="https://via.placeholder.com/150/1e293b/fff?text=${prefix}+${i}">
                        <p>${prefix} ${i}</p>
                    </div>
                `;
            }
        }

        // লোড করা হচ্ছে
        generateData('top-player-list', 9, 'Top Player');
        generateData('list-id-1', 20, 'Player');
        generateData('list-id-2', 15, 'Manager');

        // গ্লোবাল সার্চ ফাংশন
        function searchGlobal(query) {
            const cards = document.querySelectorAll('.card-small');
            cards.forEach(card => {
                if(card.innerText.toLowerCase().includes(query.toLowerCase())) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
