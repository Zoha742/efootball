<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121a2d; --primary: #3b82f6; --text: #f8fafc; --accent: #4ade80; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Home UI */
        .header { text-align: center; padding: 20px; font-size: 22px; font-weight: bold; letter-spacing: 1px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .menu-item { background: var(--card); border: 1px solid #1e293b; padding: 20px; border-radius: 18px; text-align: center; cursor: pointer; }
        .menu-item i { font-size: 24px; color: var(--primary); margin-bottom: 10px; display: block; }

        /* Card Lists */
        .section-title { color: var(--primary); font-size: 14px; font-weight: bold; margin: 20px 0 10px; text-transform: uppercase; }
        .card-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .player-card { background: var(--card); border-radius: 15px; border: 1px solid #1e293b; overflow: hidden; position: relative; }
        .player-card img { width: 100%; display: block; height: 180px; object-fit: cover; }
        .p-info { padding: 10px; text-align: center; font-size: 13px; }

        /* Stats Overlay (Updated Right Side Fix) */
        .stats-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .stats-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .stat-group-title { color: #94a3b8; font-size: 12px; margin-bottom: 10px; border-bottom: 1px solid #1e293b; padding-bottom: 5px; }
        .stat-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
        .stat-val { color: var(--accent); font-weight: bold; }
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0f172a; display: flex; border-top: 1px solid #1e293b; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; font-size: 11px; cursor: pointer; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active-nav { color: var(--primary); }

        .btn-close { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; margin-top: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="header">eFootball <span style="color:var(--primary)">HUB</span></div>
        <div class="menu-grid">
            <div class="menu-item" onclick="showPage('page-player')"><i class="fas fa-users"></i>Player (ID 1)</div>
            <div class="menu-item" onclick="showPage('page-manager')"><i class="fas fa-user-tie"></i>Manager (ID 2)</div>
            <div class="menu-item" onclick="showPage('page-event')"><i class="fas fa-trophy"></i>Events (ID 3)</div>
            <div class="menu-item" onclick="showPage('page-legend')"><i class="fas fa-crown"></i>Legend (ID 4)</div>
        </div>
        <div class="section-title">Top Players</div>
        <div class="card-container" id="top-list"></div>
    </div>

    <div id="page-player" class="page"><div class="section-title">All Players</div><div class="card-container" id="player-list"></div></div>
    <div id="page-manager" class="page"><div class="section-title">Managers</div><div class="card-container" id="manager-list"></div></div>
    <div id="page-event" class="page"><div class="section-title">Events</div><div class="card-container" id="event-list"></div></div>
    <div id="page-legend" class="page"><div class="section-title">Legends</div><div class="card-container" id="legend-list"></div></div>
    <div id="page-task" class="page"><div class="header">Tasks</div><p style="text-align:center">Coming Soon...</p></div>
    <div id="page-profile" class="page"><div class="header">Profile</div><p style="text-align:center">User Settings...</p></div>

    <div id="stats-view" class="stats-overlay">
        <div class="stats-header">
            <img id="st-img" src="" style="width: 80px; border-radius: 10px; border: 1px solid var(--primary);">
            <div><h2 id="st-name" style="margin:0"></h2><p id="st-pos" style="color:var(--primary); margin:5px 0 0;"></p></div>
        </div>
        
        <div class="stats-grid">
            <div>
                <div class="stat-group-title">ATTACKING</div>
                <div id="attacking-stats"></div>
            </div>
            <div>
                <div class="stat-group-title">ATHLETICISM</div>
                <div id="athletic-stats"></div>
            </div>
        </div>
        <button class="btn-close" onclick="closeStats()">CLOSE DETAILS</button>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active-nav" id="nav-home" onclick="showPage('home')"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item" id="nav-top" onclick="showPage('page-player')"><i class="fas fa-star"></i>Top Player</div>
        <div class="nav-item" id="nav-task" onclick="showPage('page-task')"><i class="fas fa-tasks"></i>Task</div>
        <div class="nav-item" id="nav-profile" onclick="showPage('page-profile')"><i class="fas fa-user-circle"></i>Profile</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            if(id === 'home') document.getElementById('nav-home').classList.add('active-nav');
            
            tg.HapticFeedback.impactOccurred('medium');
            loadData(id.replace('page-', ''));
        }

        async function loadData(type) {
            try {
                const res = await fetch('/api/players');
                const data = await res.json();
                const targetId = type === 'home' ? 'top-list' : `${type}-list`;
                const container = document.getElementById(targetId);
                if(!container) return;

                const players = data.legend || [];
                container.innerHTML = players.map(p => `
                    <div class="player-card" onclick="openStats('${p.id}')">
                        <img src="${p.image}">
                        <div class="p-info"><b>${p.position}</b><br>${p.name}</div>
                    </div>
                `).join('');
            } catch(e) { console.error("Error loading data"); }
        }

        async function openStats(id) {
            const res = await fetch('/api/players');
            const data = await res.json();
            const p = data.legend.find(x => x.id === id);
            
            document.getElementById('st-img').src = p.image;
            document.getElementById('st-name').innerText = p.name;
            document.getElementById('st-pos').innerText = p.position;

            const renderStats = (obj) => Object.entries(obj).map(([k, v]) => `
                <div class="stat-row"><span>${k}</span><span class="stat-val">${v}</span></div>
            `).join('');

            document.getElementById('attacking-stats').innerHTML = renderStats(p.stats.attacking);
            document.getElementById('athletic-stats').innerHTML = renderStats(p.stats.athleticism);
            
            document.getElementById('stats-view').style.display = 'block';
            tg.HapticFeedback.notificationOccurred('success');
        }

        function closeStats() { document.getElementById('stats-view').style.display = 'none'; }

        window.onload = () => loadData('home');
    </script>
</body>
</html>
