<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #020617; color: white; padding-bottom: 80px; }

        /* Header */
        .header { background: #0f172a; padding: 15px; text-align: center; border-bottom: 1px solid #1e293b; }
        
        /* Container */
        .container { padding: 15px; }
        .page { display: none; }
        .active-page { display: block; }

        /* Profile Styles */
        .profile-card { text-align: center; padding: 20px 0; border-bottom: 1px solid #1e293b; margin-bottom: 20px; }
        .profile-card img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #3b82f6; margin-bottom: 10px; }
        .profile-card h2 { font-size: 20px; margin-bottom: 2px; }
        .profile-card p { font-size: 12px; color: #94a3b8; }
        .divider { height: 2px; background: linear-gradient(90deg, transparent, #3b82f6, transparent); margin: 15px auto; width: 80%; }

        /* Menu List (Profile & Home) */
        .menu-list { display: flex; flex-direction: column; gap: 10px; }
        .menu-item { background: #0f172a; padding: 15px; border-radius: 12px; border: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: white; }
        .menu-item i { color: #3b82f6; width: 25px; }
        .point-text { color: #4ade80; font-weight: bold; }

        /* Home Grid */
        .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .category-card { background: #0f172a; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #1e293b; }
        .category-card i { font-size: 24px; margin-bottom: 10px; display: block; }

        /* Navigation Bar */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0f172a; display: flex; border-top: 1px solid #1e293b; z-index: 1000; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; text-decoration: none; font-size: 12px; }
        .nav-link i { font-size: 22px; margin-bottom: 4px; }
        .nav-link.active { color: #3b82f6; border-top: 3px solid #3b82f6; }

        /* Search Box inside Category */
        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #1e293b; background: #1e293b; color: white; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="home-page" class="container page active-page">
        <h3 style="margin-bottom: 15px; color: #3b82f6;">EXPLORE DATABASE</h3>
        <div class="home-grid">
            <div class="category-card" onclick="showSub('Player List')"><i class="fas fa-users" style="color:#60a5fa"></i>Player List</div>
            <div class="category-card" onclick="showSub('Country wise')"><i class="fas fa-globe" style="color:#4ade80"></i>Country wise</div>
            <div class="category-card" onclick="showSub('League wise')"><i class="fas fa-trophy" style="color:#f87171"></i>League wise</div>
            <div class="category-card" onclick="showSub('Legends')"><i class="fas fa-star" style="color:#fbbf24"></i>Legends</div>
            <div class="category-card" onclick="showSub('Managers')"><i class="fas fa-user-tie" style="color:#a78bfa"></i>Managers</div>
            <div class="category-card" onclick="alert('Mining Start!')"><i class="fas fa-hammer" style="color:#94a3b8"></i>Mining</div>
        </div>

        <div id="sub-content" style="margin-top: 30px; display: none;">
            <input type="text" class="search-box" id="categorySearch" placeholder="Search in this category...">
            <div id="item-display-list" style="text-align: center; color: #94a3b8;">
                Select a category to view items
            </div>
        </div>
    </div>

    <div id="profile-page" class="container page">
        <div class="profile-card">
            <img src="https://via.placeholder.com/80" id="user-pfp">
            <h2 id="user-name">Loading...</h2>
            <p id="user-id">ID: #00000000</p>
            <div class="divider"></div>
        </div>

        <div class="menu-list">
            <div class="menu-item">
                <span><i class="fas fa-coins"></i> Mining Points</span>
                <span class="point-text">1,250 GP</span>
            </div>
            <div class="menu-item" onclick="alert('Withdraw logic coming soon')">
                <span><i class="fas fa-wallet"></i> Withdraw Points</span>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="menu-item">
                <span><i class="fas fa-history"></i> History</span>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="menu-item">
                <span><i class="fas fa-headset"></i> Support</span>
                <i class="fas fa-chevron-right"></i>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="javascript:void(0)" class="nav-link active" id="home-btn" onclick="togglePage('home')">
            <i class="fas fa-home"></i>Home
        </a>
        <a href="javascript:void(0)" class="nav-link" id="profile-btn" onclick="togglePage('profile')">
            <i class="fas fa-user-circle"></i>Profile
        </a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ইউজার ডাটা সেটআপ
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name + " " + (user.last_name || "");
            document.getElementById('user-id').innerText = "ID: #" + user.id;
            if(user.photo_url) document.getElementById('user-pfp').src = user.photo_url;
        }

        // পেজ টগল ফাংশন
        function togglePage(page) {
            tg.HapticFeedback.impactOccurred('light');
            if(page === 'home') {
                document.getElementById('home-page').classList.add('active-page');
                document.getElementById('profile-page').classList.remove('active-page');
                document.getElementById('home-btn').classList.add('active');
                document.getElementById('profile-btn').classList.remove('active');
            } else {
                document.getElementById('home-page').classList.remove('active-page');
                document.getElementById('profile-page').classList.add('active-page');
                document.getElementById('home-btn').classList.remove('active');
                document.getElementById('profile-btn').classList.add('active');
            }
        }

        // সাব ক্যাটাগরি দেখানো
        function showSub(title) {
            document.getElementById('sub-content').style.display = 'block';
            document.getElementById('categorySearch').placeholder = "Search " + title + "...";
            document.getElementById('item-display-list').innerText = "Loading " + title + " list...";
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
