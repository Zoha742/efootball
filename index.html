<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB Database</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #020617; color: white; padding-bottom: 80px; overflow-x: hidden; }
        
        /* Header & User Profile */
        .profile-header { background: linear-gradient(180deg, #1e293b 0%, #020617 100%); padding: 30px 20px; text-align: center; border-bottom: 2px solid #3b82f6; }
        .user-photo { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #3b82f6; margin-bottom: 10px; }
        
        /* Sections */
        .container { padding: 15px; }
        .section-title { font-size: 18px; color: #3b82f6; margin: 20px 0 15px; padding-left: 10px; border-left: 4px solid #3b82f6; }

        /* Grid System (Left & Right Column) */
        .item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item-card { background: #0f172a; border-radius: 12px; overflow: hidden; border: 1px solid #1e293b; transition: 0.3s; text-align: center; cursor: pointer; }
        .item-card:active { transform: scale(0.95); }
        .item-card img { width: 100%; height: 120px; object-fit: cover; background: #1e293b; }
        .item-info { padding: 10px; }
        .item-name { font-size: 14px; font-weight: bold; color: #f8fafc; }
        .item-type { font-size: 11px; color: #3b82f6; text-transform: uppercase; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0f172a; display: flex; border-top: 1px solid #1e293b; z-index: 1000; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; text-decoration: none; font-size: 11px; }
        .nav-link i { font-size: 20px; margin-bottom: 4px; }
        .nav-link.active { color: #3b82f6; }

        /* Hidden Sections */
        .page-content { display: none; }
        .page-content.active { display: block; }
    </style>
</head>
<body>

    <div id="home-page" class="page-content active">
        <div class="profile-header">
            <img src="https://img.freepik.com/free-vector/user-blue-gradient_78370-4692.jpg" class="user-photo" id="user-pfp">
            <h2 id="user-full-name">Loading...</h2>
            <p id="user-id-tag" style="color: #94a3b8;">ID: #0000000</p>
            <div style="margin-top: 15px;">
                <span style="background: #1e293b; padding: 5px 15px; border-radius: 20px; font-size: 12px;">Rank: Legend</span>
            </div>
        </div>
        
        <div class="container">
            <div class="section-title">TOP CATEGORIES</div>
            <div class="item-grid">
                <div class="item-card" onclick="showPage('manager-page')">
                    <img src="https://e7.pngegg.com/pngimages/145/634/png-clipart-pep-guardiola-manchester-city-f-c-premier-league-fc-bayern-munich-manager-manchester-city-tshirt-blue.png">
                    <div class="item-info"><p class="item-name">MANAGERS</p></div>
                </div>
                <div class="item-card" onclick="showPage('player-page')">
                    <img src="https://w7.pngwing.com/pngs/303/793/png-transparent-lionel-messi-2018-world-cup-argentina-national-football-team-fc-barcelona-football-player-messi-tshirt-team-jersey.png">
                    <div class="item-info"><p class="item-name">PLAYERS</p></div>
                </div>
            </div>
        </div>
    </div>

    <div id="manager-page" class="page-content">
        <div class="container">
            <div class="section-title">FAMOUS MANAGERS (10)</div>
            <div class="item-grid" id="manager-list">
                </div>
        </div>
    </div>

    <div id="player-page" class="page-content">
        <div class="container">
            <div class="section-title">TOP PLAYERS (10)</div>
            <div class="item-grid" id="player-list">
                </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="javascript:void(0)" class="nav-link active" onclick="showPage('home-page')"><i class="fas fa-user-circle"></i>Profile</a>
        <a href="javascript:void(0)" class="nav-link" onclick="showPage('player-page')"><i class="fas fa-users"></i>Players</a>
        <a href="javascript:void(0)" class="nav-link" onclick="showPage('manager-page')"><i class="fas fa-user-tie"></i>Managers</a>
        <a href="javascript:void(0)" class="nav-link" onclick="alert('Coming Soon')"><i class="fas fa-exchange-alt"></i>Compare</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ইউজার ডাটা
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-full-name').innerText = user.first_name + " " + (user.last_name || "");
            document.getElementById('user-id-tag').innerText = "ID: #" + user.id;
            if(user.photo_url) document.getElementById('user-pfp').src = user.photo_url;
        }

        // পেজ সুইচিং ফাংশন
        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            // সিম্পল লজিক নেভ হাইলাইট করার জন্য
            tg.HapticFeedback.impactOccurred('light');
        }

        // ডাটা লিস্ট (২০টি বাটন)
        const managers = [
            { name: "P. Guardiola", img: "https://via.placeholder.com/150/1e293b/white?text=Pep" },
            { name: "J. Klopp", img: "https://via.placeholder.com/150/1e293b/white?text=Klopp" },
            { name: "C. Ancelotti", img: "https://via.placeholder.com/150/1e293b/white?text=Carlo" },
            { name: "Xavi", img: "https://via.placeholder.com/150/1e293b/white?text=Xavi" },
            { name: "M. Arteta", img: "https://via.placeholder.com/150/1e293b/white?text=Arteta" },
            { name: "E. Ten Hag", img: "https://via.placeholder.com/150/1e293b/white?text=Ten+Hag" },
            { name: "Z. Zidane", img: "https://via.placeholder.com/150/1e293b/white?text=Zidane" },
            { name: "Jose Mourinho", img: "https://via.placeholder.com/150/1e293b/white?text=Mourinho" },
            { name: "L. Scaloni", img: "https://via.placeholder.com/150/1e293b/white?text=Scaloni" },
            { name: "D. Simeone", img: "https://via.placeholder.com/150/1e293b/white?text=Simeone" }
        ];

        const players = [
            { name: "L. Messi", img: "https://via.placeholder.com/150/0f172a/white?text=Messi" },
            { name: "C. Ronaldo", img: "https://via.placeholder.com/150/0f172a/white?text=CR7" },
            { name: "K. Mbappe", img: "https://via.placeholder.com/150/0f172a/white?text=Mbappe" },
            { name: "E. Haaland", img: "https://via.placeholder.com/150/0f172a/white?text=Haaland" },
            { name: "Neymar Jr", img: "https://via.placeholder.com/150/0f172a/white?text=Neymar" },
            { name: "K. De Bruyne", img: "https://via.placeholder.com/150/0f172a/white?text=KDB" },
            { name: "Vini Jr", img: "https://via.placeholder.com/150/0f172a/white?text=Vini" },
            { name: "M. Salah", img: "https://via.placeholder.com/150/0f172a/white?text=Salah" },
            { name: "R. Lewandowski", img: "https://via.placeholder.com/150/0f172a/white?text=Lewa" },
            { name: "J. Bellingham", img: "https://via.placeholder.com/150/0f172a/white?text=Jude" }
        ];

        // লিস্ট রেন্ডার করা
        function renderList(data, elementId, type) {
            const container = document.getElementById(elementId);
            data.forEach(item => {
                container.innerHTML += `
                    <div class="item-card" onclick="alert('Details of ${item.name}')">
                        <img src="${item.img}">
                        <div class="item-info">
                            <p class="item-name">${item.name}</p>
                            <p class="item-type">${type}</p>
                        </div>
                    </div>
                `;
            });
        }

        renderList(managers, 'manager-list', 'Manager');
        renderList(players, 'player-list', 'Player');
    </script>
</body>
</html>
