<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card-dark: #121e36; --primary: #3b82f6; --text: #ffffff; --border: #1e2d4d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; }
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* স্ক্রিনশট অনুযায়ী eFootball HUB Title */
        .hub-title { text-align: center; margin: 15px 0 25px; font-weight: bold; font-size: 20px; text-transform: uppercase; }
        .hub-title span { color: var(--primary); }

        /* ID গ্রিড লেআউট (স্ক্রিনশট অনুযায়ী) */
        .id-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .id-btn { background: var(--card-dark); border: 1px solid var(--border); padding: 30px 15px; border-radius: 18px; text-align: center; cursor: pointer; position: relative; }
        .id-btn i { font-size: 28px; color: var(--primary); margin-bottom: 12px; display: block; }
        .id-btn span { font-size: 14px; font-weight: bold; color: #fff; }
        .highlight-id { border-color: #4ade80; /* Legend (cite: ID 4) highlights as requested */ }

        /* TOP PLAYERS সেকশন (cite: স্ক্রিনশট অনুযায়ী) */
        .section-title { color: var(--primary); font-size: 12px; font-weight: bold; text-transform: uppercase; margin: 25px 0 10px; padding-left: 5px; }
        .top-players-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .top-card { flex: 0 0 32%; background: #070d19; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        .top-card img { width: 100%; height: auto; display: block; }
        .card-shadow { position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; background: linear-gradient(transparent, #000); }

        /* Bottom Navigation Bar (cite: স্ক্রিনশট অনুযায়ী ফিক্সড ৪টি মেনু) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #070d19; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: #94a3b8; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item.active-nav { color: var(--primary); font-weight: bold; }
        .nav-item.active-nav i { color: var(--primary); }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="hub-title">eFootball <span>HUB</span></div>
        
        <div class="id-grid">
            <div class="id-btn" onclick="openPage('page-player')"><i class="fas fa-users"></i><span>Player (ID 1)</span></div>
            <div class="id-btn" onclick="openPage('page-manager')"><i class="fas fa-user-tie"></i><span>Manager (ID 2)</span></div>
            <div class="id-btn" onclick="openPage('page-event')"><i class="fas fa-trophy"></i><span>Events (ID 3)</span></div>
            <div class="id-btn highlight-id" onclick="openPage('page-legend')"><i class="fas fa-crown"></i><span>Legend (ID 4)</span></div>
        </div>

        <div class="section-title">TOP PLAYERS</div>
        <div class="top-players-container" id="top-players-list">
            <div class="top-card">
                <img src="https://res.cloudinary.com/dyqegwdme/image/upload/v1775478478/Legend_Cards/CF/image_12.png">
                <div class="card-shadow"></div>
            </div>
            <div class="top-card">
                <img src="https://res.cloudinary.com/dyqegwdme/image/upload/v1775478478/Legend_Cards/CF/pele.png">
                <div class="card-shadow"></div>
            </div>
            <div class="top-card">
                <img src="https://res.cloudinary.com/dyqegwdme/image/upload/v12345/players/messi.png">
                <div class="card-shadow"></div>
            </div>
        </div>
    </div>

    <div id="page-player" class="page">Player ID 1 Page</div>
    <div id="page-manager" class="page">Manager ID 2 Page</div>
    <div id="page-event" class="page">Events ID 3 Page</div>
    <div id="page-legend" class="page">Legend ID 4 Page</div>
    <div id="page-task" class="page">Task Page</div>
    <div id="page-profile" class="page">Profile Page</div>

    <nav class="bottom-nav">
        <div class="nav-item active-nav" onclick="showPage('home')"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item" onclick="showPage('page-legend')"><i class="fas fa-crown"></i>Legend</div>
        <div class="nav-item" onclick="showPage('page-task')"><i class="fas fa-clipboard-check"></i>Task</div>
        <div class="nav-item" onclick="showPage('page-profile')"><i class="fas fa-user-circle"></i>Profile</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Bottom Nav Active State
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            // active nav logic based on id
            tg.HapticFeedback.impactOccurred('medium');
        }
        
        // This function will be updated with Part 1-3 ads logic in future
        function openPage(pageId) { showPage(pageId); }
    </script>
</body>
</html>
