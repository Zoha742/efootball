<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card-dark: #121e36; --primary: #3b82f6; --text: #ffffff; --border: #1e2d4d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; overflow-x: hidden; }
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; min-height: 100vh; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .hub-title { text-align: center; margin: 15px 0 25px; font-weight: bold; font-size: 20px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; position: relative; }
        .back-icon { position: absolute; left: 0; cursor: pointer; color: var(--primary); font-size: 20px; }

        /* Interface & Menu Buttons (যা আছে তাই থাকবে) */
        .id-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .id-btn { background: var(--card-dark); border: 1px solid var(--border); padding: 25px 15px; border-radius: 18px; text-align: center; cursor: pointer; }
        .id-btn i { font-size: 28px; color: var(--primary); margin-bottom: 12px; display: block; }

        .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .quick-btn { border: none; padding: 20px 10px; border-radius: 12px; text-align: center; cursor: pointer; color: #fff; display: flex; flex-direction: column; align-items: center; gap: 8px; }

        /* CardView Design */
        .player-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        .top-card { background: var(--card-dark); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; text-align: center; padding: 5px; cursor: pointer; }
        .top-card img { width: 100%; border-radius: 8px; display: block; }
        .top-card p { font-size: 9px; padding: 5px; font-weight: bold; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #070d19; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { text-align: center; color: #94a3b8; font-size: 11px; cursor: pointer; flex: 1; }
        .active-nav { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="hub-title">eFootball <span>HUB</span></div>
        <div class="id-grid">
            <div class="id-btn" onclick="navigateTo('page-player')"><i class="fas fa-users"></i><span>Player</span></div>
            <div class="id-btn" onclick="navigateTo('page-manager')"><i class="fas fa-user-tie"></i><span>Manager</span></div>
            <div class="id-btn" onclick="navigateTo('page-event')"><i class="fas fa-trophy"></i><span>Events</span></div>
            <div class="id-btn" onclick="navigateTo('page-legend')"><i class="fas fa-crown"></i><span>Legend</span></div>
        </div>

        <p style="margin: 15px 0;">QUICK ACTIONS</p>
        <div class="quick-grid">
            <div class="quick-btn" style="background: #f97316;" onclick="navigateTo('page-store')"><i class="fas fa-shopping-cart"></i><span>Store</span></div>
            <div class="quick-btn" style="background: #ec4899;" onclick="navigateTo('page-task')"><i class="fas fa-clipboard-check"></i><span>Task</span></div>
        </div>

        <p style="margin: 15px 0;">TOP PLAYERS</p>
        <div class="player-grid" id="home-players-list"></div>
    </div>

    <div id="page-player" class="page">
        <div class="hub-title"><i class="fas fa-arrow-left back-icon" onclick="goBack()"></i> SELECT <span>POSITION</span></div>
        <div class="player-grid" id="full-player-list"></div>
    </div>

    <div id="page-details" class="page">
        <div class="hub-title"><i class="fas fa-arrow-left back-icon" onclick="goBack()"></i> PLAYER <span>BIO</span></div>
        <div id="bio-content" style="text-align:center;">
            </div>
        <div id="banner-ad-container" style="margin-top:20px; text-align:center; min-height:50px; background:rgba(255,255,255,0.05); border-radius:10px; display:flex; align-items:center; justify-content:center; color:gray; font-size:10px;">
            [BANNER AD - int-42]
        </div>
    </div>

    <div id="page-manager" class="page"><div class="hub-title"><i class="fas fa-arrow-left back-icon" onclick="goBack()"></i> MANAGER</div></div>
    <div id="page-event" class="page"><div class="hub-title"><i class="fas fa-arrow-left back-icon" onclick="goBack()"></i> EVENT</div></div>
    <div id="page-legend" class="page"><div class="hub-title"><i class="fas fa-arrow-left back-icon" onclick="goBack()"></i> LEGEND</div></div>
    <div id="page-store" class="page"><div class="hub-title"><i class="fas fa-arrow-left back-icon" onclick="goBack()"></i> STORE</div></div>
    <div id="page-task" class="page"><div class="hub-title"><i class="fas fa-arrow-left back-icon" onclick="goBack()"></i> TASK</div></div>
    <div id="page-profile" class="page"><div class="hub-title"><i class="fas fa-arrow-left back-icon" onclick="goBack()"></i> PROFILE</div></div>

    <nav class="bottom-nav">
        <div class="nav-item active-nav" onclick="navigateTo('home')"><i class="fas fa-home"></i><br>Home</div>
        <div class="nav-item" onclick="navigateTo('page-legend')"><i class="fas fa-crown"></i><br>Legend</div>
        <div class="nav-item" onclick="navigateTo('page-task')"><i class="fas fa-clipboard-check"></i><br>Task</div>
        <div class="nav-item" onclick="navigateTo('page-profile')"><i class="fas fa-user-circle"></i><br>Profile</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let historyStack = [];
        let adsIdConfig = { reward: "int-41", banner: "int-42" }; // Default Test IDs

        // JSON Load function (Ads ID and Player Data)
        async function loadAppData() {
            try {
                const response = await fetch('/api/data'); 
                const data = await response.json();
                
                // আপনার JSON থেকে ID লিংক আপ
                if(data.ads_config) {
                    adsIdConfig.reward = data.ads_config.reward_id;
                    adsIdConfig.banner = data.ads_config.banner_id;
                }
                
                renderHomePlayers(data.players);
            } catch (e) {
                console.log("JSON not found, using test data.");
            }
        }

        // Global Navigation with Reward Ads
        function navigateTo(targetId) {
            const current = document.querySelector('.page.active');
            if(current.id === targetId) return;

            historyStack.push(current.id);

            // Reward Video Ad Trigger (যেকোনো বাটনে ক্লিক করলে রান হবে)
            const AdController = window.Adsgram.init({ blockId: adsIdConfig.reward });
            AdController.show().then(() => {
                showNewPage(targetId);
            }).catch(() => {
                showNewPage(targetId); // Error হলে সরাসরি পেজে যাবে
            });
        }

        function showNewPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function goBack() {
            if(historyStack.length > 0) {
                const prev = historyStack.pop();
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(prev).classList.add('active');
            }
        }

        // Bio Page Design (Image Upore, Text Niche)
        function openBio(player) {
            navigateTo('page-details');
            document.getElementById('bio-content').innerHTML = `
                <img src="${player.img}" style="width:100%; max-width:250px; border-radius:15px; border:3px solid var(--primary); margin-bottom:15px;">
                <div style="padding:10px;">
                    <h2 style="color:var(--primary);">${player.name}</h2>
                    <p style="color:#ccc; margin-top:10px; line-height:1.6;">${player.bio || 'Detailed player information and stats go here.'}</p>
                </div>
            `;
        }

        function renderHomePlayers(players) {
            const container = document.getElementById('home-players-list');
            players.slice(0, 6).forEach(p => {
                const card = document.createElement('div');
                card.className = 'top-card';
                card.innerHTML = `<img src="${p.img}"><p>${p.name}</p>`;
                card.onclick = () => openBio(p);
                container.appendChild(card);
            });
        }

        window.onload = loadAppData;
    </script>
</body>
</html>
