<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card-dark: #121e36; --primary: #3b82f6; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .hub-title { text-align: center; margin: 25px 0; font-weight: bold; font-size: 20px; text-transform: uppercase; }
        .id-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .id-btn { background: var(--card-dark); border: 1px solid var(--border); padding: 25px 15px; border-radius: 18px; text-align: center; cursor: pointer; text-decoration: none; color: #fff; }
        .id-btn i { font-size: 28px; color: var(--primary); margin-bottom: 12px; display: block; }
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #070d19; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); }
        .nav-item { text-align: center; color: #94a3b8; font-size: 11px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="hub-title">eFootball <span>HUB</span></div>
    <div class="id-grid">
        <a href="player.html" class="id-btn"><i class="fas fa-users"></i>Player</a>
        <a href="manager.html" class="id-btn"><i class="fas fa-user-tie"></i>Manager</a>
        <a href="event.html" class="id-btn"><i class="fas fa-trophy"></i>Events</a>
        <a href="legend.html" class="id-btn"><i class="fas fa-crown"></i>Legend</a>
    </div>
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item" style="color:#3b82f6;"><i class="fas fa-home"></i><br>Home</a>
        <a href="legend.html" class="nav-item"><i class="fas fa-crown"></i><br>Legend</a>
        <a href="task.html" class="nav-item"><i class="fas fa-tasks"></i><br>Task</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><br>Profile</a>
    </nav>
</body>
</html>
