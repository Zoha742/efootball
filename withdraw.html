<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --border: #1e2d4d; --text: #ffffff; --green: #22c55e; --gray: #4b5563; --yellow: #fbbf24; --red: #f87171; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }
        .top-bar { display: flex; align-items: center; padding: 15px; background: rgba(18, 30, 54, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .top-bar a { color: white; text-decoration: none; margin-right: 15px; }
        .container { padding: 20px; text-align: center; }
        .withdraw-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        input { width: 100%; background: #050a18; border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: white; text-align: center; outline: none; font-size: 20px; font-weight: bold; box-sizing: border-box; }
        .withdraw-btn { width: 100%; border: none; padding: 16px; border-radius: 12px; color: white; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.3s; font-size: 14px; text-transform: uppercase; }
        .btn-gray { background: var(--gray); cursor: not-allowed; opacity: 0.6; }
        .btn-green { background: var(--green) !important; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); }
        .history-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }
        .pending { background: rgba(251, 191, 36, 0.1); color: var(--yellow); }
        .success { background: rgba(34, 197, 94, 0.1); color: var(--green); }
        .rejected { background: rgba(248, 113, 113, 0.1); color: var(--red); }
    </style>
</head>
<body>
    <div class="top-bar"><a href="profile.html"><i class="fas fa-chevron-left"></i></a><span>Withdraw GP</span></div>
    <div class="container">
        <div class="withdraw-card">
            <span style="color:#94a3b8; font-size:12px;">AVAILABLE BALANCE</span>
            <h2 id="display-gp" style="color:var(--yellow); font-size:36px; margin:5px 0;">0 GP</h2>
            <div id="rate-info" style="font-size: 12px; color: #94a3b8; margin-bottom: 20px;">Rate Loading...</div>
            <input type="number" id="withdraw-amount" placeholder="Enter GP Amount" oninput="validateWithdraw()" inputmode="numeric">
            <button id="withdraw-btn" class="withdraw-btn btn-gray" onclick="processWithdraw()" disabled>ENTER AMOUNT</button>
        </div>
        <div id="history-list" style="text-align: left;"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAy2nEcb--kbjU7tSIm6lJG5ZpEFSus7sg",
            authDomain: "efootball-57d9b.firebaseapp.com",
            projectId: "efootball-57d9b",
            storageBucket: "efootball-57d9b.firebasestorage.app",

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const userId = String(tg.initDataUnsafe?.user?.id || "774900");
        const userName = tg.initDataUnsafe?.user?.first_name || "Guest";

        let userGP = 0;
        let adminConfig = { min_limit: 10000, rate: 10000 };

        // Real-time Balance
        db.ref('users/' + userId).on('value', snap => {
            userGP = snap.val()?.gp || 0;
            document.getElementById('display-gp').innerText = userGP.toLocaleString() + " GP";
            validateWithdraw();
        });

        // Load Admin Config (Min Withdraw & Rate)
        db.ref('config').on('value', snap => {
            if(snap.exists()) adminConfig = snap.val();
            document.getElementById('rate-info').innerText = `Min: ${adminConfig.min_limit.toLocaleString()} GP | Rate: ${adminConfig.rate.toLocaleString()} GP = $1`;
            validateWithdraw();
        });

        // Real-time History
        db.ref('withdraw_requests').on('value', snap => {
            let html = "<h4 style='color:#94a3b8; font-size:14px; margin-bottom:10px;'>Withdraw History</h4>";
            let found = false;
            snap.forEach(child => {
                let r = child.val();
                if(r.userId === userId) {
                    found = true;
                    html += `<div class="history-item">
                        <div><b>${parseInt(r.amount).toLocaleString()} GP</b><br><small style="font-size:10px; color:#94a3b8;">${r.date}</small></div>
                        <span class="status-badge ${r.status}">${r.status}</span>
                    </div>`;
                }
            });
            document.getElementById('history-list').innerHTML = found ? html : "";
        });
