<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050a18; color: white; font-family: sans-serif; margin: 0; }
        .top-bar { display: flex; align-items: center; padding: 15px; background: rgba(18, 30, 54, 0.7); border-bottom: 1px solid #1e2d4d; }
        .top-bar a { color: white; text-decoration: none; margin-right: 15px; }
        .container { padding: 20px; text-align: center; }
        .card { background: #121e36; border-radius: 20px; padding: 25px; border: 1px solid #f87171; }
        .btn { width: 100%; background: #f87171; border: none; padding: 15px; border-radius: 12px; color: white; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="profile.html"><i class="fas fa-chevron-left"></i></a>
        <span>Withdraw GP</span>
    </div>
    <div class="container">
        <div class="card">
            <h4 style="margin:0; color:#94a3b8;">Available Balance</h4>
            <h2 id="bal">0 GP</h2>
            <input type="number" placeholder="Enter Amount" style="width:100%; padding:12px; border-radius:10px; border:none; margin-top:15px;">
            <button class="btn" onclick="alert('Request Sent!')">SEND WITHDRAW REQUEST</button>
        </div>
    </div>
    <script>document.getElementById('bal').innerText = (localStorage.getItem('user_gp') || 0) + " GP";</script>
</body>
</html>
