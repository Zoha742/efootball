<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw GP - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --border: #1e2d4d; --text: #ffffff; --green: #22c55e; --red: #f87171; --blue: #3b82f6; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .balance-box { text-align: center; margin-bottom: 20px; }
        .balance-box h1 { font-size: 32px; margin: 5px 0; color: var(--green); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #0a1226; color: white; outline: none; box-sizing: border-box; }
        .withdraw-btn { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--blue); color: white; font-weight: bold; cursor: pointer; }
        .withdraw-btn:disabled { background: #2d3748; cursor: not-allowed; }
        .history-item { background: #0a1226; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .status-pending { color: var(--blue); }
        .cancel-btn { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="balance-box">
        <p style="color: #94a3b8;">Your Current Balance</p>
        <h1 id="user-gp">0 GP</h1>
        <p id="rate-info" style="font-size: 12px; color: #64748b;">Loading limits...</p>
    </div>

    <div class="card">
        <div class="input-group">
            <label>Withdraw Amount (GP)</label>
            <input type="number" id="withdraw-amount" placeholder="Min: 0" oninput="validateWithdraw()">
        </div>
        <div class="input-group">
            <label>Payment Method</label>
            <select id="payment-method">
                <option value="Bkash">Bkash</option>
                <option value="Nagad">Nagad</option>
                <option value="Rocket">Rocket</option>
            </select>
        </div>
        <div class="input-group">
            <label>Account Number</label>
            <input type="text" id="account-number" placeholder="017xxxxxxxx">
        </div>
        <button id="withdraw-btn" class="withdraw-btn" onclick="submitWithdraw()" disabled>ENTER AMOUNT</button>
    </div>

    <div id="history-section">
        <h3 style="font-size: 16px; margin-bottom: 15px;"><i class="fas fa-history"></i> Withdraw History</h3>
        <div id="history-list">No history found.</div>
    </div>

    <script>
       // আপনার ফায়ারবেস কনফিগ (নতুন প্রজেক্ট আইডি অনুযায়ী)
const firebaseConfig = {
  apiKey: "AIzaSyAy2nEcb--kbjU7tSIm6lJG5ZpEFSus7sg",
  authDomain: "efootball-57d9b.firebaseapp.com",
  databaseURL: "https://efootball-57d9b-default-rtdb.firebaseio.com",
  projectId: "efootball-57d9b",
  storageBucket: "efootball-57d9b.firebasestorage.app",
  messagingSenderId: "1031993322489",
  appId: "1:1031993322489:web:0336c8e1869318a8222b28",
  measurementId: "G-1SLL8RNP5M"
};

// ফায়ারবেস ইনিশিয়ালাইজেশন
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();
        
        // --- Firebase Config ---
        const firebaseConfig = {
            // APNAR ACTUAL CONFIG EKHANE BOSAN
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe?.user?.id || "test_user";

        let userCurrentGP = 0;
        let minLimit = 5000;
        let exchangeRate = 10000;

        // 1. Fetch Admin Settings (Min Limit & Rate)
        db.ref('config').on('value', snap => {
            if(snap.exists()) {
                minLimit = snap.val().min_limit || 5000;
                exchangeRate = snap.val().rate || 10000;
                document.getElementById('rate-info').innerText = `Min: ${minLimit.toLocaleString()} GP | Rate: ${exchangeRate.toLocaleString()} GP = $1`;
            }
        });

        // 2. Fetch User Real-time GP
        db.ref('users/' + userId + '/gp').on('value', snap => {
            userCurrentGP = snap.val() || 0;
            document.getElementById('user-gp').innerText = userCurrentGP.toLocaleString() + " GP";
            validateWithdraw();
        });

        // 3. Real-time History & Cancel Option
        db.ref('withdraw_requests').on('value', snap => {
            let html = "";
            let hasData = false;
            snap.forEach(child => {
                let r = child.val();
                if(r.userId == userId) {
                    hasData = true;
                    let cancelBtn = (r.status === 'pending') ? `<button class="cancel-btn" onclick="cancelWithdraw('${child.key}', ${r.amount})">Cancel</button>` : "";
                    html += `<div class="history-item">
                        <div>
                            <b>${r.amount.toLocaleString()} GP</b><br>
                            <small class="status-pending">${r.status.toUpperCase()}</small>
                        </div>
                        ${cancelBtn}
                    </div>`;
                }
            });
            document.getElementById('history-list').innerHTML = hasData ? html : "No history found.";
        });

        function validateWithdraw() {
            let amount = parseInt(document.getElementById('withdraw-amount').value);
            let btn = document.getElementById('withdraw-btn');
            if(!amount || amount < minLimit) {
                btn.innerText = `MIN WITHDRAW ${minLimit} GP`;
                btn.disabled = true;
            } else if(amount > userCurrentGP) {
                btn.innerText = "INSUFFICIENT BALANCE";
                btn.disabled = true;
            } else {
                btn.innerText = "WITHDRAW NOW";
                btn.disabled = false;
            }
        }

        // 4. Submit Withdraw (Points Minus hobe)
        function submitWithdraw() {
            let amount = parseInt(document.getElementById('withdraw-amount').value);
            let method = document.getElementById('payment-method').value;
            let number = document.getElementById('account-number').value;

            if(!number) { alert("Enter Account Number!"); return; }

            // GP Minus kora hobe
            let newBalance = userCurrentGP - amount;
            
            db.ref('withdraw_requests').push({
                userId: userId,
                amount: amount,
                method: method,
                number: number,
                status: 'pending',
                date: new Date().toLocaleString()
            }).then(() => {
                return db.ref('users/' + userId + '/gp').set(newBalance);
            }).then(() => {
                alert("Withdraw Request Submitted!");
                document.getElementById('withdraw-amount').value = "";
            }).catch(err => alert("Error: " + err.message));
        }

        // 5. Cancel Withdraw (Points Refund hobe)
        function cancelWithdraw(key, amount) {
            if(confirm("Are you sure you want to cancel?")) {
                db.ref('withdraw_requests/' + key).remove().then(() => {
                    let refundBalance = userCurrentGP + amount;
                    return db.ref('users/' + userId + '/gp').set(refundBalance);
                }).then(() => {
                    alert("Request Cancelled & GP Refunded!");
                });
            }
        }
    </script>
</body>
</html>
