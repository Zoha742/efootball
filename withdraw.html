<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw GP - eFootball HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --border: #1e2d4d; --text: #ffffff; --red: #f87171; --green: #22c55e; --gray: #4b5563; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }
        .top-bar { display: flex; align-items: center; padding: 15px; background: rgba(18, 30, 54, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .top-bar a { color: white; text-decoration: none; margin-right: 15px; }
        .container { padding: 20px; text-align: center; }
        .withdraw-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 25px; }
        .balance-info h2 { margin: 5px 0; font-size: 32px; color: #fbbf24; }
        .rate-info { font-size: 12px; color: #94a3b8; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; }
        
        /* Remove Arrows & Spinner */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        
        input { width: 100%; background: #050a18; border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: white; text-align: center; outline: none; font-size: 18px; font-weight: bold; }
        
        .withdraw-btn { width: 100%; border: none; padding: 16px; border-radius: 12px; color: white; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.3s; font-size: 14px; text-transform: uppercase; }
        .btn-gray { background: var(--gray); cursor: not-allowed; }
        .btn-green { background: var(--green) !important; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); }
        
        #history-list { text-align: left; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="top-bar"><a href="profile.html"><i class="fas fa-chevron-left"></i></a><span>Withdraw GP</span></div>

    <div class="container">
        <div class="withdraw-card">
            <div class="balance-info"><span>Total Balance</span><h2 id="current-gp">0 GP</h2></div>
            <div class="rate-info" id="rate-text">Rate Loading...</div>
            <input type="number" id="withdraw-amount" placeholder="0" oninput="checkLimit()" inputmode="numeric">
            <button id="main-btn" class="withdraw-btn btn-gray" onclick="sendRequest()" disabled>ENTER AMOUNT</button>
        </div>
        <div id="history-list"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;

        function updateUI() {
            // ১. অ্যাডমিন থেকে কনফিগ লোড করা
            const adminConfig = JSON.parse(localStorage.getItem('admin_config')) || { min_limit: 10000, rate: 10000 };
            const userGP = parseInt(localStorage.getItem('user_gp')) || 0;

            // ২. ব্যালেন্স এবং রেট দেখানো
            document.getElementById('current-gp').innerText = userGP.toLocaleString() + " GP";
            document.getElementById('rate-text').innerText = `Rate: ${Number(adminConfig.rate).toLocaleString()} GP = $1.00 USD`;
            
            checkLimit();
            loadHistory();
        }

        function checkLimit() {
            const adminConfig = JSON.parse(localStorage.getItem('admin_config')) || { min_limit: 10000, rate: 10000 };
            const userGP = parseInt(localStorage.getItem('user_gp')) || 0;
            const amountInput = document.getElementById('withdraw-amount').value;
            const amount = parseInt(amountInput) || 0;
            const btn = document.getElementById('main-btn');

            if (amountInput === "" || amount === 0) {
                btn.className = "withdraw-btn btn-gray"; btn.innerText = "ENTER AMOUNT"; btn.disabled = true;
            } else if (amount > userGP) {
                btn.className = "withdraw-btn btn-gray"; btn.innerText = "INSUFFICIENT BALANCE"; btn.disabled = true;
            } else if (amount < adminConfig.min_limit) {
                btn.className = "withdraw-btn btn-gray"; btn.innerText = `MIN ${adminConfig.min_limit.toLocaleString()} GP REQUIRED`; btn.disabled = true;
            } else {
                btn.className = "withdraw-btn btn-green"; btn.innerText = "SEND WITHDRAW REQUEST"; btn.disabled = false;
            }
        }

        function sendRequest() {
            const amount = parseInt(document.getElementById('withdraw-amount').value);
            const ton = localStorage.getItem('wallet_ton') || "Not Set";
            const bnb = localStorage.getItem('wallet_bnb') || "Not Set";
            if (ton === "Not Set" && bnb === "Not Set") return alert("Setup Wallet First!");

            let userGP = parseInt(localStorage.getItem('user_gp')) || 0;
            localStorage.setItem('user_gp', userGP - amount);
            
            let all = JSON.parse(localStorage.getItem('all_withdraw_requests')) || [];
            all.push({ id: Date.now(), userId: tg.initDataUnsafe?.user?.id || "774900", amount, tonWallet: ton, bnbWallet: bnb, status: 'pending', date: new Date().toLocaleString() });
            localStorage.setItem('all_withdraw_requests', JSON.stringify(all));

            alert("Request Sent!");
            document.getElementById('withdraw-amount').value = "";
            updateUI();
        }

        function loadHistory() {
            const all = JSON.parse(localStorage.getItem('all_withdraw_requests')) || [];
            const uid = tg.initDataUnsafe?.user?.id || "774900";
            const my = all.filter(r => r.userId == uid);
            document.getElementById('history-list
