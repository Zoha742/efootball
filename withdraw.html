<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw GP - eFootball HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --border: #1e2d4d; --text: #ffffff; --red: #f87171; --green: #22c55e; --gray: #4b5563; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }
        .top-bar { display: flex; align-items: center; padding: 15px; background: rgba(18, 30, 54, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .top-bar a { color: white; text-decoration: none; margin-right: 15px; }
        .container { padding: 20px; text-align: center; }
        .withdraw-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 25px; }
        .balance-info h2 { margin: 5px 0; font-size: 32px; color: #fbbf24; }
        .rate-info { font-size: 12px; color: #94a3b8; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; }
        input { width: 100%; background: #050a18; border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: white; text-align: center; outline: none; }
        .withdraw-btn { width: 100%; border: none; padding: 15px; border-radius: 12px; color: white; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .btn-gray { background: var(--gray); cursor: not-allowed; }
        .btn-green { background: var(--green); }
        .request-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; text-align: left; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="profile.html"><i class="fas fa-chevron-left"></i></a>
        <span>Withdraw GP</span>
    </div>

    <div class="container">
        <div class="withdraw-card">
            <div class="balance-info">
                <span style="color:#94a3b8; font-size:14px;">Available Balance</span>
                <h2 id="current-gp">0 GP</h2>
            </div>
            <div class="rate-info" id="rate-text">Rate: 10,000 GP = $1.00 USD</div>
            <input type="number" id="withdraw-amount" placeholder="Enter GP Amount" oninput="checkLimit()">
            <button id="main-btn" class="withdraw-btn btn-gray" onclick="sendRequest()" disabled>MIN LIMIT REQUIRED</button>
        </div>

        <div style="text-align: left;">
            <h3 style="font-size: 16px; color: #94a3b8;">Withdrawal History</h3>
            <div id="request-list"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let userGP = parseInt(localStorage.getItem('user_gp')) || 0;
        let adminConfig = JSON.parse(localStorage.getItem('admin_config')) || { min_limit: 10000, rate: 10000 };

        function updateUI() {
            userGP = parseInt(localStorage.getItem('user_gp')) || 0;
            document.getElementById('current-gp').innerText = userGP.toLocaleString() + " GP";
            document.getElementById('rate-text').innerText = `Rate: ${parseInt(adminConfig.rate).toLocaleString()} GP = $1.00 USD`;
            checkLimit();
            loadRequests();
        }

        function checkLimit() {
            const amount = parseInt(document.getElementById('withdraw-amount').value);
            const btn = document.getElementById('main-btn');
            if (amount >= adminConfig.min_limit && userGP >= amount) {
                btn.classList.replace('btn-gray', 'btn-green');
                btn.innerText = "SEND WITHDRAW REQUEST"; btn.disabled = false;
            } else {
                btn.classList.add('btn-gray'); btn.classList.remove('btn-green');
                btn.innerText = amount < adminConfig.min_limit ? `MIN ${adminConfig.min_limit} GP REQUIRED` : "INSUFFICIENT BALANCE";
                btn.disabled = true;
            }
        }

        function sendRequest() {
            const amount = parseInt(document.getElementById('withdraw-amount').value);
            const ton = localStorage.getItem('wallet_ton') || "Not Set";
            const bnb = localStorage.getItem('wallet_bnb') || "Not Set";

            if (ton === "Not Set" && bnb === "Not Set") return alert("Setup Wallet First!");

            const req = {
                id: Date.now(),
                userId: tg.initDataUnsafe?.user?.id || "774900",
                amount: amount,
                tonWallet: ton,
                bnbWallet: bnb,
                status: 'pending',
                date: new Date().toLocaleString()
            };

            userGP -= amount;
            localStorage.setItem('user_gp', userGP);
            
            let all = JSON.parse(localStorage.getItem('all_withdraw_requests')) || [];
            all.push(req);
            localStorage.setItem('all_withdraw_requests', JSON.stringify(all));

            alert("Request Sent!");
            document.getElementById('withdraw-amount').value = "";
            updateUI();
        }

        function loadRequests() {
            const list = document.getElementById('request-list');
            const all = JSON.parse(localStorage.getItem('all_withdraw_requests')) || [];
            const uid = tg.initDataUnsafe?.user?.id || "774900";
            const my = all.filter(r => r.userId == uid);

            if (my.length === 0) { list.innerHTML = "<p style='color:#4b5563;'>No requests found.</p>"; return; }
            list.innerHTML = my.reverse().map(r => `
                <div class="request-item">
                    <div style="display:flex; justify-content:space-between;">
                        <b>${r.amount} GP</b>
                        <span style="color:${r.status==='pending'?'#fbbf24':'#22c55e'}">${r.status.toUpperCase()}</span>
                    </div>
                    <div style="font-size:10px; color:#94a3b8;">${r.date}</div>
                </div>
            `).join('');
        }

        window.onload = updateUI;
    </script>
</body>
</html>
