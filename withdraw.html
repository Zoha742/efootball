<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw GP</title>
    <style>
        body { background: #050a18; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #121e36; padding: 20px; border-radius: 15px; border: 1px solid #f87171; }
        .btn { width: 100%; background: #f87171; border: none; padding: 12px; border-radius: 10px; color: white; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h3>WITHDRAW</h3>
        <p>Available GP: <span id="gp">0</span></p>
        <input type="number" id="amount" style="width: 100%; padding: 10px; border-radius: 5px;" placeholder="Min 10,000 GP">
        <button class="btn" onclick="requestWithdraw()">SEND REQUEST</button>
    </div>
    <script>
        document.getElementById('gp').innerText = localStorage.getItem('user_gp') || 0;
        function requestWithdraw() { alert("Request Sent to Admin!"); }
    </script>
</body>
</html>
