<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw GP - eFootball HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --border: #1e2d4d; --text: #ffffff; --red: #f87171; --green: #22c55e; --gray: #4b5563; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }
        .top-bar { display: flex; align-items: center; padding: 15px; background: rgba(18, 30, 54, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .top-bar a { color: white; text-decoration: none; margin-right: 15px; }
        .container { padding: 20px; text-align: center; }
        .withdraw-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 25px; }
        .balance-info h2 { margin: 5px 0; font-size: 32px; color: #fbbf24; }
        .rate-info { font-size: 12px; color: #94a3b8; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; }
        
        /* Input Typing Fix & Remove Arrows */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        
        input { 
            width: 100%; background: #050a18; border: 1px solid var(--border); 
            padding: 15px; border-radius: 12px; color: white; text-align: center; 
            outline: none; box-sizing: border-box; font-size: 18px; font-weight: bold;
        }

        .withdraw-btn { 
            width: 100%; border: none; padding: 16px; border-radius: 12px; 
            color: white; font-weight: bold; margin-top: 20px; cursor: pointer; 
            transition: 0.3s; font-size: 14px; text-transform: uppercase;
        }
        .btn-gray { background: var(--gray); cursor: not-allowed; }
        .btn-green { background: var(--green) !important; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); }
        
        .history-title { text-align: left; font-size: 16px; color: #94a3b8; margin-top: 10px; }
        #request-list { text-align: left; margin-top: 15px; }
        .request-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="profile.html"><i class="fas fa-chevron-left"></i></a>
        <span>Withdraw GP</span>
    </div>

    <div class="container">
        <div class="withdraw-card">
            <div class="balance-info">
                <span style="color:#94a3b8; font-size:14px;">Total Balance</span>
                <h2 id="current-gp">0 GP</h2>
            </div>
            <div class="rate-info" id="rate-text">Rate Loading...</div>
            
            <input type="number" id="withdraw-amount" placeholder="0" oninput="checkLimit()" inputmode="numeric">
            
            <button id="main-btn" class="withdraw-btn btn-gray" onclick="sendRequest()" disabled>ENTER AMOUNT</button>
        </div>

        <div class="history-title">Withdrawal History</div>
        <div id="request-list"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;

        function updateUI() {
            // Admin config ebong user balance load
            const adminConfig = JSON.parse(localStorage.getItem('admin_config')) || { min_limit: 10000, rate: 10000 };
            const userGP = parseInt(localStorage.getItem('user_gp')) || 0;

            document.getElementById('current-gp').innerText = userGP.toLocaleString() + " GP";
            document.getElementById('rate-text').innerText = `Rate: ${Number(adminConfig.rate).toLocaleString()} GP = $1.00 USD`;
            
            checkLimit();
            loadHistory();
        }

        function checkLimit() {
            const adminConfig = JSON.parse(localStorage.getItem('admin_config')) || { min_limit: 10000, rate: 10000 };
            const userGP = parseInt(localStorage.getItem('user_gp')) || 0;
            const amountInput = document.getElementById('withdraw-amount').value;
            const amount = parseInt(amountInput) || 0;
            const btn = document.getElementById('main-btn');

            const minLimit = Number(adminConfig.min_limit);

            // Real-time logic check
            if (amountInput === "" || amount === 0) {
                btn.className = "withdraw-btn btn-gray";
                btn.innerText = "ENTER AMOUNT";
                btn.disabled = true;
            } else if (amount > userGP) {
                btn.className = "withdraw-btn btn-gray";
                btn.innerText = "INSUFFICIENT BALANCE";
                btn.disabled = true;
            } else if (amount < minLimit) {
                btn.className = "withdraw-btn btn-gray";
                btn.innerText = `MIN ${minLimit.toLocaleString()} GP REQUIRED`;
                btn.disabled = true;
            } else {
                // Condition met - Green Color
                btn.className = "withdraw-btn btn-green";
                btn.innerText = "SEND WITHDRAW REQUEST";
                btn.disabled = false;
            }
        }

        function sendRequest() {
            const amount = parseInt(document.getElementById('withdraw-amount').value);
            const ton = localStorage.getItem('wallet_ton') || "Not Set";
            const bnb = localStorage.getItem('wallet_bnb') || "Not Set";

            if (ton === "Not Set" && bnb === "Not Set") return alert("Wallet set kora nei! Profile-e giye wallet setup korun.");

            const req = {
                id: Date.now(),
                userId: tg.initDataUnsafe?.user?.id || "774900",
                userName: tg.initDataUnsafe?.user?.first_name || "User",
                amount: amount,
                tonWallet: ton,
                bnbWallet: bnb,
                status: 'pending',
                date: new Date().toLocaleString()
            };

            let userGP = parseInt(localStorage.getItem('user_gp')) || 0;
            localStorage.setItem('user_gp', userGP - amount);
            
            let all = JSON.parse(localStorage.getItem('all_withdraw_requests')) || [];
            all.push(req);
            localStorage.setItem('all_withdraw_requests', JSON.stringify(all));

            alert("Withdraw request pathano hoyeche!");
            document.getElementById('withdraw-amount').value = "";
            updateUI();
        }

        function loadHistory() {
            const list = document.getElementById('request-list');
            const all = JSON.parse(localStorage.getItem('all_withdraw_requests')) || [];
            const uid = tg.initDataUnsafe?.user?.id || "774900";
            const myReqs = all.filter(r => r.userId == uid);

            if (myReqs.length === 0) {
                list.innerHTML = "<p style='color:#4b5563; font-size:12px;'>Kono history pawa jayni.</p>";
                return;
            }

            list.innerHTML = myReqs.reverse().map(r => `
                <div class="request-item">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b style="color:#fbbf24;">${r.amount.toLocaleString()} GP</b>
                        <span style="color:${r.status==='pending'?'#fbbf24':(r.status==='success'?'#22c55e':'#f87171')}; font-weight:bold; font-size:12px;">
                            ${r.status.toUpperCase()}
                        </span>
                    </div>
                    <div style="font-size:10px; color:#94a3b8; margin-top:5px;">${r.date}</div>
                </div>
            `).join('');
        }

        window.onload = updateUI;
    </script>
</body>
</html>
