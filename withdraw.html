<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw GP - eFootball HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --border: #1e2d4d; --text: #ffffff; --red: #f87171; --green: #22c55e; --gray: #4b5563; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }
        
        .top-bar { display: flex; align-items: center; padding: 15px; background: rgba(18, 30, 54, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .top-bar a { color: white; text-decoration: none; margin-right: 15px; }

        .container { padding: 20px; text-align: center; }
        .withdraw-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 25px; }
        
        .balance-info { margin-bottom: 20px; }
        .balance-info span { color: #94a3b8; font-size: 14px; }
        .balance-info h2 { margin: 5px 0; font-size: 32px; color: #fbbf24; }
        
        .rate-info { font-size: 12px; color: #94a3b8; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; }

        input { width: 100%; background: #050a18; border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: white; font-size: 16px; outline: none; box-sizing: border-box; text-align: center; }

        /* Dynamic Button Style */
        .withdraw-btn { width: 100%; border: none; padding: 15px; border-radius: 12px; color: white; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.3s; }
        .btn-gray { background: var(--gray); cursor: not-allowed; }
        .btn-green { background: var(--green); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }

        /* Request History List */
        .history-section { text-align: left; margin-top: 30px; }
        .history-section h3 { font-size: 16px; margin-bottom: 15px; color: #94a3b8; }
        .request-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .status-pending { color: #fbbf24; font-size: 12px; font-weight: bold; }
        .status-success { color: var(--green); font-size: 12px; font-weight: bold; }
        .cancel-btn { background: var(--red); border: none; color: white; padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="profile.html"><i class="fas fa-chevron-left"></i></a>
        <span>Withdraw Funds</span>
    </div>

    <div class="container">
        <div class="withdraw-card">
            <div class="balance-info">
                <span>Available Balance</span>
                <h2 id="current-gp">0 GP</h2>
            </div>
            
            <div class="rate-info">
                <i class="fas fa-info-circle"></i> Rate: 10,000 GP = $1.00 USD
            </div>

            <input type="number" id="withdraw-amount" placeholder="Enter GP Amount" oninput="checkLimit()">
            
            <button id="main-btn" class="withdraw-btn btn-gray" onclick="sendRequest()" disabled>
                MIN 10,000 GP REQUIRED
            </button>
        </div>

        <div class="history-section">
            <h3>Withdrawal Requests</h3>
            <div id="request-list">
                </div>
        </div>
    </div>

    <script>
        const minLimit = 10000;
        let userGP = parseInt(localStorage.getItem('user_gp')) || 0;

        function updateUI() {
            document.getElementById('current-gp').innerText = userGP.toLocaleString() + " GP";
            checkLimit();
            loadRequests();
        }

        function checkLimit() {
            const amount = document.getElementById('withdraw-amount').value;
            const btn = document.getElementById('main-btn');

            if (amount >= minLimit && userGP >= amount) {
                btn.classList.remove('btn-gray');
                btn.classList.add('btn-green');
                btn.innerText = "SEND WITHDRAW REQUEST";
                btn.disabled = false;
            } else {
                btn.classList.remove('btn-green');
                btn.classList.add('btn-gray');
                btn.innerText = amount < minLimit ? "MIN 10,000 GP REQUIRED" : "INSUFFICIENT BALANCE";
                btn.disabled = true;
            }
        }

        function sendRequest() {
            const amount = parseInt(document.getElementById('withdraw-amount').value);
            
            // পয়েন্ট কেটে নেওয়া
            userGP -= amount;
            localStorage.setItem('user_gp', userGP);

            // রিকোয়েস্ট হিস্ট্রি সেভ করা
            let requests = JSON.parse(localStorage.getItem('withdraw_history')) || [];
            const newRequest = {
                id: Date.now(),
                amount: amount,
                status: 'pending',
                date: new Date().toLocaleDateString()
            };
            requests.push(newRequest);
            localStorage.setItem('withdraw_history', JSON.stringify(requests));

            alert("Withdraw Request Sent Successfully!");
            document.getElementById('withdraw-amount').value = "";
            updateUI();
        }

        function loadRequests() {
            const listContainer = document.getElementById('request-list');
            const requests = JSON.parse(localStorage.getItem('withdraw_history')) || [];
            
            if (requests.length === 0) {
                listContainer.innerHTML = "<p style='text-align:center; color:#4b5563; font-size:13px;'>No requests found.</p>";
                return;
            }

            listContainer.innerHTML = requests.reverse().map(req => `
                <div class="request-item">
                    <div>
                        <div style="font-weight:bold;">$${(req.amount / 10000).toFixed(2)} (${req.amount} GP)</div>
                        <div style="font-size:10px; color:#94a3b8;">${req.date}</div>
                    </div>
                    <div style="text-align:right;">
                        <div class="status-${req.status}">${req.status.toUpperCase()}</div>
                        ${req.status === 'pending' ? `<button class="cancel-btn" onclick="cancelRequest(${req.id}, ${req.amount})">Cancel</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // এই স্ক্রিপ্টটি withdraw.html এর স্ক্রিপ্টে বসান
function syncWithAdmin() {
    // অ্যাডমিন থেকে কনফিগ নিয়ে আসা (না থাকলে ডিফল্ট ১০,০০০)
    const adminConfig = JSON.parse(localStorage.getItem('admin_config')) || { min_limit: 10000, rate: 10000 };
    
    window.minLimit = adminConfig.min_limit;
    document.querySelector('.rate-info').innerHTML = `<i class="fas fa-info-circle"></i> Rate: ${adminConfig.rate} GP = $1.00 USD`;
    checkLimit(); // বাটন আপডেট করার জন্য
}
window.onload = () => { updateUI(); syncWithAdmin(); };

        function cancelRequest(id, amount) {
            if (confirm("Are you sure to cancel this request? Points will be returned.")) {
                let requests = JSON.parse(localStorage.getItem('withdraw_history')) || [];
                requests = requests.filter(req => req.id !== id);
                localStorage.setItem('withdraw_history', JSON.stringify(requests));

                // পয়েন্ট ফেরত দেওয়া
                userGP += amount;
                localStorage.setItem('user_gp', userGP);
                
                updateUI();
            }
        }

        window.onload = updateUI;
    </script>
</body>
</html>
