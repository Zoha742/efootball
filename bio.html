<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio - eFootball HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050a18; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .back-btn { position: absolute; left: 15px; color: #3b82f6; font-size: 22px; }
        .bio-img { width: 100%; max-width: 250px; border-radius: 15px; border: 3px solid #3b82f6; margin-top: 40px; }
        .desc { margin-top: 20px; padding: 10px; color: #ccc; }
        .ad-box { margin-top: 30px; background: #121e36; padding: 15px; color: gray; font-size: 10px; }
    </style>
</head>
<body>
    <i class="fas fa-arrow-left back-btn" onclick="history.back()"></i>
    <img id="img" class="bio-img">
    <h2 id="name" style="margin-top:15px;"></h2>
    <div class="desc">Statistics and player bio will be loaded here.</div>
    <div class="ad-box">[BANNER AD - int-42]</div>

    <script>
        document.getElementById('name').innerText = localStorage.getItem('p_name');
        document.getElementById('img').src = localStorage.getItem('p_img');
    </script>
</body>
</html>
