<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --primary: #fbbf24; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 50px; }
        
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px; }
        .back-btn { position: absolute; left: 0; font-size: 24px; color: var(--primary); text-decoration: none; }
        
        /* Player Profile Section */
        .profile-card { background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #1e2d4d; margin-bottom: 20px; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); margin-bottom: 10px; }
        .player-name { font-size: 22px; font-weight: bold; margin: 0; color: var(--primary); }
        .player-pos { font-size: 14px; background: rgba(251, 191, 36, 0.1); color: var(--primary); padding: 4px 12px; border-radius: 20px; display: inline-block; margin-top: 8px; font-weight: bold; }

        /* Stats Grid */
        .stats-title { font-size: 18px; color: var(--primary); margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 10px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; } /* 2 Column Layout */
        
        .stat-box { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 8px 12px; border-radius: 8px; border: 1px solid #1e2d4d; }
        .stat-name { font-size: 12px; color: #cbd5e1; font-weight: bold; }
        .stat-num { font-size: 14px; font-weight: bold; color: #000; padding: 3px 8px; border-radius: 6px; min-width: 25px; text-align: center; }

    </style>
</head>
<body>

    <div class="header">
        <a href="legend.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="font-size: 18px; color: var(--primary);">PLAYER DETAILS</h2>
    </div>

    <div class="profile-card">
        <img id="p-img" class="profile-img" src="">
        <h2 id="p-name" class="player-name">Loading...</h2>
        <div id="p-pos" class="player-pos">--</div>
    </div>

    <div class="stats-title">PLAYER ATTRIBUTES</div>
    <div id="stats-container" class="stats-grid"></div>

<script>
    // eFootball style Color Logic
    function getStatColor(value) {
        if (value >= 90) return '#06b6d4'; // Cyan (90+)
        if (value >= 80) return '#22c55e'; // Green (80-89)
        if (value >= 70) return '#eab308'; // Yellow (70-79)
        return '#ef4444'; // Red (Below 70)
    }

    window.onload = function() {
        const data = localStorage.getItem('selected_player');
        
        if (data) {
            const player = JSON.parse(data);
            
            // Profile Info Setup
            document.getElementById('p-img').src = player.img;
            document.getElementById('p-name').innerText = player.name;
            document.getElementById('p-pos').innerText = player.pos;

            // Stats Setup
            const container = document.getElementById('stats-container');
            container.innerHTML = '';

            if (player.stats) {
                for (const [statName, statValue] of Object.entries(player.stats)) {
                    const box = document.createElement('div');
                    box.className = 'stat-box';
                    
                    const bgColor = getStatColor(statValue);
                    
                    box.innerHTML = `
                        <span class="stat-name">${statName}</span>
                        <span class="stat-num" style="background-color: ${bgColor};">${statValue}</span>
                    `;
                    container.appendChild(box);
                }
            } else {
                container.innerHTML = "<p style='color:red; grid-column:span 2;'>Stats not available!</p>";
            }
        }
    };
</script>
</body>
</html>
