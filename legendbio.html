<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --primary: #fbbf24; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 50px; }
        
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px; }
        .back-btn { position: absolute; left: 0; font-size: 24px; color: var(--primary); text-decoration: none; }
        
        /* Player Card */
        .profile-card { background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #1e2d4d; margin-bottom: 20px; }
        .profile-img { width: 130px; height: 170px; border-radius: 10px; object-fit: cover; border: 2px solid var(--primary); margin-bottom: 10px; }
        .player-name { font-size: 22px; font-weight: bold; margin: 5px 0; color: var(--primary); }
        .player-pos { font-size: 14px; background: rgba(251, 191, 36, 0.1); color: var(--primary); padding: 4px 15px; border-radius: 20px; display: inline-block; font-weight: bold; }

        /* Bio Section */
        .bio-title { font-size: 16px; color: var(--primary); margin: 20px 0 10px; border-left: 4px solid var(--primary); padding-left: 10px; }
        .player-bio { background: var(--card); padding: 15px; border-radius: 12px; font-size: 14px; line-height: 1.6; color: #ccc; text-align: justify; border: 1px solid #1e2d4d; }

        /* Stats Grid */
        .stats-title { font-size: 16px; color: var(--primary); margin: 25px 0 15px; border-left: 4px solid var(--primary); padding-left: 10px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-box { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 10px; border-radius: 8px; border: 1px solid #1e2d4d; }
        .stat-name { font-size: 11px; color: #cbd5e1; font-weight: bold; text-transform: uppercase; }
        .stat-num { font-size: 14px; font-weight: bold; color: #000; padding: 2px 8px; border-radius: 4px; min-width: 30px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="font-size: 18px; color: var(--primary);">PLAYER <span>BIO</span></h2>
    </div>

    <div class="profile-card">
        <img id="p-img" class="profile-img" src="">
        <h2 id="p-name" class="player-name">Loading...</h2>
        <div id="p-pos" class="player-pos">--</div>
    </div>

    <div class="bio-title">PLAYER DESCRIPTION</div>
    <div id="p-bio" class="player-bio">Bio not available.</div>

    <div class="stats-title">PLAYER ATTRIBUTES (STATS)</div>
    <div id="stats-container" class="stats-grid"></div>

<script>
    function getStatColor(val) {
        if (val >= 90) return '#06b6d4'; // Cyan
        if (val >= 80) return '#22c55e'; // Green
        if (val >= 70) return '#eab308'; // Yellow
        return '#ef4444'; // Red
    }

    window.onload = function() {
        const data = localStorage.getItem('selected_player');
        
        if (data) {
            const player = JSON.parse(data);
            
            document.getElementById('p-img').src = player.img;
            document.getElementById('p-name').innerText = player.name;
            document.getElementById('p-pos').innerText = player.pos;
            document.getElementById('p-bio').innerText = player.bio || "No description available.";

            const container = document.getElementById('stats-container');
            container.innerHTML = '';

            if (player.stats) {
                for (const [sName, sValue] of Object.entries(player.stats)) {
                    const box = document.createElement('div');
                    box.className = 'stat-box';
                    const color = getStatColor(sValue);
                    box.innerHTML = `<span class="stat-name">${sName}</span><span class="stat-num" style="background-color:${color}">${sValue}</span>`;
                    container.appendChild(box);
                }
            } else {
                container.innerHTML = "<p style='grid-column:span 2; text-align:center;'>Stats not found!</p>";
            }
        } else {
            document.getElementById('p-name').innerText = "Data Not Found!";
        }
    };
</script>
</body>
</html>
