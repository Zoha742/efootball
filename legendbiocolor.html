<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend Bio - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* আপনার ডিজাইন হুবহু রাখা হয়েছে */
        :root {
            --bg: #050a18;
            --card: #121e36;
            --gold: #fbbf24;
            --green: #22c55e;
            --text: #ffffff;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { color: var(--gold); font-size: 24px; cursor: pointer; text-decoration: none; }

        .bio-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #1e2d4d; max-width: 400px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .bio-img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--gold); object-fit: cover; margin-bottom: 15px; }
        .legend-name { color: var(--gold); font-size: 24px; margin: 10px 0; text-transform: uppercase; }
        .legend-pos { background: var(--green); color: #000; padding: 5px 15px; border-radius: 50px; display: inline-block; font-weight: bold; font-size: 14px; margin-bottom: 15px; }
        .bio-text { text-align: justify; font-size: 14px; color: #cbd5e1; line-height: 1.6; border-top: 1px solid #1e2d4d; padding-top: 15px; }
        
        .ad-space { margin-top: 30px; padding: 10px; background: #070d19; border: 1px dashed #334155; color: #555; font-size: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left back-btn" onclick="history.back()"></i>
    </div>

    <div class="bio-card">
        <img id="img" class="bio-img" src="" alt="">
        <h2 id="name" class="legend-name">Loading...</h2>
        <div id="pos" class="legend-pos"></div>
        <div id="bio" class="bio-text"></div>
    </div>

    <div class="ad-space">ADVERTISEMENT - BANNER AD</div>

    <script>
        // Firebase Configuration (Server Integration)
        const firebaseConfig = {
            apiKey: "AIzaSyAy2nEcb--kbjU7tSIm6lJG5ZpEFSus7sg",
            authDomain: "efootball-57d9b.firebaseapp.com",
            projectId: "efootball-57d9b",
            storageBucket: "efootball-57d9b.firebasestorage.app",
            messagingSenderId: "1031993322489",
            appId: "1:1031993322489:web:0336c8e1869318a8222b28"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = function() {
            // আগের কমান্ড হুবহু রাখা হয়েছে
            const savedData = localStorage.getItem('selected_legend');
            
            if (savedData) {
                const legend = JSON.parse(savedData);
                
                // HTML-এ ডাটা সেট করা
                document.getElementById('img').src = legend.img;
                document.getElementById('name').innerText = legend.name;
                document.getElementById('pos').innerText = legend.pos;
                document.getElementById('bio').innerText = legend.bio;
                
                document.title = legend.name + " - Biography";
            } else {
                document.getElementById('name').innerText = "Legend Not Found";
            }
        }
    </script>
</body>
</html>
