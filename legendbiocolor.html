<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Bio Color - eFootball HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050a18;
            --card-dark: #121e36;
            --primary-color: #fbbf24; /* Legend Gold */
            --text-color: #ffffff;
            --rating-good: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; padding-bottom: 20px; }

        .header { background-color: #070d19; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
        .back-btn { color: var(--primary-color); font-size: 20px; text-decoration: none; margin-right: 15px; cursor: pointer; }
        .header-title { font-size: 18px; font-weight: bold; }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .player-card-hero { background: linear-gradient(145deg, #1a2a4d, #0d1629); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #1e2d4d; margin-bottom: 20px; }
        .player-img { width: 180px; height: auto; border-radius: 10px; margin-bottom: 15px; }
        .player-name { font-size: 22px; font-weight: bold; color: var(--primary-color); }
        .player-pos { color: #94a3b8; font-size: 14px; margin-bottom: 10px; }

        .rating-badge { display: inline-block; background: var(--rating-good); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 18px; margin-top: 5px; }

        .bio-section { background: var(--card-dark); border-radius: 15px; padding: 15px; border: 1px solid #1e2d4d; margin-bottom: 20px; }
        .section-title { font-size: 16px; color: var(--primary-color); margin-bottom: 10px; display: flex; align-items: center; }
        .section-title i { margin-right: 8px; }
        .bio-text { line-height: 1.6; color: #cbd5e1; font-size: 14px; }

        /* Ads Space */
        .ad-space { background: #0a1428; border: 1px dashed #334155; border-radius: 10px; padding: 10px; text-align: center; margin-top: 20px; min-height: 50px; }
        .ad-content { font-size: 10px; color: #64748b; }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></div>
        <div class="header-title">Legendary Profile</div>
    </div>

    <div class="container">
        <div class="player-card-hero">
            <img id="player-img" src="" alt="" class="player-img">
            <h1 id="player-name" class="player-name">Loading...</h1>
            <p id="player-pos" class="player-pos">Position</p>
            <div id="player-rating" class="rating-badge">--</div>
        </div>

        <div class="bio-section">
            <h3 class="section-title"><i class="fas fa-book"></i> Biography</h3>
            <p id="bio-text" class="bio-text">
                Player description will appear here...
            </p>
        </div>

        <div class="ad-space">
            <div class="ad-content">
                <p>ADVERTISEMENT</p>
                </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            // LocalStorage theke data collect kora
            const playerData = localStorage.getItem('selected_player');
            
            if (playerData) {
                const player = JSON.parse(playerData);
                
                // HTML Elements update kora
                document.getElementById('player-img').src = player.img;
                document.getElementById('player-name').innerText = player.name;
                document.getElementById('player-pos').innerText = player.pos;
                document.getElementById('player-rating').innerText = player.rating || "99"; // Rating na thakle default 99
                document.getElementById('bio-text').innerText = player.bio;
                
                // Title update kora
                document.title = player.name + " - Bio";
            } else {
                document.getElementById('player-name').innerText = "No Data Found";
            }
        };
    </script>
</body>
</html>
