<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Tasks - eFootball HUB</title>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --primary: #3b82f6; --text: #ffffff; --border: #1e2d4d; --green: #22c55e; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }
        .top-bar { display: flex; align-items: center; padding: 15px; background: rgba(18, 30, 54, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .top-bar a { color: white; text-decoration: none; margin-right: 15px; }
        .container { padding: 20px; text-align: center; }
        .task-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); }
        .slot { background: #050a18; border: 1px solid var(--border); border-radius: 12px; padding: 10px; font-size: 11px; }
        .btn { width: 100%; border: none; padding: 15px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
        .btn-blue { background: var(--primary); }
        .btn-green { background: var(--green); }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html"><i class="fas fa-chevron-left"></i></a>
        <span>Daily Tasks</span>
        <div style="margin-left: auto; color: #fbbf24; font-weight: bold;" id="user-gp">0 GP</div>
    </div>

    <div class="container">
        <div class="task-card">
            <button id="task-btn" class="btn btn-blue" onclick="collectReward()">WATCH AD & EARN GP</button>
        </div>
    </div>

    <script>
        function updateUI() {
            let gp = parseInt(localStorage.getItem('user_gp'));
            if (isNaN(gp)) gp = 0;
            document.getElementById('user-gp').innerText = gp.toLocaleString() + " GP";
        }

        function collectReward() {
            // Admin config reward check
            const adminConfig = JSON.parse(localStorage.getItem('admin_config')) || { task_reward: 100 };
            const reward = parseInt(adminConfig.task_reward) || 100;

            let currentGP = parseInt(localStorage.getItem('user_gp'));
            if (isNaN(currentGP)) currentGP = 0;

            let newTotal = currentGP + reward;
            localStorage.setItem('user_gp', newTotal);
            localStorage.setItem('last_task_collect', Date.now());
            
            // Increment tasks done count
            let done = parseInt(localStorage.getItem('tasks_done')) || 0;
            localStorage.setItem('tasks_done', done + 1);

            document.getElementById('user-gp').innerText = newTotal.toLocaleString() + " GP";
            alert(`Success! ${reward} GP added to your wallet.`);
            updateUI();
        }
        
        window.onload = updateUI;
    </script>
</body>
</html>
