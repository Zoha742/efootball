<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Tasks - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* আপনার অরিজিনাল ডিজাইন হুবহু ১:১ রাখা হয়েছে */
        :root { --bg: #050a18; --card: #121e36; --primary: #3b82f6; --text: #ffffff; --border: #1e2d4d; --green: #22c55e; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }
        
        .top-bar { display: flex; align-items: center; padding: 15px; background: rgba(18, 30, 54, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .top-bar a { color: white; text-decoration: none; margin-right: 15px; }

        .container { padding: 20px; text-align: center; }
        .task-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        .slots-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .slot { background: #0f172a; border: 1px solid var(--border); padding: 15px 5px; border-radius: 12px; font-size: 10px; color: #64748b; transition: 0.3s; }
        .slot i { font-size: 18px; margin-bottom: 5px; }
        .slot.done { border-color: var(--green); color: var(--green); background: rgba(34, 197, 94, 0.05); }

        .task-btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s; margin-top: 10px; color: white; }
        .btn-blue { background: var(--primary); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .btn-green { background: var(--green); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
        .btn-disabled { background: #1e293b; color: #64748b; cursor: not-allowed; }

        .timer-box { margin-top: 20px; display: none; }
        .countdown { font-size: 24px; font-weight: bold; color: var(--primary); font-family: monospace; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html"><i class="fas fa-chevron-left"></i></a>
        <span>Daily Tasks</span>
    </div>

    <div class="container">
        <div class="task-card">
            <h2 style="margin:0; font-size: 20px;">Watch Ads & Earn</h2>
            <p style="font-size: 13px; color: #94a3b8; margin: 10px 0 20px;">৬টি অ্যাড দেখুন এবং বড় অংকের GP বোনাস নিন।</p>
            
            <div class="slots-grid">
                <div class="slot" id="slot-1"><i class="fas fa-play"></i><br>Ad 1</div>
                <div class="slot" id="slot-2"><i class="fas fa-play"></i><br>Ad 2</div>
                <div class="slot" id="slot-3"><i class="fas fa-play"></i><br>Ad 3</div>
                <div class="slot" id="slot-4"><i class="fas fa-play"></i><br>Ad 4</div>
                <div class="slot" id="slot-5"><i class="fas fa-play"></i><br>Ad 5</div>
                <div class="slot" id="slot-6"><i class="fas fa-play"></i><br>Ad 6</div>
            </div>

            <button id="task-btn" class="task-btn btn-blue" onclick="handleTask()">WATCH AD (1/6)</button>

            <div id="timer" class="timer-box">
                <p style="font-size: 12px; color: #94a3b8; margin-bottom: 5px;">Next Reward Available In:</p>
                <div class="countdown" id="countdown-timer">00:00:00</div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAy2nEcb--kbjU7tSIm6lJG5ZpEFSus7sg",
            authDomain: "efootball-57d9b.firebaseapp.com",
            projectId: "efootball-57d9b",
            storageBucket: "efootball-57d9b.firebasestorage.app",
            messagingSenderId: "1031993322489",
            appId: "1:1031993322489:web:0336c8e1869318a8222b28"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tg = window.Telegram.WebApp;
        const userId = String(tg.initDataUnsafe?.user?.id || "774900");

        let adsWatched = 0;
        let taskReward = 500; // Default
        const AdController = window.Adsgram?.init({ blockId: "4774" });

        // ১. লোড হওয়ার সময় সার্ভার থেকে ডাটা চেক করা
        window.onload = function() {
            // অ্যাডমিন কনফিগ থেকে রিওয়ার্ড অ্যামাউন্ট আনা
            db.ref('admin_config/task_reward').on('value', (snap) => {
                if(snap.exists()) taskReward = snap.val();
            });

            // ইউজারের বর্তমান টাস্ক স্ট্যাটাস চেক করা
            db.ref('users/' + userId).once('value').then((snap) => {
                const data = snap.val() || {};
                const lastCollect = data.last_task_collect || 0;
                const now = Date.now();
                const cooldown = 24 * 60 * 60 * 1000; // ২৪ ঘণ্টা

                if (now - lastCollect < cooldown) {
                    startTimer(cooldown - (now - lastCollect));
                } else {
                    // যদি ২৪ ঘণ্টা পার হয়ে যায়, প্রোগ্রেস রিসেট করে দেখানো
                    adsWatched = data.current_ads_watched || 0;
                    if(adsWatched >= 6) {
                        updateButtonToCollect();
                    } else {
                        updateUI();
                    }
                }
            });
        };

        function handleTask() {
            if (adsWatched < 6) {
                if (AdController) {
                    AdController.show().then(() => {
                        adsWatched++;
                        // সার্ভারে অ্যাড দেখার প্রোগ্রেস সেভ করা
                        db.ref('users/' + userId + '/current_ads_watched').set(adsWatched);
                        updateUI();
                    }).catch(() => alert("Ad failed to load. Try again!"));
                } else {
                    alert("Adsgram not ready!");
                }
            } else {
                collectReward();
            }
        }

        function updateUI() {
            const btn = document.getElementById('task-btn');
            
            // স্লটগুলো আপডেট করা
            for (let i = 1; i <= 6; i++) {
                const slot = document.getElementById(`slot-${i}`);
                if (i <= adsWatched) {
                    slot.classList.add('done');
                    slot.innerHTML = `<i class="fas fa-check-circle"></i><br>Done`;
                }
            }

            if (adsWatched < 6) {
                btn.innerText = `WATCH AD (${adsWatched + 1}/6)`;
            } else {
                updateButtonToCollect();
            }
        }

        function updateButtonToCollect() {
            const btn = document.getElementById('task-btn');
            btn.innerText = "COLLECT GP REWARD";
            btn.classList.remove('btn-blue');
            btn.classList.add('btn-green');
        }

        function collectReward() {
            db.ref('users/' + userId).once('value').then((snap) => {
                const data = snap.val() || {};
                const currentGP = data.gp || 0;
                const totalTasks = data.tasks_done || 0;

                // ১. পয়েন্ট যোগ করা ২. শেষ কালেক্ট টাইম আপডেট করা ৩. অ্যাড প্রোগ্রেস ০ করা
                const updates = {};
                updates['gp'] = currentGP + taskReward;
                updates['last_task_collect'] = Date.now();
                updates['current_ads_watched'] = 0;
                updates['tasks_done'] = totalTasks + 1;

                db.ref('users/' + userId).update(updates).then(() => {
                    // হিস্ট্রি সেভ করা
                    const historyRef = db.ref('users/' + userId + '/history').push();
                    historyRef.set({
                        type: 'Daily Task Reward',
                        amount: taskReward,
                        status: 'Completed',
                        date: new Date().toLocaleString()
                    });

                    alert(`Congratulations! ${taskReward} GP Added!`);
                    location.reload(); // টাইমার দেখানোর জন্য রিলোড
                });
            });
        }

        function startTimer(remaining) {
            document.getElementById('task-btn').style.display = "none";
            document.getElementById('timer').style.display = "block";
            
            // সব স্লট পূর্ণ দেখানো
            for (let i = 1; i <= 6; i++) {
                document.getElementById(`slot-${i}`).classList.add('done');
                document.getElementById(`slot-${i}`).innerHTML = `<i class="fas fa-check-circle"></i><br>Done`;
            }

            const countdownSpan = document.getElementById('countdown-timer');
            const interval = setInterval(() => {
                remaining -= 1000;
                if (remaining <= 0) {
                    clearInterval(interval);
                    location.reload(); // সময় শেষ হলে টাস্ক রিসেট
                }

                let hours = Math.floor(remaining / (1000 * 60 * 60));
                let minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
                let seconds = Math.floor((remaining % (1000 * 60)) / 1000);

                countdownSpan.innerText = 
                    (hours < 10 ? "0" + hours : hours) + ":" + 
                    (minutes < 10 ? "0" + minutes : minutes) + ":" + 
                    (seconds < 10 ? "0" + seconds : seconds);
            }, 1000);
        }
    </script>
</body>
</html>
