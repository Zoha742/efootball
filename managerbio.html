<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Profile</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* আপনার অরিজিনাল ডিজাইন হুবহু রাখা হয়েছে */
        :root { --bg: #050a18; --primary: #fbbf24; --card: #121e36; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; padding: 15px; margin: 0; }
        
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { color: var(--primary); font-size: 24px; text-decoration: none; }
        .bio-img { width: 180px; border-radius: 12px; border: 2px solid var(--primary); margin-top: 5px; }
        .name { color: var(--primary); margin: 10px 0; font-size: 20px; font-weight: bold; }
        
        .details-container { background: var(--card); border-radius: 12px; border: 1px solid #1e2d4d; padding: 15px; text-align: left; margin-bottom: 20px; }
        .section-title { color: var(--primary); font-size: 13px; font-weight: bold; margin: 12px 0 6px; border-bottom: 1px solid #1e2d4d; padding-bottom: 3px; letter-spacing: 1px; }
        
        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .row:last-child { border-bottom: none; }

        .subtitle { font-weight: bold; color: #fbbf24; font-size: 11px; margin-top: 5px; }
        .val { color: #fff; font-size: 13px; }
        .label { color: #94a3b8; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="manager (1).html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    </div>

    <img id="m-img" src="" class="bio-img">
    <div id="m-name" class="name">Loading...</div>

    <div class="details-container">
        <div class="row"><span class="label">Nationality</span><span id="m-nat" class="val">--</span></div>
        <div class="row"><span class="label">Team</span><span id="m-team" class="val">--</span></div>

        <div class="section-title">BOOSTER DETAILS</div>
        <div class="subtitle">Condition</div>
        <div id="m-bc" class="val">--</div>
        
        <div style="display: flex; gap: 20px; margin-top: 10px;">
            <div style="flex: 1;">
                <div class="label">Booster 1</div>
                <div id="m-b1" class="val">--</div>
            </div>
            <div style="flex: 1;">
                <div class="label">Booster 2</div>
                <div id="m-b2" class="val">--</div>
            </div>
        </div>

        <div class="section-title">COACHING STYLE</div>
        <div style="display: flex; gap: 20px;">
            <div style="flex: 1;">
                <div id="m-cp-s" class="val">--</div>
                <div id="m-cp-p" style="color: var(--primary); font-weight: bold; font-size: 12px;">--</div>
            </div>
            <div style="flex: 1;">
                <div id="m-km-s" class="val">--</div>
                <div id="m-km-p" style="color: var(--primary); font-weight: bold; font-size: 12px;">--</div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration (Only for server link)
        const firebaseConfig = {
            apiKey: "AIzaSyAy2nEcb--kbjU7tSIm6lJG5ZpEFSus7sg",
            authDomain: "efootball-57d9b.firebaseapp.com",
            projectId: "efootball-57d9b",
            storageBucket: "efootball-57d9b.firebasestorage.app",
            messagingSenderId: "1031993322489",
            appId: "1:1031993322489:web:0336c8e1869318a8222b28"
        };
        firebase.initializeApp(firebaseConfig);

        window.onload = function() {
            // আপনার অরিজিনাল কমান্ড: localStorage থেকে ডাটা নেওয়া
            const data = localStorage.getItem('selected_manager');
            if (data) {
                const m = JSON.parse(data);
                document.getElementById('m-img').src = m.img;
                document.getElementById('m-name').innerText = m.name;
                document.getElementById('m-nat').innerText = m.nationality;
                document.getElementById('m-team').innerText = m.team;
                document.getElementById('m-bc').innerText = m.boost_cond;
                document.getElementById('m-b1').innerText = m.booster1;
                document.getElementById('m-b2').innerText = m.booster2;
                document.getElementById('m-cp-s').innerText = m.cp_style;
                document.getElementById('m-cp-p').innerText = m.cp_pos;
                document.getElementById('m-km-s').innerText = m.km_style;
                document.getElementById('m-km-p').innerText = m.km_pos;
            }

            // আপনার অরিজিনাল অ্যাডস লজিক
            setTimeout(() => {
                try {
                    if (window.Adsgram) {
                        const bannerAd = window.Adsgram.init({ blockId: "আপনার_ব্যানার_BLOCK_ID" });
                        bannerAd.show().catch((err) => console.log("Banner Error"));
                    }
                } catch (e) {}
            }, 1000);
        };
    </script>
</body>
</html>
