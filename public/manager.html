<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Managers - eFootball HUB</title>
    <!-- Firebase & SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- সেন্ট্রাল স্ক্রিপ্ট লিঙ্ক -->
    <script src="config.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --primary: #fbbf24; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; }
        
        .header { display: flex; align-items: center; position: relative; margin-bottom: 25px; height: 40px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; color: var(--primary); text-decoration: none; z-index: 10; }
        .header h2 { width: 100%; text-align: center; font-size: 18px; color: var(--primary); margin: 0; }

        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .card { background: var(--card); border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #1e2d4d; cursor: pointer; }
        .card img { width: 100%; border-radius: 8px; margin-bottom: 8px; }
        .card p { font-size: 11px; margin: 0; color: #cbd5e1; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2>MANAGERS LIST</h2>
    </div>

    <div id="manager-container" class="grid"></div>

<script>
    console.log("Database connected successfully!");

    async function loadManagers() {
        const container = document.getElementById('manager-container');
        container.innerHTML = "<p style='grid-column: span 3; text-align:center;'>Loading...</p>";
        
        try {
            const response = await fetch('manager.json');
            if (!response.ok) throw new Error('File not found');
            
            const data = await response.json();
            const all_managers = data.managers;
            container.innerHTML = "";

            if (!all_managers || all_managers.length === 0) {
                container.innerHTML = "<p style='grid-column: span 3; text-align:center;'>No managers found!</p>";
                return;
            }

            all_managers.forEach(manager => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${manager.img}"><p>${manager.name}</p>`;
                
                card.onclick = () => {
                    openBio(manager);
                };
                container.appendChild(card);
            });
        } catch (e) { 
            console.error(e);
            container.innerHTML = "<p style='grid-column: span 3; text-align:center;'>Error loading managers!</p>";
        }
    }

    function openBio(manager) {
        localStorage.setItem('selected_manager', JSON.stringify(manager));
        window.location.href = 'managerbio.html';
    }

    window.onload = () => {
        loadManagers();
    };
</script>
</body>
</html>
