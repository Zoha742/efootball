<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw GP - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --border: #1e2d4d; --text: #ffffff; --green: #22c55e; --blue: #3b82f6; --orange: #f59e0b; --red: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .back-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .balance-box { text-align: center; margin-bottom: 20px; }
        .balance-box h1 { font-size: 32px; margin: 5px 0; color: var(--green); }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #0a1226; color: white; box-sizing: border-box; }
        
        .withdraw-btn { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--blue); color: white; font-weight: bold; cursor: pointer; }
        .withdraw-btn:disabled { background: #2d3748; cursor: not-allowed; }
        
        .history-item { background: #0a1226; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .status-pending { color: var(--orange); font-weight: bold; font-size: 12px; }
        .cancel-btn { background: var(--red); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></button>
        <h3 style="margin: 0;">Withdraw GP</h3>
    </div>

    <div class="balance-box">
        <p style="color: #94a3b8;">Current Balance</p>
        <h1 id="user-gp">0 GP</h1>
    </div>

    <div class="card">
        <div class="input-group">
            <label>Amount (GP)</label>
            <input type="number" id="withdraw-amount" placeholder="Enter amount" oninput="validate()">
        </div>
        <div class="input-group">
            <label>Select Wallet</label>
            <select id="wallet-type" onchange="updateAddr()">
                <option value="ton">TON Wallet</option>
                <option value="usdt">USDT (Binance)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Wallet Address</label>
            <input type="text" id="wallet-address" readonly style="color: #94a3b8;">
        </div>
        <button id="withdraw-btn" class="withdraw-btn" onclick="submitWithdraw()" disabled>Enter Amount</button>
    </div>

    <h4 style="margin-bottom: 10px;"><i class="fas fa-history"></i> Withdraw History</h4>
    <div id="history-list">Loading...</div>

    <script>
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe?.user?.id || "test_user";
        let userGP = 0, userWallets = {}, minLimit = 5000;

        // 1. Real-time Listeners
        db.ref('config/min_limit').on('value', s => minLimit = s.val() || 5000);
        db.ref('users/'+userId+'/gp').on('value', s => {
            userGP = s.val() || 0;
            document.getElementById('user-gp').innerText = userGP.toLocaleString() + " GP";
            validate();
        });
        db.ref('users/'+userId+'/wallets').on('value', s => {
            userWallets = s.val() || {};
            updateAddr();
        });

        function updateAddr() {
            const type = document.getElementById('wallet-type').value;
            document.getElementById('wallet-address').value = userWallets[type] || "Address not set in wallet page";
            validate();
        }

        function validate() {
            const amt = parseInt(document.getElementById('withdraw-amount').value);
            const addr = document.getElementById('wallet-address').value;
            const btn = document.getElementById('withdraw-btn');
            
            if(addr.includes("not set")) { btn.innerText = "Set wallet first"; btn.disabled = true; }
            else if(amt >= minLimit && amt <= userGP) { btn.innerText = "Withdraw Now"; btn.disabled = false; }
            else { btn.innerText = "Check Amount/Limit"; btn.disabled = true; }
        }

        function submitWithdraw() {
            const amt = parseInt(document.getElementById('withdraw-amount').value);
            const type = document.getElementById('wallet-type').value;
            const addr = document.getElementById('wallet-address').value;

            db.ref('withdraw_requests').push({
                userId: userId, amount: amt, method: type.toUpperCase(), address: addr, status: 'pending', date: new Date().toLocaleString()
            }).then(() => db.ref('users/'+userId+'/gp').set(userGP - amt));
        }

        // History with Cancel Button
        db.ref('withdraw_requests').on('value', snap => {
            let html = "";
            snap.forEach(c => {
                let r = c.val();
                if(r.userId == userId) {
                    let cancelBtn = (r.status === 'pending') ? `<button class="cancel-btn" onclick="cancelReq('${c.key}', ${r.amount})">Cancel</button>` : "";
                    html += `<div class="history-item">
                        <div><b>${r.amount} GP</b><br><span class="status-pending">${r.status.toUpperCase()}</span></div>
                        ${cancelBtn}
                    </div>`;
                }
            });
            document.getElementById('history-list').innerHTML = html || "No history found.";
        });

        function cancelReq(key, amt) {
            if(confirm("Cancel withdraw and refund GP?")) {
                db.ref('withdraw_requests/'+key).remove().then(() => {
                    db.ref('users/'+userId+'/gp').set(userGP + amt);
                });
            }
        }
    </script>
</body>
</html>
