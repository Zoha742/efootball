<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw GP - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    <style>
        :root { --bg: #050a18; --card: #121e36; --border: #1e2d4d; --text: #ffffff; --green: #22c55e; --blue: #3b82f6; --orange: #f59e0b; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .balance-box { text-align: center; margin-bottom: 20px; }
        .balance-box h1 { font-size: 32px; margin: 5px 0; color: var(--green); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #0a1226; color: white; box-sizing: border-box; }
        .withdraw-btn { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--blue); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .withdraw-btn:disabled { background: #2d3748; cursor: not-allowed; }
        .history-item { background: #0a1226; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .status-pending { color: var(--orange); font-weight: bold; }
    </style>
</head>
<body>

    <div class="balance-box">
        <p>ব্যালেন্স: <span id="user-gp">0 GP</span></p>
        <p id="rate-info" style="font-size: 12px; color: #64748b;">Loading limits...</p>
    </div>

    <div class="card">
        <div class="input-group">
            <label>উইথড্র পরিমাণ (GP)</label>
            <input type="number" id="withdraw-amount" placeholder="Min Limit অনুযায়ী লিখুন" oninput="validate()">
        </div>
        <div class="input-group">
            <label>ওয়ালেট সিলেক্ট করুন</label>
            <select id="wallet-type" onchange="updateWalletDisplay()">
                <option value="ton">TON Wallet</option>
                <option value="usdt">USDT (Binance)</option>
            </select>
        </div>
        <div class="input-group">
            <label>আপনার সেভ করা অ্যাড্রেস:</label>
            <input type="text" id="wallet-address" readonly style="background: #1e2d4d; color: #cbd5e1;" placeholder="ওয়ালেটে অ্যাড্রেস সেট করুন">
        </div>
        <button id="withdraw-btn" class="withdraw-btn" onclick="submitWithdraw()" disabled>অ্যামাউন্ট লিখুন</button>
    </div>

    <div id="history-list"></div>

    <script>
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe?.user?.id || "test_user";
        let userGP = 0, minLimit = 5000, userWallets = {};

        // ১. ডাটা আনা
        db.ref('config').on('value', s => { if(s.exists()){ minLimit = s.val().min_limit; document.getElementById('rate-info').innerText = "Min Withdraw: "+minLimit+" GP"; }});
        db.ref('users/'+userId+'/gp').on('value', s => { userGP = s.val() || 0; document.getElementById('user-gp').innerText = userGP + " GP"; });
        db.ref('users/'+userId+'/wallets').on('value', s => { userWallets = s.val() || {}; updateWalletDisplay(); });

        function updateWalletDisplay() {
            const type = document.getElementById('wallet-type').value;
            const addr = userWallets[type] || "";
            document.getElementById('wallet-address').value = addr;
            validate();
        }

        function validate() {
            const amt = parseInt(document.getElementById('withdraw-amount').value);
            const addr = document.getElementById('wallet-address').value;
            const btn = document.getElementById('withdraw-btn');
            
            if(!addr) { btn.innerText = "আগে ওয়ালেট সেট করুন"; btn.disabled = true; }
            else if(amt >= minLimit && amt <= userGP) { btn.innerText = "উইথড্র রিকোয়েস্ট দিন"; btn.disabled = false; }
            else { btn.innerText = "সঠিক অ্যামাউন্ট লিখুন"; btn.disabled = true; }
        }

        function submitWithdraw() {
            const amt = parseInt(document.getElementById('withdraw-amount').value);
            const type = document.getElementById('wallet-type').value;
            const addr = document.getElementById('wallet-address').value;

            db.ref('withdraw_requests').push({
                userId: userId, amount: amt, method: type.toUpperCase(), address: addr, status: 'pending', date: new Date().toLocaleString()
            }).then(() => db.ref('users/'+userId+'/gp').set(userGP - amt))
              .then(() => alert("Request Sent!"));
        }

        // হিস্ট্রি লোড করা
        db.ref('withdraw_requests').on('value', snap => {
            let html = "<h3>History</h3>";
            snap.forEach(c => {
                let r = c.val();
                if(r.userId == userId) {
                    html += `<div class="history-item">
                        <div><b>${r.amount} GP</b><br><small>${r.method}: ${r.address.substring(0,10)}...</small></div>
                        <div class="status-pending">${r.status}</div>
                    </div>`;
                }
            });
            document.getElementById('history-list').innerHTML = html;
        });
    </script>
</body>
</html>
