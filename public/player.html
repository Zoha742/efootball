<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players - eFootball HUB</title>
    <!-- Firebase & SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- সেন্ট্রাল স্ক্রিপ্ট লিঙ্ক -->
    <script src="config.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card-dark: #121e36; --primary: #fbbf24; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 25px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; color: var(--primary); text-decoration: none; }
        
        /* All Position Buttons - Unchanged */
        .pos-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .pos-btn { background: var(--card-dark); border: 1px solid var(--primary); padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; color: var(--primary); font-weight: bold; font-size: 14px; }
        
        .player-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 12px; 
            padding-bottom: 100px; 
        }

        /* Card Design like Screenshot 6 */
        .top-card { 
            background: var(--card-dark); 
            border-radius: 10px; 
            overflow: hidden; 
            border: 1.5px solid var(--primary);
            text-align: center; 
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }
        
        .top-card:active { transform: scale(0.95); }

        /* Image View Fix */
        .top-card img { 
            width: 100%; 
            aspect-ratio: 2/2.3; 
            object-fit: cover; 
            object-position: top; 
            display: block;
        }

        .top-card p { 
            font-size: 11px; 
            padding: 8px 2px; 
            margin: 0; 
            color: var(--text); 
            background: rgba(18, 30, 54, 0.9);
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ব্যানার কন্টেইনার স্টাইল */
        #banner-container { display: flex; justify-content: center; margin-top: 20px; padding-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="font-size: 18px;">SELECT POSITION</h2>
    </div>

    <!-- আপনার পজিশন বাটনগুলো হুবহু আগের মতো রাখা হয়েছে -->
    <div class="pos-grid">
        <div class="pos-btn" onclick="loadPlayers('CF')">CF</div>
        <div class="pos-btn" onclick="loadPlayers('SS')">SS</div>
        <div class="pos-btn" onclick="loadPlayers('RWF')">RWF</div> <!-- ঠিক করা হয়েছে -->
        <div class="pos-btn" onclick="loadPlayers('LWF')">LWF</div> <!-- ঠিক করা হয়েছে -->
        <div class="pos-btn" onclick="loadPlayers('AMF')">AMF</div> <!-- ঠিক করা হয়েছে -->
        <div class="pos-btn" onclick="loadPlayers('LMF')">LMF</div> <!-- ঠিক করা হয়েছে -->
        <div class="pos-btn" onclick="loadPlayers('RMF')">RMF</div> <!-- ঠিক করা হয়েছে -->
        <div class="pos-btn" onclick="loadPlayers('CMF')">CMF</div> <!-- ঠিক করা হয়েছে -->
        <div class="pos-btn" onclick="loadPlayers('DMF')">DMF</div> <!-- ঠিক করা হয়েছে -->
        <div class="pos-btn" onclick="loadPlayers('LB')">LB</div>
        <div class="pos-btn" onclick="loadPlayers('RB')">RB</div>
        <div class="pos-btn" onclick="loadPlayers('CB')">CB</div>
        <div class="pos-btn" onclick="loadPlayers('GK')">GK</div>
    </div>

    <div id="player-container" class="player-grid"></div>

    <!-- ব্যানার কন্টেইনার -->
    <div id="banner-container"></div>

   <script>
    console.log("Database connected successfully!");
       
    const tg = window.Telegram.WebApp;
    tg.expand();

    async function loadPlayers(pos) {
        const container = document.getElementById('player-container');
        container.innerHTML = "<p style='grid-column: span 3; text-align:center; color: #3b82f6;'>Loading Players...</p>";
        
        try {
            const response = await fetch('legendplayer.json'); 
            
            if (!response.ok) {
                throw new Error("ফাইল খুঁজে পাওয়া যায়নি (File not found)");
            }

            const data = await response.json();
            const filteredPlayers = data.players.filter(p => p.pos === pos);
            
            container.innerHTML = ""; 

            if (filteredPlayers.length === 0) {
                container.innerHTML = "<p style='grid-column: span 3; text-align:center;'>No players found for " + pos + "</p>";
                return;
            }

            filteredPlayers.forEach(p => {
                const card = document.createElement('div');
                card.className = 'top-card';
                card.innerHTML = `
                    <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150'">
                    <p>${p.name}</p>
                `;
                
                card.onclick = () => {
                    // ভিডিও অ্যাড বর্তমানে হাইড করা আছে
                    /*
                    if (typeof AdController !== 'undefined') {
                        AdController.showVideoAd(
                            () => openBio(p), 
                            () => openBio(p)
                        );
                        return;
                    }
                    */
                    openBio(p);
                };
                container.appendChild(card);
            });
        } catch (error) {
            console.error(error);
            container.innerHTML = "<p style='grid-column: span 3; text-align:center; color: red;'>ডাটা লোড করতে সমস্যা হয়েছে। দয়া করে player.json ফাইলটি চেক করুন।</p>";
        }
    }

    function openBio(player) {
        localStorage.setItem('selected_player', JSON.stringify(player));
        window.location.href = 'playerbio.html';
    }

    window.onload = () => {
    loadPlayers('CF');
};
</script>
</body>
</html>
