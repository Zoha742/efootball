<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Tasks - eFootball HUB</title>
    <!-- Firebase & SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Central Config & Ad Master -->
    <script src="config.js"></script>
    <script src="ads-manager.js"></script> 

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --primary: #3b82f6; --text: #ffffff; --border: #1e2d4d; --green: #22c55e; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }
        .top-bar { display: flex; align-items: center; padding: 15px; background: rgba(18, 30, 54, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .top-bar a { color: white; text-decoration: none; margin-right: 15px; }
        .container { padding: 20px; text-align: center; }
        .task-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; }
        .reward-info i { font-size: 40px; color: #fbbf24; margin-bottom: 10px; }
        .reward-info h2 { margin: 5px 0; color: var(--green); }
        .ad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .ad-slot { background: #050a18; border: 1px solid var(--border); padding: 15px 5px; border-radius: 12px; font-size: 12px; transition: 0.3s; }
        .ad-slot.done { border-color: var(--green); color: var(--green); }
        .btn-main { width: 100%; border: none; padding: 15px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-blue { background: var(--primary); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        #timer { font-size: 18px; font-weight: bold; color: #f87171; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html"><i class="fas fa-chevron-left"></i></a>
        <span>Daily Video Tasks</span>
    </div>

    <div class="container">
        <div class="task-card">
            <div class="reward-info">
                <i class="fas fa-gift"></i>
                <span>Task Reward</span>
                <h2 id="display-reward">100 GP Points</h2>
            </div>

            <div class="ad-grid" id="ad-slots">
                <div class="ad-slot" id="slot-1"><i class="fas fa-play"></i><br>Ad 1</div>
                <div class="ad-slot" id="slot-2"><i class="fas fa-play"></i><br>Ad 2</div>
                <div class="ad-slot" id="slot-3"><i class="fas fa-play"></i><br>Ad 3</div>
                <div class="ad-slot" id="slot-4"><i class="fas fa-play"></i><br>Ad 4</div>
                <div class="ad-slot" id="slot-5"><i class="fas fa-play"></i><br>Ad 5</div>
                <div class="ad-slot" id="slot-6"><i class="fas fa-play"></i><br>Ad 6</div>
            </div>

            <button id="task-btn" class="btn-main btn-blue" onclick="handleTask()">WATCH AD (1/6)</button>
            <div id="timer">Next Task In: <span id="countdown">12:00:00</span></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe?.user?.id || "test_user";
        let adsWatched = 0;
        let userGP = 0;
        let totalTasksDone = 0;
        const cooldownTime = 12 * 60 * 60 * 1000;

        // ১. রিয়েল-টাইম ডাটা লোড (Firebase)
        function initTask() {
            db.ref('users/' + userId).on('value', snap => {
                const data = snap.val() || {};
                userGP = data.gp || 0;
                totalTasksDone = data.tasks_done || 0;
                const lastCollect = data.last_task_collect || 0;
                const now = Date.now();

                if (now - lastCollect < cooldownTime) {
                    startTimer(cooldownTime - (now - lastCollect));
                } else {
                    resetTaskUI();
                }
            });
        }

        // ২. অ্যাড হ্যান্ডলার (AdController ব্যবহার করে)[cite: 1, 7]
        function handleTask() {
            if (adsWatched < 6) {
                // ads-manager.js থেকে অ্যাড ফাংশন কল[cite: 7]
                AdController.showVideoAd(
                    (result) => {
                        adsWatched++;
                        updateSlotUI(adsWatched);
                        if (adsWatched === 6) {
                            document.getElementById('task-btn').innerText = "COLLECT REWARD";
                            document.getElementById('task-btn').style.background = "var(--green)";
                        } else {
                            document.getElementById('task-btn').innerText = `WATCH AD (${adsWatched + 1}/6)`;
                        }
                    },
                    (error) => {
                        alert("Ad failed to load. Please try again.");
                    }
                );
            } else {
                collectReward();
            }
        }

        function updateSlotUI(num) {
            const slot = document.getElementById(`slot-${num}`);
            slot.classList.add('done');
            slot.innerHTML = '<i class="fas fa-check-circle"></i><br>Done';
        }

        // ৩. রিওয়ার্ড এবং ডাটাবেস আপডেট[cite: 1]
        function collectReward() {
            db.ref('config/task_reward').once('value', s => {
                const reward = s.val() || 100;
                
                db.ref('users/' + userId).update({
                    gp: userGP + reward,
                    tasks_done: totalTasksDone + 1, // টাস্ক রেকর্ড আপডেট[cite: 1]
                    last_task_collect: Date.now()
                }).then(() => {
                    alert(`Congratulations! ${reward} GP Added.`);
                    adsWatched = 0;
                });
            });
        }

        // টাইমার এবং ইউআই ফাংশনসমূহ
        function startTimer(duration) {
            const btn = document.getElementById('task-btn');
            const timerDiv = document.getElementById('timer');
            btn.style.display = "none";
            timerDiv.style.display = "block";

            const interval = setInterval(() => {
                duration -= 1000;
                if (duration <= 0) {
                    clearInterval(interval);
                    resetTaskUI();
                    return;
                }
                let h = Math.floor(duration / 3600000);
                let m = Math.floor((duration % 3600000) / 60000);
                let s = Math.floor((duration % 60000) / 1000);
                document.getElementById('countdown').innerText = 
                    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        function resetTaskUI() {
            document.getElementById('task-btn').style.display = "block";
            document.getElementById('timer').style.display = "none";
            for (let i = 1; i <= 6; i++) {
                const slot = document.getElementById(`slot-${i}`);
                slot.classList.remove('done');
                slot.innerHTML = `<i class="fas fa-play"></i><br>Ad ${i}`;
            }
        }

        window.onload = initTask;
    </script>
</body>
</html>
