<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn More - eFootball HUB</title>
    <!-- Firebase & SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Central Config & Ad Master -->
    <script src="config.js"></script>
    <script src="ads-manager.js"></script> 

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --primary: #818cf8; --text: #ffffff; --border: #1e2d4d; --yellow: #fbbf24; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }
        
        .top-bar { display: flex; align-items: center; padding: 15px; background: rgba(18, 30, 54, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .top-bar a { color: white; text-decoration: none; margin-right: 15px; }

        .container { padding: 20px; text-align: center; }
        .earn-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        .status-info { margin-bottom: 20px; font-size: 14px; color: #94a3b8; }
        .status-info b { color: var(--yellow); }

        .btn-earn { 
            width: 100%; border: none; padding: 16px; border-radius: 12px; 
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s; 
            font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-blue { background: linear-gradient(135deg, #818cf8, #6366f1); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .btn-lock { background: #334155; cursor: not-allowed; opacity: 0.8; }

        #timer-display { margin-top: 15px; font-size: 18px; font-weight: bold; color: #f87171; display: none; }
        .limit-note { font-size: 11px; color: #64748b; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="profile.html"><i class="fas fa-chevron-left"></i></a>
        <span>Earn More GP</span>
    </div>

    <div class="container">
        <div class="earn-card">
            <i class="fas fa-gem" style="font-size: 40px; color: var(--yellow); margin-bottom: 15px;"></i>
            <div class="status-info">
                Daily Limit: <b id="ad-count">0</b> / 3 Ads Watched
            </div>

            <button id="earn-btn" class="btn-earn btn-blue" onclick="watchAd()">
                <i class="fas fa-play-circle"></i> WATCH VIDEO AD
            </button>

            <div id="timer-display">
                Next Ad In: <span id="countdown">00:00</span>
            </div>

            <div class="limit-note">
                <i class="fas fa-info-circle"></i> ভিডিও দেখলে আপনার অ্যাকাউন্টে অ্যাডমিন সেট করা GP যোগ হবে। প্রতিবার অ্যাড দেখার পর ওয়েটিং টাইম বৃদ্ধি পাবে। দিনে সর্বোচ্চ ৩টি অ্যাড দেখা যাবে।
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe?.user?.id || "test_user";
        let adsWatched = 0;
        let nextAllowedTime = 0;
        let userGP = 0;
        let timerInterval;

        // ১. রিয়েল-টাইম ডাটা লোড করা (Firebase)
        function initEarn() {
            db.ref('users/' + userId).on('value', snap => {
                const data = snap.val() || {};
                userGP = data.gp || 0;
                adsWatched = data.earn_ads_count || 0;
                nextAllowedTime = data.earn_next_time || 0;
                updateUI();
            });
        }

        function updateUI() {
            const now = Date.now();
            document.getElementById('ad-count').innerText = adsWatched;

            if (now < nextAllowedTime) {
                startTimer(nextAllowedTime - now);
            } else {
                if (adsWatched >= 3 && now < nextAllowedTime) {
                    showLimitReached();
                } else if (adsWatched >= 3 && now >= nextAllowedTime) {
                    // ২৪ ঘণ্টা পার হলে লিমিট রিসেট
                    resetDailyLimit();
                } else {
                    showReadyState();
                }
            }
        }

        // ২. অ্যাড দেখানো (ads-manager.js ব্যবহার করে)
        function watchAd() {
            AdController.showVideoAd(
                (result) => {
                    handleReward();
                },
                (error) => {
                    alert("Ad failed or skipped. Please try again.");
                }
            );
        }

        // ৩. রিওয়ার্ড এবং ডাটাবেস আপডেট করা[cite: 8, 9]
        function handleReward() {
            db.ref('config/task_reward').once('value', s => {
                const reward = s.val() || 100;
                const newCount = adsWatched + 1;

                // ওয়েটিং টাইম লজিক (Progressive Logic)[cite: 9]
                let waitTime = 0;
                if (newCount === 1) waitTime = 1 * 60 * 1000; // ১ম পর ১ মিনিট
                else if (newCount === 2) waitTime = 3 * 60 * 1000; // ২য় পর ৩ মিনিট
                else if (newCount >= 3) waitTime = 24 * 60 * 60 * 1000; // ৩য় পর ২৪ ঘণ্টা

                const nextTime = Date.now() + waitTime;

                // Firebase এ ডাটা আপডেট[cite: 8]
                db.ref('users/' + userId).update({
                    gp: userGP + reward,
                    earn_ads_count: newCount,
                    earn_next_time: nextTime
                }).then(() => {
                    alert(`Success! You earned ${reward} GP.`);
                });
            });
        }

        function startTimer(diff) {
            const btn = document.getElementById('earn-btn');
            const timerDiv = document.getElementById('timer-display');
            const countdownSpan = document.getElementById('countdown');

            btn.disabled = true;
            btn.classList.add('btn-lock');
            btn.innerHTML = `<i class="fas fa-lock"></i> AD LOCKED`;
            timerDiv.style.display = 'block';

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const now = Date.now();
                const remaining = nextAllowedTime - now;

                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    updateUI();
                    return;
                }

                let h = Math.floor(remaining / 3600000);
                let m = Math.floor((remaining % 3600000) / 60000);
                let s = Math.floor((remaining % 60000) / 1000);

                let display = (h > 0 ? h + "h " : "") + (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
                countdownSpan.innerText = display;
            }, 1000);
        }

        function showReadyState() {
            const btn = document.getElementById('earn-btn');
            btn.disabled = false;
            btn.classList.remove('btn-lock');
            btn.classList.add('btn-blue');
            btn.innerHTML = `<i class="fas fa-play-circle"></i> WATCH VIDEO AD`;
            document.getElementById('timer-display').style.display = 'none';
        }

        function showLimitReached() {
            const btn = document.getElementById('earn-btn');
            btn.disabled = true;
            btn.classList.add('btn-lock');
            btn.innerHTML = `<i class="fas fa-calendar-times"></i> DAILY LIMIT REACHED`;
            document.getElementById('timer-display').style.display = 'block';
        }

        function resetDailyLimit() {
            db.ref('users/' + userId).update({
                earn_ads_count: 0,
                earn_next_time: 0
            });
        }

        window.onload = initEarn;
    </script>
</body>
</html>
