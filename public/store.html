<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store & Offers - eFootball HUB</title>
    
    <!-- ১. Firebase & SDKs লোড করা -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- সেন্ট্রাল কনফিগ লিঙ্ক -->
    <script src="config.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --primary: #fbbf24; --text: #ffffff; --card: #121e36; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 120px; }
        
        /* Header */
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 25px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; color: var(--primary); text-decoration: none; }
        .header h2 { font-size: 18px; color: var(--primary); margin: 0; }

        /* Affiliate Section Title */
        .section-title { font-size: 14px; color: #94a3b8; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* ৪টি লম্বা বাটন (Affiliate Links) */
        .affiliate-container { display: flex; flex-direction: column; gap: 12px; }
        .affiliate-btn { 
            display: flex; align-items: center; justify-content: space-between;
            background: var(--card); border: 1px solid var(--border); padding: 15px;
            border-radius: 12px; color: var(--text); text-decoration: none; transition: 0.3s;
        }
        .affiliate-btn:hover { border-color: var(--primary); background: #1a2947; }
        .affiliate-btn i { font-size: 20px; color: var(--primary); }
        .btn-text { flex-grow: 1; margin-left: 15px; font-weight: bold; font-size: 14px; }

        /* ব্যানার অ্যাড ফিক্সড পজিশন */
        .banner-container {
            position: fixed; bottom: 0; left: 0; width: 100%; 
            display: flex; justify-content: center; align-items: center; 
            background: var(--bg); padding: 10px 0; z-index: 1000;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2>STORE & DEALS</h2>
    </div>

    <div class="section-title">Special Offers & Links</div>

    <!-- ৪টি লম্বা বাটন (এখানে আপনার লিঙ্ক বসান) -->
    <div class="affiliate-container">
        <!-- ১. প্রথম লিঙ্ক -->
        <a href="https://yourlink1.com" target="_blank" class="affiliate-btn">
            <i class="fas fa-shopping-cart"></i>
            <span class="btn-text">Best E-foot Gear Deals</span>
            <i class="fas fa-external-link-alt" style="font-size: 12px; color: #4b5563;"></i>
        </a>

        <!-- ২. দ্বিতীয় লিঙ্ক -->
        <a href="https://yourlink2.com" target="_blank" class="affiliate-btn">
            <i class="fas fa-gift"></i>
            <span class="btn-text">Get Free Gift Cards</span>
            <i class="fas fa-external-link-alt" style="font-size: 12px; color: #4b5563;"></i>
        </a>

        <!-- ৩. তৃতীয় লিঙ্ক -->
        <a href="https://yourlink3.com" target="_blank" class="affiliate-btn">
            <i class="fas fa-star"></i>
            <span class="btn-text">Premium Account Offers</span>
            <i class="fas fa-external-link-alt" style="font-size: 12px; color: #4b5563;"></i>
        </a>

        <!-- ৪. চতুর্থ লিঙ্ক -->
        <a href="https://yourlink4.com" target="_blank" class="affiliate-btn">
            <i class="fas fa-ad"></i>
            <span class="btn-text">Latest Tech Discounts</span>
            <i class="fas fa-external-link-alt" style="font-size: 12px; color: #4b5563;"></i>
        </a>
    </div>

    <!-- ব্যানার অ্যাড (আপনার টাস্ক আইডি দিয়ে) -->
    <div class="banner-container">
        <adsgram-task 
            data-block-id="task-29213" 
            data-debug="false" 
            class="task">
        </adsgram-task>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    // ফায়ারবেস ইনিশিয়ালাইজ (আপনার config.js এর মাধ্যমে হবে)
    console.log("Store page with affiliate links loaded.");
</script>
</body>
</html>
