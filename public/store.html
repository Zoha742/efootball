<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store & Offers - eFootball HUB</title>
    
    <!-- SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --primary: #fbbf24; --text: #ffffff; --card: #121e36; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 50px; }
        
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 25px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; color: var(--primary); text-decoration: none; }
        .header h2 { font-size: 18px; color: var(--primary); margin: 0; }

        .section-title { font-size: 14px; color: #94a3b8; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; }

        .affiliate-container { display: flex; flex-direction: column; gap: 10px; }
        .affiliate-btn { 
            display: flex; align-items: center; justify-content: space-between;
            background: var(--card); border: 1px solid var(--border); padding: 12px 15px;
            border-radius: 10px; color: var(--text); text-decoration: none; cursor: default;
        }
        .affiliate-btn i:first-child { font-size: 20px; color: var(--primary); width: 25px; text-align: center; }
        .btn-text { flex-grow: 1; margin-left: 15px; font-weight: bold; font-size: 14px; }
        .coming-soon { font-size: 10px; background: #1e2947; color: var(--primary); padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2>STORE & DEALS</h2>
    </div>

    <div class="section-title">Coming Soon Platforms</div>

    <div class="affiliate-container">
        <!-- ১. Payoneer -->
        <div class="affiliate-btn">
            <i class="fas fa-university"></i>
            <span class="btn-text">Payoneer</span>
            <span class="coming-soon">Coming Soon</span>
        </div>

        <!-- ২. Fiverr -->
        <div class="affiliate-btn">
            <i class="fas fa-briefcase"></i>
            <span class="btn-text">Fiverr</span>
            <span class="coming-soon">Coming Soon</span>
        </div>

        <!-- ৩. Hostinger -->
        <div class="affiliate-btn">
            <i class="fas fa-server"></i>
            <span class="btn-text">Hostinger</span>
            <span class="coming-soon">Coming Soon</span>
        </div>

        <!-- ৪. AliExpress -->
        <div class="affiliate-btn">
            <i class="fas fa-shopping-bag"></i>
            <span class="btn-text">AliExpress</span>
            <span class="coming-soon">Coming Soon</span>
        </div>

        <!-- ৫. Amazon -->
        <div class="affiliate-btn">
            <i class="fab fa-amazon"></i>
            <span class="btn-text">Amazon</span>
            <span class="coming-soon">Coming Soon</span>
        </div>

        <!-- ৬. Binance -->
        <div class="affiliate-btn">
            <i class="fas fa-chart-line"></i>
            <span class="btn-text">Binance</span>
            <span class="coming-soon">Coming Soon</span>
        </div>

        <!-- ৭. Namecheap -->
        <div class="affiliate-btn">
            <i class="fas fa-globe"></i>
            <span class="btn-text">Namecheap</span>
            <span class="coming-soon">Coming Soon</span>
        </div>

        <!-- ৮. Envato -->
        <div class="affiliate-btn">
            <i class="fas fa-code"></i>
            <span class="btn-text">Envato Market</span>
            <span class="coming-soon">Coming Soon</span>
        </div>

        <!-- ৯. AppSumo -->
        <div class="affiliate-btn">
            <i class="fas fa-rocket"></i>
            <span class="btn-text">AppSumo</span>
            <span class="coming-soon">Coming Soon</span>
        </div>

        <!-- ১০. Bluehost -->
        <div class="affiliate-btn">
            <i class="fas fa-cloud"></i>
            <span class="btn-text">Bluehost</span>
            <span class="coming-soon">Coming Soon</span>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
</script>
</body>
</html>
