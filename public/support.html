<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050a18; color: white; font-family: sans-serif; padding: 15px; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .card { background: #121e36; padding: 20px; border-radius: 12px; border: 1px solid #1e2d4d; }
        select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #0a1226; color: white; border: 1px solid #1e2d4d; border-radius: 8px; box-sizing: border-box; }
        .send-btn { width: 100%; padding: 15px; background: #3b82f6; border: none; border-radius: 8px; color: white; font-weight: bold; }
        .msg-box { background: #1e2d4d; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px; }
        .reply { color: #22c55e; margin-top: 5px; font-weight: bold; border-top: 1px solid #333; padding-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="location.href='profile.html'" style="background:none; border:none; color:white; font-size:20px;"><i class="fas fa-arrow-left"></i></button>
        <h3 style="margin:0;">Support Center</h3>
    </div>

    <div class="card">
        <label>সমস্যার ধরণ (Type):</label>
        <select id="issue-type">
            <option value="Deposit Problem">Deposit Problem</option>
            <option value="Withdraw Problem">Withdraw Problem</option>
            <option value="GP Not Adding">GP Not Adding</option>
            <option value="Account Issue">Account Issue</option>
            <option value="Other">Other</option>
        </select>
        <label>Provide details (Details):</label>
        <textarea id="issue-details" rows="4" placeholder="Please describe your problem in detail..."></textarea>
        <button class="send-btn" onclick="sendMsg()">মেসেজ পাঠান</button>
    </div>

    <div id="my-messages">
        <h4 style="margin-top:20px;">Your messages:</h4>
        <div id="msg-list">Loading...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe?.user?.id || "test_user";

        function sendMsg() {
            const type = document.getElementById('issue-type').value;
            const text = document.getElementById('issue-details').value;
            if(!text) return alert("Write message!");
            
            db.ref('support/' + userId).push({
                type: type, text: text, date: new Date().toLocaleString(), reply: ""
            }).then(() => {
                alert("Message sent!");
                document.getElementById('issue-details').value = "";
            });
        }

        db.ref('support/' + userId).on('value', snap => {
            let html = "";
            snap.forEach(c => {
                let m = c.val();
                html += `<div class="msg-box">
                    <b>${m.type}</b> (${m.date})<br>${m.text}
                    ${m.reply ? `<div class="reply">Admin: ${m.reply}</div>` : ""}
                </div>`;
            });
            document.getElementById('msg-list').innerHTML = html || "There are no messages.";
        });
    </script>
</body>
</html>
