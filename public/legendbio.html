<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Bio</title>
    <!-- Firebase & SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- সেন্ট্রাল স্ক্রিপ্ট লিঙ্ক -->
    <script src="config.js"></script>
    <script src="ads_manager_limit.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --primary: #fbbf24; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 50px; }
        
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 15px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; color: var(--primary); text-decoration: none; }
        
        .profile-card { background: var(--card); border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #1e2d4d; margin-bottom: 15px; }
        .profile-img { width: 120px; border-radius: 12px; border: 2px solid var(--primary); margin-bottom: 10px; }
        .profile-name { font-size: 18px; font-weight: bold; color: var(--primary); }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .info-box { background: var(--card); padding: 10px; border-radius: 8px; border: 1px solid #1e2d4d; }
        .info-label { font-size: 10px; color: #94a3b8; display: block; margin-bottom: 15px; }
        .info-value { font-size: 13px; font-weight: bold; }

        .stats-container { display: flex; flex-direction: column; gap: 8px; }
        .stat-box { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 8px 12px; border-radius: 6px; border: 1px solid #1e2d4d; }
        .stat-name { font-size: 12px; color: #cbd5e1; }
        .stat-num { font-size: 14px; font-weight: bold; color: #000; padding: 2px 8px; border-radius: 4px; min-width: 35px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <a href="legend.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <h3 style="margin:0;">Player Statistics</h3>
</div>

<div class="profile-card">
    <img id="p-img" src="" class="profile-img">
    <div id="p-name" class="profile-name">Loading...</div>
</div>

<div class="info-grid">
    <div class="info-box"><span class="info-label">Nationality</span><span class="info-value" id="p-nation">--</span></div>
    <div class="info-box"><span class="info-label">Team</span><span class="info-value" id="p-team">--</span></div>
    <div class="info-box"><span class="info-label">Position</span><span class="info-value" id="p-pos">--</span></div>
    <div class="info-box"><span class="info-label">Foot</span><span class="info-value" id="p-foot">--</span></div>
    <div class="info-box"><span class="info-label">Height</span><span class="info-value" id="p-height">--</span></div>
    <div class="info-box"><span class="info-label">Playing Style</span><span class="info-value" id="p-style">--</span></div>
</div>

<div class="stats-container" id="stats-container"></div>

<script>
    console.log("Database connected successfully!");

    function getStatColor(val) {
        if (val >= 95) return "#07F05B"; 
        if (val >= 90) return "#0CA60F"; 
        if (val >= 80) return "#ffff00"; 
        if (val >= 70) return "#adff2f"; 
        return "#ffffff";
    }

    window.onload = () => {
        const pData = localStorage.getItem('selected_player');
        if (pData) {
            const p = JSON.parse(pData);
            document.getElementById('p-img').src = p.img;
            document.getElementById('p-name').innerText = p.name;
            document.getElementById('p-nation').innerText = p.nationality || "N/A";
            document.getElementById('p-team').innerText = p.team || "N/A";
            document.getElementById('p-pos').innerText = p.pos || "N/A";
            document.getElementById('p-foot').innerText = p.foot || "N/A";
            document.getElementById('p-height').innerText = p.height || "N/A";
            document.getElementById('p-style').innerText = p.style || "N/A";

            const container = document.getElementById('stats-container');
            container.innerHTML = "";
            
            if (p.stats) {
                Object.entries(p.stats).forEach(([name, val]) => {
                    const box = document.createElement('div');
                    box.className = 'stat-box';
                    box.innerHTML = `<span class="stat-name">${name}</span>
                                    <span class="stat-num" style="background:${getStatColor(val)}">${val}</span>`;
                    container.appendChild(box);
                });
            }
        }

      // --- ১২ ঘণ্টার লিমিটেড অ্যাড সিস্টেম ---
        setTimeout(() => {
            try {
                // নতুন অবজেক্ট ads_manager_limit চেক হবে[cite: 12]
                if (typeof ads_manager_limit !== 'undefined') {
                    // ১. ভিডিও অ্যাড (১২ ঘণ্টায় একবার আসবে)[cite: 12]
                    ads_manager_limit.showBioAd('legend_bio_page');[cite: 12]

                    // ২. ব্যানার অ্যাড লোড করা (আপাতত বন্ধ)[cite: 12]
                   // ads_manager_limit.loadBioBanner('banner-container');[cite: 12]
                }
            } catch (e) {
                console.log("Ad Loading Error:", e);[cite: 12]
            }
        }, 800);
    };
</script>
</body>
</html>
