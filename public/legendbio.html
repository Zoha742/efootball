<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Bio</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="config.js"></script>
    <script src="ads_manager_limit.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --primary: #fbbf24; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 50px; }
        
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 25px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; color: var(--primary); text-decoration: none; }
        .header h2 { font-size: 18px; color: var(--primary); margin: 0; }

        .player-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #1e2d4d; position: relative; }
        .player-img { width: 100%; display: block; }
        .player-name-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 20px 15px 10px; text-align: center; }
        .player-name-overlay h1 { font-size: 24px; margin: 0; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }

        .bio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .bio-item { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid #1e2d4d; display: flex; flex-direction: column; gap: 4px; }
        .bio-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; }
        .bio-val { font-size: 14px; font-weight: bold; color: #fff; }

        .section-title { font-size: 14px; color: var(--primary); margin: 25px 0 12px; text-transform: uppercase; letter-spacing: 1px; border-left: 3px solid var(--primary); padding-left: 10px; }

        .stats-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .stat-box { background: var(--card); padding: 10px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1e2d4d; }
        .stat-name { font-size: 14px; color: #cbd5e1; }
        .stat-num { width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; color: #000; }
    </style>
</head>
<body>

    <div class="header">
        <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2>PLAYER DETAILS</h2>
    </div>

    <div class="player-card">
        <img id="p-img" src="" alt="" class="player-img">
        <div class="player-name-overlay">
            <h1 id="p-name">-</h1>
        </div>
    </div>

    <div class="bio-grid">
        <div class="bio-item">
            <span class="bio-label">Nationality</span>
            <span class="bio-val" id="p-nation">-</span>
        </div>
        <div class="bio-item">
            <span class="bio-label">Position</span>
            <span class="bio-val" id="p-pos">-</span>
        </div>
        <div class="bio-item">
            <span class="bio-label">Playing Foot</span>
            <span class="bio-val" id="p-foot">-</span>
        </div>
        <div class="bio-item">
            <span class="bio-label">Playing Style</span>
            <span class="bio-val" id="p-style">-</span>
        </div>
    </div>

    <div class="section-title">Player Statistics</div>
    <div id="stats-container" class="stats-grid"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const urlParams = new URLSearchParams(window.location.search);
    const playerId = urlParams.get('id');

    async function loadPlayer() {
        try {
            const res = await fetch('player.json');
            const data = await res.json();
            const player = data.players.find(p => p.id == playerId);
            if(player) displayPlayerDetails(player);
        } catch (e) { console.error("Error:", e); }
    }

    const getStatColor = (val) => {
        if (val >= 90) return "#fbbf24";
        if (val >= 80) return "#a3e635";
        if (val >= 70) return "#fde047";
        return "#94a3b8";
    };

    const displayPlayerDetails = (p) => {
        if (p) {
            document.getElementById('p-img').src = p.img || "";
            document.getElementById('p-name').innerText = p.name || "Unknown";
            
            // আপনার JSON-এ 'country' আছে তাই p.country ব্যবহার করা হয়েছে
            document.getElementById('p-nation').innerText = p.country || "N/A";
            document.getElementById('p-pos').innerText = p.pos || "N/A";
            document.getElementById('p-foot').innerText = p.foot || "N/A";
            document.getElementById('p-style').innerText = p.style || "N/A";

            const container = document.getElementById('stats-container');
            container.innerHTML = "";
            
            if (p.stats) {
                Object.entries(p.stats).forEach(([name, val]) => {
                    const box = document.createElement('div');
                    box.className = 'stat-box';
                    box.innerHTML = `<span class="stat-name">${name}</span>
                                    <span class="stat-num" style="background:${getStatColor(val)}">${val}</span>`;
                    container.appendChild(box);
                });
            }
        }

        setTimeout(() => {
            try {
                if (typeof ads_manager_limit !== 'undefined') {
                    ads_manager_limit.showBioAd('player_bio_page');
                }
            } catch (e) { console.log("Ad Error:", e); }
        }, 800);
    };

    window.onload = loadPlayer;
</script>
</body>
</html>
