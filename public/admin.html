<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoha's Ultra Pro Admin - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --border: #1e2d4d; --blue: #3b82f6; --green: #22c55e; --red: #ef4444; --orange: #f59e0b; --purple: #a855f7; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        
        .header { background: var(--card); padding: 15px; position: sticky; top: 0; border-bottom: 1px solid var(--border); z-index: 100; display: flex; align-items: center; gap: 15px; }
        .back-nav { font-size: 20px; color: white; cursor: pointer; padding: 5px; }

        .container { padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr 1fr; } }
        
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
        
        .stat-box { background: #0a1226; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .stat-box h2 { margin: 5px 0; font-size: 20px; color: var(--blue); }

        .input-box { width: 100%; padding: 12px; margin: 8px 0; background: #0a1226; color: white; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 5px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn-orange { background: var(--orange); color: white; }

        .list-item { background: #0a1226; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-left: 4px solid var(--blue); }
        .user-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 10px; background: #0a1226; border-radius: 8px; border: 1px solid var(--border); }
        
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); border: 2px solid var(--blue); padding: 20px; border-radius: 15px; width: 90%; z-index: 1001; max-height: 80vh; overflow-y: auto; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; }
        
        .badge-banned { background: var(--red); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card" style="width: 320px; text-align: center;">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                <i class="fas fa-arrow-left back-nav" onclick="window.history.back()"></i>
                <h3 style="margin:0;">Zoha's Control Center</h3>
            </div>
            <p style="font-size: 12px; color: #94a3b8;">Enter master credentials</p>
            <input type="password" id="admin-pass" class="input-box" placeholder="Password">
            <button class="btn btn-blue" onclick="checkLogin()">Login Dashboard</button>
        </div>
    </div>

    <div id="admin-panel" style="display: none;">
        <div class="header">
            <i class="fas fa-arrow-left back-nav" onclick="location.reload()"></i>
            <h3 style="margin:0;"><i class="fas fa-crown" style="color: gold;"></i> Ultra Admin</h3>
        </div>

        <div class="container">
            <div class="grid">
                <div class="stat-box"><small>Total Users</small><h2 id="st-users">0</h2></div>
                <div class="stat-box"><small>Active (Live)</small><h2 id="st-active" style="color: var(--green);">0</h2></div>
                <div class="stat-box"><small>Pending Req</small><h2 id="st-pending" style="color: var(--orange);">0</h2></div>
                <div class="stat-box"><small>Total GP</small><h2 id="st-total-gp" style="color: var(--green);">0</h2></div>
                <div class="stat-box"><small>Banned</small><h2 id="st-banned" style="color: var(--red);">0</h2></div>
            </div>

            <div class="card">
                <h4><i class="fas fa-hand-holding-usd"></i> Financial Settings</h4>
                <div class="grid">
                    <div>
                        <label style="font-size: 11px;">Min Withdraw (GP)</label>
                        <input type="number" id="cfg-min" class="input-box">
                    </div>
                    <div>
                        <label style="font-size: 11px;">10 Dollar = (GP)</label>
                        <input type="number" id="cfg-rate" class="input-box">
                    </div>
                    <div>
                        <label style="font-size: 11px;">Refer Bonus (GP)</label>
                        <input type="number" id="cfg-bonus" class="input-box">
                    </div>
                </div>
                <button class="btn btn-blue" onclick="saveConfig()"><i class="fas fa-save"></i> Update Settings</button>
            </div>

            <div class="card">
                <h4><i class="fas fa-broadcast-tower"></i> Global Controls</h4>
                <input type="number" id="gift-amt" class="input-box" placeholder="Gift amount to ALL users">
                <button class="btn btn-green" onclick="giftAll()"><i class="fas fa-gift"></i> Send Gift GP</button>
                <div class="grid" style="margin-top:10px;">
                    <button class="btn btn-red" onclick="toggleMaintenance()"><i class="fas fa-power-off"></i> Toggle Maintenance</button>
                    <button class="btn btn-orange" onclick="broadcastMsg()"><i class="fas fa-bullhorn"></i> Broadcast Msg</button>
                </div>
            </div>

            <div class="card">
                <h4><i class="fas fa-wallet"></i> Withdraw Management</h4>
                <div id="wd-list">Loading...</div>
            </div>

            <div class="card">
                <h4><i class="fas fa-user-shield"></i> User Search & Management</h4>
                <input type="text" id="user-search" class="input-box" placeholder="Search ID or Name..." oninput="filterUsers()">
                <div id="user-list" style="max-height: 300px; overflow-y: auto; margin-top: 10px;"></div>
            </div>

            <div class="card">
                <h4><i class="fas fa-envelope-open-text"></i> Support History</h4>
                <div id="sup-list">No messages yet.</div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    <div class="modal" id="modal">
        <h3 id="m-title">Manage User</h3>
        <p id="m-uid" style="font-size: 12px; color: var(--blue);"></p>
        <hr border="0" style="height:1px; background:var(--border); margin:15px 0;">
        <label>Balance (GP)</label>
        <input type="number" id="m-gp" class="input-box">
        
        <div class="grid">
            <button class="btn btn-blue" onclick="updateUserGP()">Update GP</button>
            <button class="btn btn-red" id="ban-btn" onclick="toggleBan()">Ban User</button>
        </div>
        <button class="btn" style="background:#334155; margin-top:10px;" onclick="closeModal()">Cancel</button>
    </div>

    <script>
        function checkLogin() {
            if(document.getElementById('admin-pass').value === "s#642S") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                init();
            } else { alert("Incorrect Password!"); }
        }

        function init() {
            // ১. অ্যাডমিন প্যানেলে ডাটা লোড করা[cite: 7]
            db.ref('config').on('value', s => {
                if(s.exists()){
                    document.getElementById('cfg-min').value = s.val().min_limit || 5000;
                    document.getElementById('cfg-rate').value = s.val().rate || 10000;
                    document.getElementById('cfg-bonus').value = s.val().refer_bonus || 1000;
                }
            });

            // ২. ইউজার স্ট্যাটস এবং লিস্ট[cite: 8]
            db.ref('users').on('value', snap => {
                let count = snap.numChildren();
                let banned = 0, totalGP = 0, activeCount = 0;
                let currentTime = Date.now();
                let html = "";
                
                snap.forEach(c => {
                    let u = c.val();
                    if(u.banned) banned++;
                    totalGP += (u.gp || 0);
                    if (u.lastSeen && (currentTime - u.lastSeen) < (5 * 60 * 1000)) { activeCount++; }

                    html += `<div class="user-item">
                        <div>
                            <b>${c.key}</b> ${u.banned ? '<span class="badge-banned">BANNED</span>' : ''}<br>
                            <small>${u.gp || 0} GP</small>
                        </div>
                        <button class="btn btn-blue" style="width:auto; padding:5px 12px;" onclick="openUser('${c.key}', ${u.gp || 0}, ${u.banned || false})">Manage</button>
                    </div>`;
                });

                document.getElementById('st-users').innerText = count;
                document.getElementById('st-active').innerText = activeCount;
                document.getElementById('st-banned').innerText = banned;
                document.getElementById('st-total-gp').innerText = totalGP.toLocaleString();
                document.getElementById('user-list').innerHTML = html;
            });

            // ৩. উইথড্র রিকোয়েস্ট ম্যানেজমেন্ট[cite: 8]
            db.ref('withdraw_requests').on('value', snap => {
                let pending = 0;
                let html = "";
                snap.forEach(c => {
                    let r = c.val();
                    if(r.status === 'pending') {
                        pending++;
                        html += `<div class="list-item">
                            <b>ID: ${r.userId} - ${r.amount} GP</b><br>
                            <small>Method: ${r.method} | Addr: ${r.address || r.number}</small>
                            <div class="grid" style="margin-top:10px;">
                                <button class="btn btn-green" style="padding:5px;" onclick="updateWD('${c.key}', 'approved', '${r.userId}', ${r.amount})">Accept</button>
                                <button class="btn btn-red" style="padding:5px;" onclick="updateWD('${c.key}', 'rejected', '${r.userId}', ${r.amount})">Reject</button>
                            </div>
                        </div>`;
                    }
                });
                document.getElementById('st-pending').innerText = pending;
                document.getElementById('wd-list').innerHTML = html || "No Pending Requests.";
            });

            // ৪. সাপোর্ট হিস্ট্রি[cite: 8]
            db.ref('support').on('value', snap => {
                let html = "";
                snap.forEach(userSnap => {
                    userSnap.forEach(msgSnap => {
                        let m = msgSnap.val();
                        html += `<div class="list-item" style="border-left-color: ${m.reply ? '#22c55e' : '#3b82f6'}">
                            <b>User: ${userSnap.key}</b><br>${m.text}<br>
                            ${m.reply ? `<i style="color:var(--green)">Admin: ${m.reply}</i>` : `
                            <input type="text" id="r-${msgSnap.key}" class="input-box" placeholder="Type reply...">
                            <button class="btn btn-blue" onclick="reply('${userSnap.key}', '${msgSnap.key}')">Send Reply</button>`}
                        </div>`;
                    });
                });
                document.getElementById('sup-list').innerHTML = html || "No messages.";
            });
        }

        // ৫. ডাটাবেসে সেটিিংস সেভ করা[cite: 7]
        function saveConfig() {
            db.ref('config').update({
                min_limit: parseInt(document.getElementById('cfg-min').value),
                rate: parseInt(document.getElementById('cfg-rate').value),
                refer_bonus: parseInt(document.getElementById('cfg-bonus').value)
            }).then(() => alert("Settings Updated Successfully!"));
        }

        function giftAll() {
            let amt = parseInt(document.getElementById('gift-amt').value);
            if(!amt) return;
            db.ref('users').once('value', snap => {
                snap.forEach(c => {
                    db.ref('users/' + c.key + '/gp').transaction(curr => (curr || 0) + amt);
                    db.ref('notifications/' + c.key).push({ text: `Admin gifted you ${amt} GP!`, date: new Date().toLocaleString() });
                });
                alert("Gift sent to everyone!");
            });
        }

        function updateWD(key, status, uid, amt) {
            if(confirm(`Confirm ${status}?`)) {
                db.ref('withdraw_requests/' + key).update({ status: status }).then(() => {
                    if(status === 'rejected') { db.ref('users/' + uid + '/gp').transaction(c => (c || 0) + amt); }
                    db.ref('notifications/' + uid).push({ text: `Your withdraw of ${amt} GP was ${status}.`, date: new Date().toLocaleString() });
                    alert("Request Updated!");
                });
            }
        }

        function openUser(id, gp, isBanned) {
            window.targetU = id;
            window.targetBanned = isBanned;
            document.getElementById('m-uid').innerText = "ID: " + id;
            document.getElementById('m-gp').value = gp;
            document.getElementById('ban-btn').innerText = isBanned ? "Unban User" : "Ban User";
            document.getElementById('ban-btn').className = isBanned ? "btn btn-green" : "btn btn-red";
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
        }

        function updateUserGP() {
            let gp = parseInt(document.getElementById('m-gp').value);
            db.ref('users/' + window.targetU + '/gp').set(gp).then(() => { alert("Updated!"); closeModal(); });
        }

        function toggleBan() {
            let newState = !window.targetBanned;
            db.ref('users/' + window.targetU + '/banned').set(newState).then(() => { alert(newState ? "User Banned!" : "User Unbanned!"); closeModal(); });
        }

        function reply(uid, mid) {
            let txt = document.getElementById('r-'+mid).value;
            if(!txt) return;
            db.ref('support/'+uid+'/'+mid).update({ reply: txt }).then(() => alert("Replied!"));
        }

        function filterUsers() {
            let q = document.getElementById('user-search').value.toLowerCase();
            document.querySelectorAll('.user-item').forEach(it => {
                it.style.display = it.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }

        function toggleMaintenance() {
            db.ref('config/maintenance').once('value', snap => {
                let current = snap.val() || false;
                db.ref('config/maintenance').set(!current).then(() => alert("Maintenance " + (!current ? "Enabled" : "Disabled")));
            });
        }

        function broadcastMsg() {
            let m = prompt("Enter message for ALL users:");
            if(m) {
                db.ref('users').once('value', snap => {
                    snap.forEach(c => {
                        db.ref('notifications/' + c.key).push({ text: m, date: new Date().toLocaleString() });
                    });
                    alert("Broadcast sent!");
                });
            }
        }

        function closeModal() { document.getElementById('overlay').style.display='none'; document.getElementById('modal').style.display='none'; }
    </script>
</body>
</html>
