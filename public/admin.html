<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoha's Master Admin</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050a18; color: white; font-family: sans-serif; margin: 0; }
        .header { background: #121e36; padding: 15px; position: sticky; top: 0; border-bottom: 1px solid #1e2d4d; z-index: 100; display: flex; align-items: center; gap: 15px; }
        .card { background: #121e36; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #1e2d4d; }
        .input-box { width: 100%; padding: 10px; margin: 8px 0; background: #0a1226; color: white; border: 1px solid #1e2d4d; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-green { background: #22c55e; color: white; }
        .btn-red { background: #ef4444; color: white; }
        .user-item { background: #0a1226; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #1e2d4d; display: flex; justify-content: space-between; align-items: center; }
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card" style="width: 300px;">
            <h3>Zoha Master Admin</h3>
            <input type="password" id="pass" class="input-box" placeholder="Password">
            <button class="btn btn-blue" onclick="login()">Access Dashboard</button>
        </div>
    </div>

    <div id="panel" style="display: none;">
        <div class="header">
            <button onclick="location.reload()" style="background:none; border:none; color:white; font-size:20px;"><i class="fas fa-arrow-left"></i></button>
            <h3 style="margin:0;">Master Panel</h3>
        </div>

        <div style="padding: 15px;">
            <div class="card">
                <p>Total Users: <b id="total-u">0</b> | Pending Withdraws: <b id="total-w">0</b></p>
            </div>

            <div class="card">
                <h4><i class="fas fa-users"></i> Search & Manage</h4>
                <input type="text" id="search" class="input-box" placeholder="Type User ID..." oninput="search()">
                <div id="u-list" style="max-height: 250px; overflow-y: auto;"></div>
            </div>

            <div class="card">
                <h4><i class="fas fa-gift"></i> Gift GP (All Users)</h4>
                <input type="number" id="gift-amt" class="input-box" placeholder="GP Amount">
                <button class="btn btn-green" onclick="giftAll()">Send GP to All</button>
            </div>

            <div class="card">
                <h4><i class="fas fa-cogs"></i> Withdraw Config</h4>
                <input type="number" id="min-w" class="input-box" placeholder="Min Withdraw Limit">
                <input type="number" id="ex-rate" class="input-box" placeholder="Exchange Rate">
                <button class="btn btn-blue" onclick="saveCfg()">Save Limits</button>
            </div>

            <div class="card">
                <h4><i class="fas fa-headset"></i> Support Inbox (History)</h4>
                <div id="sup-list"></div>
            </div>
        </div>
    </div>

    <div id="u-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#121e36; border:2px solid #3b82f6; padding:20px; border-radius:12px; width:90%; z-index:1000;">
        <h3 id="m-uid"></h3>
        <label>Set GP Balance:</label>
        <input type="number" id="m-gp" class="input-box">
        <button class="btn btn-green" onclick="updateU()">Update GP</button>
        <button class="btn btn-red" onclick="this.parentElement.style.display='none'" style="margin-top:10px;">Close</button>
    </div>

    <script>
        function login() {
            if(document.getElementById('pass').value === "s#642S") {
                document.getElementById('login-screen').style.display='none';
                document.getElementById('panel').style.display='block';
                load();
            } else alert("Error!");
        }

        function load() {
            // Users
            db.ref('users').on('value', snap => {
                document.getElementById('total-u').innerText = snap.numChildren();
                let html = "";
                snap.forEach(c => {
                    html += `<div class="user-item">
                        <span>${c.key} (${c.val().gp} GP)</span>
                        <button class="btn btn-blue" style="width:auto; padding:5px 15px;" onclick="openU('${c.key}', ${c.val().gp})">Manage</button>
                    </div>`;
                });
                document.getElementById('u-list').innerHTML = html;
            });

            // Pending Withdraws
            db.ref('withdraw_requests').on('value', snap => {
                let count = 0;
                snap.forEach(c => { if(c.val().status === 'pending') count++; });
                document.getElementById('total-w').innerText = count;
            });

            // Support History
            db.ref('support').on('value', snap => {
                let html = "";
                snap.forEach(userSnap => {
                    userSnap.forEach(msgSnap => {
                        let m = msgSnap.val();
                        html += `<div class="card" style="background:#0a1226; font-size:13px; border-left:4px solid ${m.reply ? '#22c55e' : '#3b82f6'}">
                            <b>User: ${userSnap.key}</b><br>${m.text}<br>
                            ${m.reply ? `<i>Rep: ${m.reply}</i>` : `
                            <input type="text" id="r-${msgSnap.key}" class="input-box" placeholder="Reply...">
                            <button class="btn btn-blue" onclick="reply('${userSnap.key}', '${msgSnap.key}')">Send Reply</button>`}
                        </div>`;
                    });
                });
                document.getElementById('sup-list').innerHTML = html || "No Messages";
            });
        }

        function openU(id, gp) {
            window.target = id;
            document.getElementById('m-uid').innerText = "Manage ID: " + id;
            document.getElementById('m-gp').value = gp;
            document.getElementById('u-modal').style.display='block';
        }

        function updateU() {
            let gp = parseInt(document.getElementById('m-gp').value);
            db.ref('users/'+window.target+'/gp').set(gp).then(() => { alert("Updated!"); document.getElementById('u-modal').style.display='none'; });
        }

        function giftAll() {
            let amt = parseInt(document.getElementById('gift-amt').value);
            db.ref('users').once('value', snap => {
                snap.forEach(c => { db.ref('users/'+c.key+'/gp').set((c.val().gp || 0) + amt); });
                alert("Gifted GP to All!");
            });
        }

        function reply(uid, mid) {
            let txt = document.getElementById('r-'+mid).value;
            db.ref('support/'+uid+'/'+mid).update({ reply: txt });
        }

        function search() {
            let q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.user-item').forEach(it => {
                it.style.display = it.innerText.toLowerCase().includes(q) ? "flex" : "none";
            });
        }
    </script>
</body>
</html>
