<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Zoha</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050a18; color: white; font-family: sans-serif; padding: 15px; margin: 0; }
        .header { background: #121e36; padding: 15px; position: sticky; top: 0; border-bottom: 1px solid #1e2d4d; z-index: 100; display: flex; align-items: center; gap: 15px; }
        .card { background: #121e36; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #1e2d4d; }
        .input-box { width: 100%; padding: 10px; margin: 10px 0; background: #0a1226; color: white; border: 1px solid #1e2d4d; border-radius: 6px; box-sizing: border-box; }
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-green { background: #22c55e; color: white; }
        .btn-red { background: #ef4444; color: white; }
        .user-item { background: #0a1226; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #1e2d4d; display: flex; justify-content: space-between; align-items: center; }
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card" style="width: 300px;">
            <h3>Admin Login</h3>
            <input type="text" id="user" class="input-box" placeholder="Username">
            <input type="password" id="pass" class="input-box" placeholder="Password">
            <button class="btn btn-blue" style="width: 100%;" onclick="login()">Enter</button>
        </div>
    </div>

    <div id="admin-panel" style="display: none;">
        <div class="header">
            <button onclick="location.reload()" style="background:none; border:none; color:white; font-size:20px;"><i class="fas fa-arrow-left"></i></button>
            <h3 style="margin:0;">Master Dashboard</h3>
        </div>

        <div class="card">
            <h4><i class="fas fa-users"></i> User Stats</h4>
            <p>Total Users: <span id="total-users">0</span></p>
            <input type="text" id="search-box" class="input-box" placeholder="Search User ID..." oninput="searchUser()">
            <div id="user-list" style="max-height: 300px; overflow-y: auto;"></div>
        </div>

        <div class="card">
            <h4><i class="fas fa-gift"></i> Gift GP to All</h4>
            <input type="number" id="gift-amount" class="input-box" placeholder="Enter GP amount">
            <button class="btn btn-green" onclick="giftAll()">Send GP to Everyone</button>
        </div>

        <div class="card">
            <h4><i class="fas fa-comments-alt"></i> Support & Replies</h4>
            <div id="support-list"></div>
        </div>
    </div>

    <div id="user-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#121e36; padding:20px; border:2px solid #3b82f6; border-radius:12px; z-index:1000; width:90%;">
        <h3>Manage User</h3>
        <p id="target-uid"></p>
        <label>GP Balance:</label>
        <input type="number" id="target-gp" class="input-box">
        <div style="display:flex; gap:10px;">
            <button class="btn btn-green" onclick="saveUserGP()">Update GP</button>
            <button class="btn btn-red" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        function login() {
            if(document.getElementById('user').value === "Zoha" && document.getElementById('pass').value === "s#642S") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadData();
            } else alert("Wrong Pass!");
        }

        function loadData() {
            // Count & List
            db.ref('users').on('value', snap => {
                document.getElementById('total-users').innerText = snap.numChildren();
                let html = "";
                snap.forEach(c => {
                    html += `<div class="user-item">
                        <span>${c.key} (${c.val().gp} GP)</span>
                        <button class="btn btn-blue" onclick="manageUser('${c.key}', ${c.val().gp})">Manage</button>
                    </div>`;
                });
                document.getElementById('user-list').innerHTML = html;
            });

            // Support messages
            db.ref('support').on('value', snap => {
                let html = "";
                snap.forEach(userSnap => {
                    userSnap.forEach(msgSnap => {
                        let m = msgSnap.val();
                        if(!m.reply) {
                            html += `<div class="card" style="background:#0a1226;">
                                <b>From: ${userSnap.key} (${m.type})</b><br>${m.text}<br>
                                <input type="text" id="rep-${msgSnap.key}" class="input-box" placeholder="Type reply...">
                                <button class="btn btn-blue" onclick="replySupport('${userSnap.key}', '${msgSnap.key}')">Reply</button>
                            </div>`;
                        }
                    });
                });
                document.getElementById('support-list').innerHTML = html || "No Pending Messages";
            });
        }

        function giftAll() {
            let amt = parseInt(document.getElementById('gift-amount').value);
            if(!amt) return;
            db.ref('users').once('value', snap => {
                snap.forEach(c => {
                    db.ref('users/' + c.key + '/gp').set((c.val().gp || 0) + amt);
                });
                alert("Gifted " + amt + " GP to all users!");
            });
        }

        function manageUser(uid, gp) {
            document.getElementById('target-uid').innerText = "User ID: " + uid;
            document.getElementById('target-gp').value = gp;
            document.getElementById('user-modal').style.display = "block";
            window.currentManageId = uid;
        }

        function saveUserGP() {
            let newGP = parseInt(document.getElementById('target-gp').value);
            db.ref('users/' + window.currentManageId + '/gp').set(newGP).then(() => {
                alert("Updated!");
                closeModal();
            });
        }

        function replySupport(uid, msgId) {
            let rep = document.getElementById('rep-' + msgId).value;
            if(!rep) return;
            db.ref('support/' + uid + '/' + msgId).update({ reply: rep }).then(() => alert("Replied!"));
        }

        function closeModal() { document.getElementById('user-modal').style.display = "none"; }
        
        function searchUser() {
            let s = document.getElementById('search-box').value.toLowerCase();
            let items = document.querySelectorAll('.user-item');
            items.forEach(it => {
                it.style.display = it.innerText.toLowerCase().includes(s) ? "flex" : "none";
            });
        }
    </script>
</body>
</html>
