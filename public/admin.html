<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Admin Panel - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --border: #1e2d4d; --blue: #3b82f6; --green: #22c55e; --red: #ef4444; --orange: #f59e0b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* Back Arrow in Login & Panel */
        .header { background: var(--card); padding: 15px; position: sticky; top: 0; border-bottom: 1px solid var(--border); z-index: 100; display: flex; align-items: center; gap: 15px; }
        .back-nav { font-size: 20px; color: white; cursor: pointer; padding: 5px; }

        .container { padding: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
        
        .input-box { width: 100%; padding: 12px; margin: 8px 0; background: #0a1226; color: white; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }

        .list-item { background: #0a1226; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--border); }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card" style="width: 320px;">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                <i class="fas fa-arrow-left back-nav" onclick="window.history.back()"></i>
                <h3 style="margin:0;">Admin Login</h3>
            </div>
            <input type="password" id="admin-pass" class="input-box" placeholder="Enter Master Password">
            <button class="btn btn-blue" onclick="checkLogin()">Access Dashboard</button>
        </div>
    </div>

    <div id="admin-panel" style="display: none;">
        <div class="header">
            <i class="fas fa-arrow-left back-nav" onclick="location.reload()"></i>
            <h3 style="margin:0;">Pro Dashboard</h3>
        </div>

        <div class="container">
            <div class="card" style="display: flex; justify-content: space-around; text-align: center;">
                <div><small>Total Users</small><h2 id="stat-users">0</h2></div>
                <div><small>Pending</small><h2 id="stat-pending" style="color: var(--orange);">0</h2></div>
            </div>

            <div class="card">
                <h4><i class="fas fa-money-bill-wave"></i> Withdraw Requests</h4>
                <div id="requests-list">Loading...</div>
            </div>

            <div class="card">
                <h4><i class="fas fa-gift"></i> Send Gift GP (All Users)</h4>
                <input type="number" id="gift-amt" class="input-box" placeholder="GP Amount">
                <button class="btn btn-green" onclick="giftAll()">Send GP</button>
            </div>

            <div class="card">
                <h4><i class="fas fa-user-edit"></i> Edit User Balance</h4>
                <input type="text" id="target-id" class="input-box" placeholder="User ID">
                <input type="number" id="target-gp" class="input-box" placeholder="New GP Balance">
                <button class="btn btn-blue" onclick="updateUserGP()">Update Balance</button>
            </div>

            <div class="card">
                <h4><i class="fas fa-comment-dots"></i> Support Inbox</h4>
                <div id="messages-list">No messages.</div>
            </div>
        </div>
    </div>

    <script>
        function checkLogin() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === "s#642S") { // পাসওয়ার্ড আপনার প্রয়োজন মতো বদলে নিন
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadData();
            } else { alert("Access Denied!"); }
        }

        function loadData() {
            // Stats & Users
            db.ref('users').on('value', snap => {
                document.getElementById('stat-users').innerText = snap.numChildren();
            });

            // Withdraw Requests with Control
            db.ref('withdraw_requests').on('value', snap => {
                let html = "";
                let pendingCount = 0;
                snap.forEach(child => {
                    let r = child.val();
                    if(r.status === 'pending') pendingCount++;
                    
                    html += `<div class="list-item">
                        <b>User: ${r.userId}</b><br>
                        Amount: ${r.amount} GP | Method: ${r.method}<br>
                        <small>Address: ${r.address || r.number}</small><br>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button class="btn btn-green" style="padding:5px;" onclick="actionReq('${child.key}', 'approved', '${r.userId}', ${r.amount})">Accept</button>
                            <button class="btn btn-red" style="padding:5px;" onclick="actionReq('${child.key}', 'rejected', '${r.userId}', ${r.amount})">Reject</button>
                        </div>
                    </div>`;
                });
                document.getElementById('requests-list').innerHTML = html || "No requests found.";
                document.getElementById('stat-pending').innerText = pendingCount;
            });

            // Messages
            db.ref('support').on('value', snap => {
                let html = "";
                snap.forEach(userSnap => {
                    userSnap.forEach(msgSnap => {
                        let m = msgSnap.val();
                        if(!m.reply) {
                            html += `<div class="list-item">
                                <b>From: ${userSnap.key}</b><p>${m.text}</p>
                                <input type="text" id="rep-${msgSnap.key}" class="input-box" placeholder="Reply here...">
                                <button class="btn btn-blue" onclick="sendReply('${userSnap.key}', '${msgSnap.key}')">Reply</button>
                            </div>`;
                        }
                    });
                });
                document.getElementById('messages-list').innerHTML = html || "All caught up!";
            });
        }

        function actionReq(key, status, uid, amt) {
            if(confirm("Are you sure?")) {
                db.ref('withdraw_requests/' + key).update({ status: status }).then(() => {
                    // Send Notification to User
                    const msg = status === 'approved' ? `Your withdraw of ${amt} GP was successful!` : `Your withdraw of ${amt} GP was rejected. GP refunded.`;
                    db.ref('notifications/' + uid).push({ text: msg, date: new Date().toLocaleString() });
                    
                    // If rejected, refund GP
                    if(status === 'rejected') {
                        db.ref('users/' + uid + '/gp').transaction(current => (current || 0) + amt);
                    }
                    alert("Request " + status);
                });
            }
        }

        function giftAll() {
            let amt = parseInt(document.getElementById('gift-amt').value);
            if(!amt) return;
            db.ref('users').once('value', snap => {
                snap.forEach(user => {
                    db.ref('users/' + user.key + '/gp').transaction(c => (c || 0) + amt);
                    db.ref('notifications/' + user.key).push({ text: `You received ${amt} GP gift from Admin!`, date: new Date().toLocaleString() });
                });
                alert("Gift sent to all users!");
            });
        }

        function updateUserGP() {
            let uid = document.getElementById('target-id').value;
            let gp = parseInt(document.getElementById('target-gp').value);
            if(!uid || isNaN(gp)) return;
            db.ref('users/' + uid + '/gp').set(gp).then(() => alert("Balance Updated!"));
        }

        function sendReply(uid, mid) {
            let txt = document.getElementById('rep-' + mid).value;
            if(!txt) return;
            db.ref('support/' + uid + '/' + mid).update({ reply: txt }).then(() => alert("Reply Sent!"));
        }
    </script>
</body>
</html>
