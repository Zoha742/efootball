<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --red: #ff4b2b; --green: #22c55e; --blue: #3b82f6; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--border); width: 100%; max-width: 350px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: #0a1226; color: white; outline: none; box-sizing: border-box;}
        .login-btn { background: var(--blue); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        #admin-content { display: none; padding: 15px; }
        
        /* Header & Back Button Style */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .back-btn { background: transparent; color: var(--text); border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: #0a1226; color: white; box-sizing: border-box;}
        .action-btn { background: var(--green); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        .list-item { background: #0a1226; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); }
        
        /* Buttons for Withdraw Manage */
        .btn-group { display: flex; gap: 10px; margin-top: 10px;}
        .btn-group button { flex: 1; padding: 8px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
        .btn-approve { background: var(--green); }
        .btn-reject { background: var(--red); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <i class="fas fa-user-shield" style="font-size: 40px; color: var(--blue); margin-bottom: 15px;"></i>
            <h2>Admin Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="login-btn" onclick="checkLogin()">LOGIN</button>
        </div>
    </div>

    <div id="admin-content">
        <div class="header">
            <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back</button>
            <h3 style="margin: 0; color: var(--blue);">Zoha's Command Center</h3>
        </div>
        
        <div class="card">
            <h3><i class="fas fa-cogs"></i> Withdraw Config</h3>
            <div class="input-group">
                <label>Minimum Withdraw (GP):</label>
                <input type="number" id="min-limit">
            </div>
            <div class="input-group">
                <label>Exchange Rate (GP = $1):</label>
                <input type="number" id="rate">
            </div>
            <button class="action-btn" onclick="saveSettings()">Save Configuration</button>
        </div>
        <div class="card">
            <h3><i class="fas fa-wallet"></i> Pending Requests</h3>
            <div id="requests-list">Loading...</div>
        </div>
        <div class="card">
            <h3><i class="fas fa-envelope"></i> Support Messages</h3>
            <div id="messages-list">No new messages.</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function checkLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === "Zoha" && p === "s#642S") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                initDashboard();
            } else { alert("Access Denied! Username or Password incorrect."); }
        }

        // Back arrow function
        function goBack() {
            document.getElementById('admin-content').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('password').value = ''; // Password faka kore dilam
        }

        function initDashboard() { loadConfig(); loadWithdraws(); loadMessages(); }

        function loadConfig() {
            db.ref('config').on('value', snap => {
                if(snap.exists()) {
                    document.getElementById('min-limit').value = snap.val().min_limit || 0;
                    document.getElementById('rate').value = snap.val().rate || 0;
                }
            });
        }

        function saveSettings() {
            db.ref('config').update({
                min_limit: parseInt(document.getElementById('min-limit').value),
                rate: parseInt(document.getElementById('rate').value)
            }).then(() => alert("Settings Updated!"));
        }

        function loadWithdraws() {
            db.ref('withdraw_requests').on('value', snap => {
                let html = "";
                let hasData = false;
                snap.forEach(child => {
                    let r = child.val();
                    if(r.status === 'pending') {
                        hasData = true;
                        html += `
                        <div class="list-item">
                            <p style="margin: 0 0 5px 0;"><b>User ID:</b> ${r.userId}</p>
                            <p style="margin: 0 0 5px 0; color: var(--green);"><b>Amount:</b> ${r.amount} GP</p>
                            <p style="margin: 0 0 5px 0; color: #f59e0b;"><b>Number:</b> ${r.number}</p>
                            <p style="margin: 0 0 10px 0;"><b>Method:</b> ${r.method}</p>
                            
                            <div class="btn-group">
                                <button class="btn-approve" onclick="approveReq('${child.key}')">Approve</button>
                                <button class="btn-reject" onclick="rejectReq('${child.key}', '${r.userId}', ${r.amount})">Reject & Refund</button>
                            </div>
                        </div>`;
                    }
                });
                document.getElementById('requests-list').innerHTML = hasData ? html : "<p style='text-align:center;'>No Pending Requests</p>";
            });
        }

        function approveReq(key) {
            if(confirm("টাকা পাঠানো হয়েছে? Approve করবেন?")) {
                db.ref('withdraw_requests/' + key).update({ status: 'approved' })
                .then(() => alert("সফলভাবে Approve করা হয়েছে!"));
            }
        }

        // রিজেক্ট করলে ইউজারের ব্যালেন্সে GP ফেরত যাবে
        function rejectReq(key, userId, amount) {
            if(confirm("রিকোয়েস্ট বাতিল করে ইউজারকে GP ফেরত দিতে চান?")) {
                // ১. স্ট্যাটাস রিজেক্ট করা
                db.ref('withdraw_requests/' + key).update({ status: 'rejected' }).then(() => {
                    // ২. ইউজারের ডাটাবেস থেকে বর্তমান GP খুঁজে বের করে ফেরত দেওয়া
                    let userRef = db.ref('users/' + userId + '/gp');
                    userRef.once('value', snap => {
                        let currentGP = snap.val() || 0;
                        userRef.set(currentGP + amount).then(() => {
                            alert("রিকোয়েস্ট বাতিল হয়েছে এবং ইউজারের GP ফেরত দেওয়া হয়েছে!");
                        });
                    });
                });
            }
        }

        function loadMessages() {
            db.ref('support').on('value', snap => {
                let html = "";
                snap.forEach(child => {
                    let m = child.val();
                    html += `<div class="list-item"><b>From: ${m.userId}</b><br>${m.text}</div>`;
                });
                document.getElementById('messages-list').innerHTML = html || "No Messages";
            });
        }
    </script>
</body>
</html>
