<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card-dark: #121e36; --pink: #d946ef; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; padding-bottom: 90px; margin: 0; }
        
        /* Back Arrow Style */
        .back-arrow { position: absolute; top: 20px; left: 20px; font-size: 20px; color: white; cursor: pointer; z-index: 100; }

        .profile-container { background: linear-gradient(180deg, rgba(217, 70, 239, 0.1) 0%, rgba(5, 10, 24, 1) 100%); border-radius: 24px; padding: 30px 20px; border: 1px solid var(--border); position: relative; overflow: hidden; margin-top: 10px; }
        .profile-container::before { content: ''; position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: var(--pink); filter: blur(80px); opacity: 0.2; }
        .profile-header { text-align: center; margin-bottom: 30px; position: relative; }
        .top-icons { position: absolute; top: -10px; right: 0; display: flex; gap: 15px; }
        .top-icons i { font-size: 18px; color: #94a3b8; cursor: pointer; transition: 0.3s; }
        .top-icons i:hover { color: var(--pink); }
        .avatar-wrapper { position: relative; width: 110px; height: 110px; margin: 0 auto 15px; }
        .avatar-ring { position: absolute; inset: -5px; border: 2px solid var(--pink); border-radius: 50%; border-top-color: transparent; animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #user-avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--bg); object-fit: cover; }
        #user-name { font-size: 22px; font-weight: 700; margin: 0; background: linear-gradient(90deg, #fff, #d946ef); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #user-id { font-size: 13px; color: #94a3b8; margin-top: 5px; font-family: monospace; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--card-dark); padding: 15px; border-radius: 16px; border: 1px solid var(--border); text-align: center; transition: 0.3s; }
        .stat-card:active { transform: scale(0.95); }
        .stat-value { display: block; font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .stat-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card i { color: var(--pink); margin-bottom: 8px; font-size: 20px; }
        .menu-section { background: var(--card-dark); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
        .nav-item { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); transition: 0.3s; cursor: pointer; }
        .nav-item:last-child { border-bottom: none; }
        .nav-item:active { background: rgba(217, 70, 239, 0.05); }
        .nav-icon { width: 36px; height: 36px; border-radius: 10px; background: rgba(217, 70, 239, 0.1); display: flex; align-items: center; justify-content: center; margin-right: 15px; }
        .nav-icon i { color: var(--pink); font-size: 16px; }
        .nav-text { flex: 1; font-size: 15px; font-weight: 500; color: #e2e8f0; }
        .nav-item i.fa-chevron-right { font-size: 12px; color: #475569; }
        .p-notif-overlay { position: fixed; inset: 0; background: rgba(5, 10, 24, 0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .p-notif-box { background: var(--card-dark); width: 100%; max-width: 320px; border-radius: 24px; border: 1px solid var(--border); padding: 30px; text-align: center; transform: translateY(20px); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .p-notif-box.show { transform: translateY(0); }
        .p-notif-icon { width: 70px; height: 70px; background: rgba(217, 70, 239, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 30px; color: var(--pink); }
        .p-notif-btn { background: var(--pink); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <i class="fas fa-arrow-left back-arrow" onclick="window.history.back()"></i>

    <div class="profile-container">
        <div class="profile-header">
            <div class="top-icons">
                <i class="fas fa-cog"></i>
                <i class="fas fa-info-circle"></i>
            </div>
            <div class="avatar-wrapper">
                <div class="avatar-ring"></div>
                <img id="user-avatar" src="https://via.placeholder.com/100" alt="Avatar">
            </div>
            <h1 id="user-name">Loading...</h1>
            <div id="user-id">ID: #000000</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-coins"></i>
                <span class="stat-value" id="gp-balance">0</span>
                <span class="stat-label">GP Balance</span>
            </div>
            <div class="stat-card">
                <i class="fas fa-tasks"></i>
                <span class="stat-value" id="total-tasks">0</span>
                <span class="stat-label">Tasks Done</span>
            </div>
        </div>

        <div class="menu-section">
            <div class="nav-item" onclick="location.href='wallet.html'">
                <div class="nav-icon"><i class="fas fa-wallet"></i></div>
                <div class="nav-text">My Wallets</div>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="nav-item" onclick="location.href='withdraw.html'">
                <div class="nav-icon"><i class="fas fa-money-bill-transfer"></i></div>
                <div class="nav-text">Withdraw <span id="withdraw-info" style="font-size: 11px; color: var(--pink); margin-left: 5px;"></span></div>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="nav-item" onclick="location.href='support.html'">
                <div class="nav-icon"><i class="fas fa-headset"></i></div>
                <div class="nav-text">Support Center</div>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="nav-item">
                <div class="nav-icon"><i class="fas fa-share-alt"></i></div>
                <div class="nav-text">Invite Friends</div>
                <i class="fas fa-chevron-right"></i>
            </div>
        </div>
    </div>

    <div class="p-notif-overlay" id="pNotifOverlay">
        <div class="p-notif-box" id="pNotifBox">
            <div class="p-notif-icon"><i class="fas fa-gift"></i></div>
            <h2 style="margin: 0 0 10px 0;">Welcome Back!</h2>
            <p style="color: #94a3b8; font-size: 14px; margin: 0;">Check your new GP rewards in the balance section.</p>
            <button class="p-notif-btn" onclick="hideProfileNotif()">Got it!</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user;
        const userId = user?.id || "test_user";

        // ১. রিয়েল-টাইম ডাটা আপডেট (অ্যাডমিন গিফট দিলে সাথে সাথে এখানে বাড়বে)
        db.ref('users/' + userId + '/gp').on('value', (snapshot) => {
            const currentGP = snapshot.val() || 0;
            document.getElementById('gp-balance').innerText = currentGP.toLocaleString();
            document.getElementById('withdraw-info').innerText = `(${currentGP} GP)`; // উইথড্র অপশনেও GP দেখাবে
            localStorage.setItem('user_gp', currentGP); // লোকাল স্টোরেজও আপডেট করে রাখা হলো
        });

        // ২. ইউজার প্রোফাইল সেট করা
        if (user) {
            document.getElementById('user-name').innerText = user.first_name + (user.last_name ? " " + user.last_name : "");
            document.getElementById('user-id').innerText = "ID: #" + user.id;
            if (user.photo_url) document.getElementById('user-avatar').src = user.photo_url;
        }

        window.onload = function() {
            document.getElementById('total-tasks').innerText = localStorage.getItem('tasks_done') || 0;
            
            if (!sessionStorage.getItem('profile_notif_shown')) {
                setTimeout(showProfileNotif, 1500);
                sessionStorage.setItem('profile_notif_shown', 'true');
            }
        }

        function showProfileNotif() {
            const overlay = document.getElementById('pNotifOverlay');
            const box = document.getElementById('pNotifBox');
            overlay.style.display = 'flex';
            setTimeout(() => { box.classList.add('show'); }, 100);
        }

        function hideProfileNotif() {
            const overlay = document.getElementById('pNotifOverlay');
            const box = document.getElementById('pNotifBox');
            box.classList.remove('show');
            setTimeout(() => { overlay.style.display = 'none'; }, 400);
        }
    </script>
</body>
</html>
