<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --pink: #d946ef; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        
        /* Back Arrow */
        .back-nav { position: absolute; top: 20px; left: 20px; font-size: 22px; color: white; cursor: pointer; z-index: 100; }

        .profile-container { background: linear-gradient(180deg, rgba(217, 70, 239, 0.1) 0%, rgba(5, 10, 24, 1) 100%); border-radius: 24px; padding: 30px 20px; border: 1px solid var(--border); margin-top: 20px; text-align: center; }
        #user-avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--pink); margin-bottom: 10px; }
        #user-name { font-size: 20px; font-weight: bold; margin: 5px 0; }
        #user-id { font-size: 12px; color: #94a3b8; margin-bottom: 20px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid var(--border); }
        .stat-value { display: block; font-size: 18px; font-weight: bold; color: var(--pink); }
        .stat-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; }

        .menu-section { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow: hidden; text-align: left; }
        .nav-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .nav-item:last-child { border-bottom: none; }
        .nav-icon { width: 35px; color: var(--pink); font-size: 18px; }
        .nav-text { flex: 1; font-size: 15px; }
    </style>
</head>
<body>

    <i class="fas fa-arrow-left back-nav" onclick="window.history.back()"></i>

    <div class="profile-container">
        <img id="user-avatar" src="https://via.placeholder.com/100" alt="Avatar">
        <h1 id="user-name">Loading...</h1>
        <div id="user-id">ID: #000000</div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-value" id="gp-balance">0</span>
                <span class="stat-label">Main Balance (GP)</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="total-tasks">0</span>
                <span class="stat-label">Tasks Done</span>
            </div>
        </div>

        <div class="menu-section">
            <div class="nav-item" onclick="location.href='wallet.html'">
                <div class="nav-icon"><i class="fas fa-wallet"></i></div>
                <div class="nav-text">My Wallets</div>
                <i class="fas fa-chevron-right" style="font-size: 12px; color: #444;"></i>
            </div>
            <div class="nav-item" onclick="location.href='withdraw.html'">
                <div class="nav-icon"><i class="fas fa-money-bill-transfer"></i></div>
                <div class="nav-text">Withdraw (Limit check)</div>
                <i class="fas fa-chevron-right" style="font-size: 12px; color: #444;"></i>
            </div>
            <div class="nav-item" onclick="location.href='support.html'">
                <div class="nav-icon"><i class="fas fa-headset"></i></div>
                <div class="nav-text">Support Center</div>
                <i class="fas fa-chevron-right" style="font-size: 12px; color: #444;"></i>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user;
        const userId = user?.id || "test_user";

        // Real-time listener for Main Balance
        db.ref('users/' + userId + '/gp').on('value', snap => {
            const val = snap.val() || 0;
            document.getElementById('gp-balance').innerText = val.toLocaleString();
        });

        if(user) {
            document.getElementById('user-name').innerText = user.first_name + " " + (user.last_name || "");
            document.getElementById('user-id').innerText = "ID: #" + user.id;
            if(user.photo_url) document.getElementById('user-avatar').src = user.photo_url;
        }

        document.getElementById('total-tasks').innerText = localStorage.getItem('tasks_done') || 0;
    </script>
</body>
</html>
