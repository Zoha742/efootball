<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --primary: #3b82f6; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }
        .back-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .input-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #0a1226; color: white; margin: 10px 0; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="location.href='profile.html'"><i class="fas fa-arrow-left"></i></button>
        <h3 style="margin: 0;">My Crypto Wallets</h3>
    </div>
    
    <div class="card">
        <label><i class="fas fa-gem"></i> TON Wallet Address</label>
        <input type="text" id="ton-address" class="input-box" placeholder="Enter TON Address">
        <button class="save-btn" onclick="saveW('ton')">Save TON</button>
    </div>

    <div class="card">
        <label><i class="fas fa-coins"></i> USDT (BEP20) Address</label>
        <input type="text" id="usdt-address" class="input-box" placeholder="Enter USDT Address">
        <button class="save-btn" onclick="saveW('usdt')">Save USDT</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe?.user?.id || "test_user";

        db.ref('users/' + userId + '/wallets').on('value', snap => {
            if(snap.exists()){
                document.getElementById('ton-address').value = snap.val().ton || "";
                document.getElementById('usdt-address').value = snap.val().usdt || "";
            }
        });

        function saveW(type) {
            const addr = document.getElementById(type + '-address').value.trim();
            db.ref('users/' + userId + '/wallets').update({ [type]: addr })
            .then(() => alert(type.toUpperCase() + " Address Saved!"));
        }
    </script>
</body>
</html>
