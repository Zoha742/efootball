<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --primary: #3b82f6; --text: #ffffff; --border: #1e2d4d; --green: #22c55e; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .input-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #0a1226; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        .status-msg { font-size: 12px; color: var(--green); margin-top: 5px; display: none; }
    </style>
</head>
<body>
    <h3 style="text-align: center;"><i class="fas fa-wallet"></i> Crypto Wallets</h3>
    
    <div class="card">
        <label><i class="fas fa-gem"></i> TON Wallet (Tonkeeper)</label>
        <input type="text" id="ton-address" class="input-box" placeholder="Enter TON Address">
        <button class="save-btn" onclick="saveWallet('ton')">Save TON Address</button>
        <p id="ton-status" class="status-msg">Saved successfully!</p>
    </div>

    <div class="card">
        <label><i class="fas fa-coins"></i> USDT Address (Binance/BEP20)</label>
        <input type="text" id="usdt-address" class="input-box" placeholder="Enter USDT Address">
        <button class="save-btn" onclick="saveWallet('usdt')">Save USDT Address</button>
        <p id="usdt-status" class="status-msg">Saved successfully!</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe?.user?.id || "test_user";

        // ১. আগে থেকে সেভ করা অ্যাড্রেস লোড করা
        db.ref('users/' + userId + '/wallets').on('value', snap => {
            if(snap.exists()){
                document.getElementById('ton-address').value = snap.val().ton || "";
                document.getElementById('usdt-address').value = snap.val().usdt || "";
            }
        });

        // ২. ডাটাবেসে সেভ করা
        function saveWallet(type) {
            const addr = document.getElementById(type + '-address').value.trim();
            if(!addr) { alert("Please enter an address!"); return; }

            db.ref('users/' + userId + '/wallets').update({
                [type]: addr
            }).then(() => {
                const status = document.getElementById(type + '-status');
                status.style.display = 'block';
                setTimeout(() => status.style.display = 'none', 3000);
            });
        }
    </script>
</body>
</html>
