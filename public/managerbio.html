<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Profile</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="config.js"></script>
    <script src="ads-manager.js"></script> <!-- সেন্ট্রাল অ্যাড স্ক্রিপ্ট -->
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --primary: #fbbf24; --card: #121e36; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; padding: 15px; margin: 0; }
        
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { color: var(--primary); font-size: 24px; text-decoration: none; }
        .bio-img { width: 180px; border-radius: 12px; border: 2px solid var(--primary); margin-top: 5px; }
        .name { color: var(--primary); margin: 10px 0; font-size: 20px; font-weight: bold; }
        
        .details-container { background: var(--card); border-radius: 12px; border: 1px solid #1e2d4d; padding: 15px; text-align: left; margin-bottom: 20px; }
        .section-title { color: var(--primary); font-size: 13px; font-weight: bold; margin: 12px 0 6px; border-bottom: 1px solid #1e2d4d; padding-bottom: 3px; letter-spacing: 1px; }
        
        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .row:last-child { border-bottom: none; }

        .subtitle { 
            font-weight: bold; 
            color: #fbbf24; 
            font-size: 13px; 
            text-transform: uppercase; 
            width: 45%; 
        }

        .body-text { 
            font-size: 15px; 
            color: #ffffff; 
            text-align: right; 
            width: 55%; 
            font-weight: 500;
        }

        video { width: 100%; border-radius: 10px; border: 1px solid #1e2d4d; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="manager.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <span style="flex:1; text-align:center; color:var(--primary); font-weight:bold;">MANAGER DETAILS</span>
    </div>
    <img id="m-img" class="bio-img" src="">
    <h2 id="m-name" class="name"></h2>
    
    <div class="details-container">
        <div class="row"><span class="subtitle">Nationality</span><span id="m-nat" class="body-text"></span></div>
        <div class="row"><span class="subtitle">Team</span><span id="m-team" class="body-text"></span></div>
        <div class="row"><span class="subtitle">Young Players+</span><span id="m-bc" class="body-text"></span></div>
        <div class="row"><span class="subtitle">Booster 1</span><span id="m-b1" class="body-text"></span></div>
        <div class="row"><span class="subtitle">Booster 2</span><span id="m-b2" class="body-text"></span></div>
        <div class="section-title">CENTERPIECE</div>
        <div class="row"><span class="subtitle">Playing Style</span><span id="m-cp-s" class="body-text"></span></div>
        <div class="row"><span class="subtitle">Position</span><span id="m-cp-p" class="body-text"></span></div>
        <div class="section-title">KEY MAN</div>
        <div class="row"><span class="subtitle">Playing Style</span><span id="m-km-s" class="body-text"></span></div>
        <div class="row"><span class="subtitle">Position</span><span id="m-km-p" class="body-text"></span></div>
    </div>
    
    <div style="text-align: left; color: var(--primary); font-size: 14px; margin-bottom: 8px; font-weight: bold; margin-top: 20px;">
        TACTICAL VIDEO
    </div>
    <video autoplay muted playsinline loop controls style="width: 100%; border-radius: 10px; border: 1px solid #1e2d4d;">
        <source src="https://res.cloudinary.com/dyqegwdme/video/upload/v1777200154/Screen_Recording_20260426_161047_eFootball_cckti0.mp4" type="video/mp4">
    </video>

    <!-- ব্যানার কন্টেইনার -->
    <div id="banner-container" style="display: flex; justify-content: center; margin-top: 25px; padding-bottom: 30px;"></div>
    
    <script>
       console.log("Database connected successfully!");
        
        window.onload = function() {
            const data = localStorage.getItem('selected_manager');
            if (data) {
                const m = JSON.parse(data);
                document.getElementById('m-img').src = m.img;
                document.getElementById('m-name').innerText = m.name;
                document.getElementById('m-nat').innerText = m.nationality;
                document.getElementById('m-team').innerText = m.team;
                document.getElementById('m-bc').innerText = m.boost_cond;
                document.getElementById('m-b1').innerText = m.booster1;
                document.getElementById('m-b2').innerText = m.booster2;
                document.getElementById('m-cp-s').innerText = m.cp_style;
                document.getElementById('m-cp-p').innerText = m.cp_pos;
                document.getElementById('m-km-s').innerText = m.km_style;
                document.getElementById('m-km-p').innerText = m.km_pos;
            }

            // ব্যানার এবং ভিডিও অ্যাড
            setTimeout(() => {
                if (typeof AdController !== 'undefined') {
                    // ১. ব্যানার অ্যাড
                    AdController.loadBanner("banner-container");
                    
                    // ২. ভিডিও অ্যাড (বর্তমানে হাইড করা আছে)
                    /*
                    AdController.showVideoAd(
                        (result) => { console.log("Video Reward Success"); },
                        (error) => { console.log("Video Ad Error"); }
                    );
                    */
                }
            }, 1000);
        };
    </script>
</body>
</html>
