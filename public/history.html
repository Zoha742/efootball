<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History - eFootball HUB</title>
    <!-- Firebase & SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Central Config -->
    <script src="config.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --border: #1e2d4d; --purple: #a78bfa; --green: #22c55e; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 30px; }
        
        .top-bar { display: flex; align-items: center; padding: 15px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .top-bar a { color: white; text-decoration: none; margin-right: 15px; font-size: 18px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-card i { font-size: 20px; color: var(--purple); margin-bottom: 8px; }
        .stat-card h3 { margin: 5px 0; font-size: 18px; color: var(--green); }
        .stat-card p { margin: 0; font-size: 11px; color: #94a3b8; }

        /* ভিডিও অ্যাড বাটনের স্টাইল */
        .ad-section { padding: 0 15px; margin-bottom: 15px; }
        .btn-video { 
            width: 100%; border: none; padding: 14px; border-radius: 12px; 
            background: linear-gradient(135deg, #a78bfa, #7c3aed); color: white; 
            font-weight: bold; cursor: pointer; font-size: 15px; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .history-title { padding: 0 15px; font-size: 14px; color: #94a3b8; margin-top: 10px; }
        .history-list { padding: 10px 15px; }
        .item { background: var(--card); margin-bottom: 10px; padding: 15px; border-radius: 12px; border-left: 4px solid var(--purple); border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="profile.html"><i class="fas fa-chevron-left"></i></a>
        <span>Transaction History</span>
    </div>

    <!-- User Stats Section -->
    <div class="stats-grid">
        <div class="stat-card">
            <i class="fas fa-tasks"></i>
            <h3 id="stat-tasks">0</h3>
            <p>Tasks Completed</p>
        </div>
        <div class="stat-card">
            <i class="fas fa-coins"></i>
            <h3 id="stat-gp">0</h3>
            <p>Total GP Earned</p>
        </div>
    </div>

    <!-- ভিডিও অ্যাড বাটন -->
    <div class="ad-section">
        <button class="btn-video" onclick="watchHistoryAd()">
            <i class="fas fa-play-circle"></i> WATCH AD FOR EXTRA GP
        </button>
    </div>

    <div class="history-title">RECENT ACTIVITIES</div>
    <div id="history-list" class="history-list">
        <p style="text-align: center; color: #64748b; font-size: 13px;">Loading history...</p>
    </div>

<script>
    // ভিডিও অ্যাড কন্ট্রোলার সরাসরি ইনজেক্ট করা হয়েছে
    const AdController = {
        videoBlockId: "29212", // Reward Video ID[cite: 5]
        showVideoAd: function(onReward, onError) {
            if (window.Adsgram) {
                const ad = window.Adsgram.init({ blockId: this.videoBlockId });
                ad.show()
                  .then((result) => { if (onReward) onReward(result); })
                  .catch((err) => { if (onError) onError(err); });
            } else {
                console.log("Adsgram SDK not loaded yet.");
            }
        }
    };

    function watchHistoryAd() {
        AdController.showVideoAd(
            (res) => alert("Success! Extra GP Added."),
            (err) => console.log("Ad skipped", err)
        );
    }

    const tg = window.Telegram.WebApp;
    const userId = tg.initDataUnsafe?.user?.id || "test_user";

    function initHistory() {
        db.ref('users/' + userId).on('value', snap => {
            const data = snap.val() || {};
            document.getElementById('stat-tasks').innerText = data.tasks_done || 0;
            document.getElementById('stat-gp').innerText = (data.gp || 0).toLocaleString();
            loadActivityHistory(data);
        });
    }

    function loadActivityHistory(userData) {
        const list = document.getElementById('history-list');
        let html = "";

        db.ref('withdraw_requests').orderByChild('userId').equalTo(userId.toString()).once('value', snap => {
            if (snap.exists()) {
                snap.forEach(child => {
                    const r = child.val();
                    html += `
                    <div class="item">
                        <div>
                            <div style="font-weight: bold;">Withdraw (${r.method})</div>
                            <div style="font-size: 11px; color: #94a3b8;">${r.date}</div>
                        </div>
                        <div style="font-size: 13px; color: ${r.status === 'pending' ? '#f59e0b' : '#ef4444'}; font-weight: bold;">
                            -${r.amount} GP
                        </div>
                    </div>`;
                });
            }
            
            if (html === "") {
                list.innerHTML = `<p style="text-align: center; color: #64748b; padding-top: 20px;">No recent transactions found.</p>`;
            } else {
                list.innerHTML = html;
            }
        });
    }

    window.onload = () => {
        initHistory();
    };
</script>
</body>
</html>
