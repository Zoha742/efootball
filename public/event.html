<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - eFootball HUB</title>
    <!-- ১. Adsgram SDK লোড করা -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --primary: #fbbf24; --text: #ffffff; --card: #121e36; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; overflow-x: hidden; padding-bottom: 110px; }
        
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; color: var(--primary); text-decoration: none; cursor: pointer; }

        .event-slider {
            width: 100%; height: 200px; overflow: hidden; border-radius: 12px;
            border: 2px solid var(--primary); position: relative; background: var(--card); touch-action: pan-y;
        }

        .slider-track { display: flex; transition: transform 0.4s ease-in-out; height: 100%; }
        .slider-track img { width: 100%; flex-shrink: 0; object-fit: cover; height: 100%; }

        .dots { display: flex; justify-content: center; margin-top: 10px; gap: 6px; }
        .dot { width: 8px; height: 8px; background: #334155; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--primary); width: 20px; border-radius: 10px; }

        .list-title { color: var(--primary); margin: 25px 0 15px; font-size: 16px; font-weight: bold; border-left: 4px solid var(--primary); padding-left: 10px; }
        
        /* ব্যানার অ্যাড কন্টেইনার স্টাইল */
        .banner-fixed {
            position: fixed; bottom: 0; left: 0; width: 100%; 
            display: flex; justify-content: center; align-items: center; 
            background: var(--bg); z-index: 1000; border-top: 1px solid #1e2d4d;
            padding: 10px 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="font-size: 18px; color: var(--primary);">ACTIVE EVENTS</h2>
    </div>

    <div class="event-slider" id="slider">
        <div id="slider-track" class="slider-track"></div>
    </div>
    <div id="dots" class="dots"></div>

    <div class="list-title">MORE EVENTS</div>
    <div id="vertical-container" style="display: flex; flex-direction: column; gap: 15px;"></div>

    <!-- ২. ব্যানার অ্যাড (সরাসরি ট্যাগ ব্যবহার করা হয়েছে) -->
    <div class="banner-fixed">
        <adsgram-task 
            data-block-id="task-29213" 
            data-debug="false" 
            class="task">
        </adsgram-task>
    </div>

<script>
    let currentIndex = 0;
    let images = [];
    let slideInterval;

    async function fetchEvents() {
        const track = document.getElementById('slider-track');
        const vContainer = document.getElementById('vertical-container');
        const dotsContainer = document.getElementById('dots');

        try {
            // নিশ্চিত করুন আপনার event.json ফাইলটি ঠিক আছে[cite: 8]
            const res = await fetch('event.json');
            if (!res.ok) throw new Error("event.json ফাইলটি পাওয়া যায়নি!");
            
            const data = await res.json();
            images = data.events || data.event || [];

            if (images.length === 0) {
                track.innerHTML = "<p style='text-align:center; padding-top:80px;'>No Events Found!</p>";
                return;
            }

            track.innerHTML = ""; 
            vContainer.innerHTML = "";
            dotsContainer.innerHTML = "";

            images.forEach((ev, index) => {
                // স্লাইডারের জন্য
                const sImg = document.createElement('img');
                sImg.src = ev.img;
                track.appendChild(sImg);

                // লিস্টের জন্য
                const vCard = document.createElement('div');
                vCard.style.borderRadius = "12px";
                vCard.style.overflow = "hidden";
                vCard.style.border = "1px solid #1e2d4d";
                vCard.innerHTML = `<img src="${ev.img}" style="width:100%; display:block;">`;
                vContainer.appendChild(vCard);

                // ডটসের জন্য
                const dot = document.createElement('div');
                dot.className = index === 0 ? 'dot active' : 'dot';
                dotsContainer.appendChild(dot);
            });

            startAutoSlide();
        } catch (e) {
            console.error("Fetch Error:", e.message);
            track.innerHTML = `<p style="color:red; text-align:center; padding-top:80px;">${e.message}</p>`;
        }
    }

    function startAutoSlide() {
        clearInterval(slideInterval);
        slideInterval = setInterval(() => {
            if(images.length > 0) {
                currentIndex = (currentIndex + 1) % images.length;
                updateSlider();
            }
        }, 3000);
    }

    function updateSlider() {
        const track = document.getElementById('slider-track');
        const dots = document.querySelectorAll('.dot');
        if(!track) return;
        track.style.transform = `translateX(-${currentIndex * 100}%)`;
        dots.forEach((d, i) => d.classList.toggle('active', i === currentIndex));
    }

    window.onload = function() {
        fetchEvents();
    };
</script>
</body>
</html>
