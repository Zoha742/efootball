<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --primary: #fbbf24; --text: #ffffff; --card: #121e36; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; color: var(--primary); text-decoration: none; }

        /* Slider Section */
        .event-slider {
            width: 100%;
            height: 200px;
            overflow: hidden;
            border-radius: 12px;
            border: 2px solid var(--primary);
            position: relative;
            background: var(--card);
            touch-action: pan-y;
        }

        .slider-track { display: flex; transition: transform 0.4s ease-in-out; height: 100%; }
        .slider-track img { width: 100%; flex-shrink: 0; object-fit: cover; height: 100%; }

        .dots { display: flex; justify-content: center; margin-top: 10px; gap: 6px; }
        .dot { width: 8px; height: 8px; background: #334155; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--primary); width: 20px; border-radius: 10px; }

        /* Vertical List */
        .list-title { color: var(--primary); margin: 25px 0 15px; font-size: 16px; font-weight: bold; border-left: 4px solid var(--primary); padding-left: 10px; }
        .vertical-list { display: flex; flex-direction: column; gap: 15px; padding-bottom: 20px; }
        .v-card { width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid #1e2d4d; background: var(--card); }
        .v-card img { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="font-size: 18px; color: var(--primary);">ACTIVE EVENTS</h2>
    </div>

    <div class="event-slider" id="slider">
        <div id="slider-track" class="slider-track"></div>
    </div>
    <div id="dots" class="dots"></div>

    <div class="list-title">MORE EVENTS</div>
    <div id="vertical-container" class="vertical-list"></div>

    <div id="banner-container" style="display: flex; justify-content: center; margin-top: 20px; padding-bottom: 50px;"></div>

<script>
    console.log("Database connected successfully!");
    
    let currentIndex = 0;
    let images = [];
    let slideInterval;
    let startX = 0;

    async function fetchEvents() {
        const track = document.getElementById('slider-track');
        const vContainer = document.getElementById('vertical-container');
        const dotsContainer = document.getElementById('dots');

        try {
            const res = await fetch('event.json');
            if (!res.ok) throw new Error("JSON file not found!");
            const data = await res.json();
            images = data.events || data.event;

            if (!images || images.length === 0) {
                track.innerHTML = "<p style='text-align:center; padding:20px;'>No Events Found!</p>";
                return;
            }

            images.forEach((ev, index) => {
                const sImg = document.createElement('img');
                sImg.src = ev.img;
                track.appendChild(sImg);

                const vCard = document.createElement('div');
                vCard.className = 'v-card';
                vCard.innerHTML = `<img src="${ev.img}">`;
                vContainer.appendChild(vCard);

                const dot = document.createElement('div');
                dot.className = index === 0 ? 'dot active' : 'dot';
                dotsContainer.appendChild(dot);
            });

            startAutoSlide();
            setupTouch();

        } catch (e) {
            track.innerHTML = `<p style='text-align:center; padding:20px; color:red;'>${e.message}</p>`;
        }
    }

    function startAutoSlide() {
        slideInterval = setInterval(() => {
            if(images.length > 0) {
                currentIndex = (currentIndex + 1) % images.length;
                updateSlider();
            }
        }, 3000);
    }

    function updateSlider() {
        const track = document.getElementById('slider-track');
        const dots = document.querySelectorAll('.dot');
        track.style.transform = `translateX(-${currentIndex * 100}%)`;
        dots.forEach(d => d.classList.remove('active'));
        if(dots[currentIndex]) dots[currentIndex].classList.add('active');
    }

    function setupTouch() {
        const slider = document.getElementById('slider');
        slider.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            clearInterval(slideInterval);
        });
        slider.addEventListener('touchend', e => {
            let endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) currentIndex = (currentIndex + 1) % images.length;
            else if (endX - startX > 50) currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateSlider();
            startAutoSlide();
        });
    }

    // উইন্ডো লোড হওয়ার সময় স্লাইডার এবং অ্যাডস কল হবে
    window.onload = () => {
        fetchEvents(); 

        setTimeout(() => {
            try {
                if (window.Adsgram) {
                    // ব্যানার অ্যাড (আপনার আইডি এখানে বসান)
                    const bannerAd = window.Adsgram.init({ blockId: "YOUR_BANNER_BLOCK_ID" });
                    bannerAd.show().catch((err) => console.log("Banner Error"));

                    // ভিডিও অ্যাড (আপনার আইডি এখানে বসান)
                    const videoAd = window.Adsgram.init({ blockId: "YOUR_VIDEO_BLOCK_ID" });
                    videoAd.show().catch((err) => console.log("Video Error"));
                }
            } catch (e) {
                console.log("Adsgram missing");
            }
        }, 1000);
    };
</script>
</body>
</html>
