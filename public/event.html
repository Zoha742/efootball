<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - eFootball HUB</title>
    <!-- ১. Adsgram SDK লোড করা (আপনার স্ক্রিনশট অনুযায়ী) -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --primary: #fbbf24; --text: #ffffff; --card: #121e36; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 120px; }
        .header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px; }
        .back-btn { position: absolute; left: 0; font-size: 22px; color: var(--primary); text-decoration: none; }
        .event-slider { width: 100%; height: 200px; overflow: hidden; border-radius: 12px; border: 2px solid var(--primary); position: relative; background: var(--card); }
        .slider-track { display: flex; transition: transform 0.4s ease-in-out; height: 100%; }
        .slider-track img { width: 100%; flex-shrink: 0; object-fit: cover; height: 100%; }
        .dots { display: flex; justify-content: center; margin-top: 10px; gap: 6px; }
        .dot { width: 8px; height: 8px; background: #334155; border-radius: 50%; }
        .dot.active { background: var(--primary); width: 20px; border-radius: 10px; }
        
        /* ব্যানার ফিক্সড পজিশন */
        .banner-wrapper {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="font-size: 18px;">ACTIVE EVENTS</h2>
    </div>

    <div class="event-slider" id="slider">
        <div id="slider-track" class="slider-track"></div>
    </div>
    <div id="dots" class="dots"></div>

    <!-- ২. ব্যানার কম্পোনেন্ট (আপনার স্ক্রিনশট অনুযায়ী ফিক্সড) -->
    <div class="banner-wrapper">
        <adsgram-task 
            data-block-id="task-29213" 
            data-debug="false" 
            class="task">
        </adsgram-task>
    </div>

    <div class="list-title" style="color:var(--primary); margin: 20px 0;">MORE EVENTS</div>
    <div id="vertical-container"></div>

<script>
    let currentIndex = 0;
    let images = [];

    async function fetchEvents() {
        const track = document.getElementById('slider-track');
        const vContainer = document.getElementById('vertical-container');
        const dotsContainer = document.getElementById('dots');

        try {
            const res = await fetch('event.json');
            const data = await res.json();
            images = data.events || data.event || []; 

            images.forEach((ev, index) => {
                const sImg = document.createElement('img');
                sImg.src = ev.img;
                track.appendChild(sImg);

                const vCard = document.createElement('div');
                vCard.style.marginBottom = "15px";
                vCard.innerHTML = `<img src="${ev.img}" style="width:100%; border-radius:12px; border:1px solid #1e2d4d;">`;
                vContainer.appendChild(vCard);

                const dot = document.createElement('div');
                dot.className = index === 0 ? 'dot active' : 'dot';
                dotsContainer.appendChild(dot);
            });

            setInterval(() => {
                if(images.length > 0) {
                    currentIndex = (currentIndex + 1) % images.length;
                    track.style.transform = `translateX(-${currentIndex * 100}%)`;
                    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === currentIndex));
                }
            }, 3000);
        } catch (e) { console.log(e); }
    }

    window.onload = fetchEvents;
</script>
</body>
</html>
