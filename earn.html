<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn More - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* আপনার সব ডিজাইন হুবহু রাখা হয়েছে */
        :root { --bg: #050a18; --card: #121e36; --primary: #818cf8; --text: #ffffff; --border: #1e2d4d; --yellow: #fbbf24; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }
        .top-bar { display: flex; align-items: center; padding: 15px; background: rgba(18, 30, 54, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .top-bar a { color: white; text-decoration: none; margin-right: 15px; }
        .container { padding: 20px; text-align: center; }
        .earn-card { background: var(--card); border-radius: 20px; padding: 30px; border: 1px solid var(--border); margin-bottom: 25px; }
        .gp-icon { font-size: 50px; color: var(--yellow); margin-bottom: 15px; }
        .btn-blue { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn-lock { background: #1e293b; color: #64748b; cursor: not-allowed; }
        .timer-badge { background: rgba(129, 140, 248, 0.1); color: var(--primary); padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-top: 15px; display: inline-block; }
    </style>
</head>
<body>
    <div class="top-bar"><a href="index.html"><i class="fas fa-chevron-left"></i></a><span>Earn GP</span></div>
    
    <div class="container">
        <div class="earn-card">
            <div class="gp-icon"><i class="fas fa-coins"></i></div>
            <h2 id="user-gp">Loading...</h2>
            <p style="color: #94a3b8; font-size: 13px; margin: 10px 0 20px;">অ্যাড দেখুন এবং আপনার eFootball অ্যাকাউন্টের জন্য আনলিমিটেড GP আয় করুন।</p>
            
            <button id="earn-btn" class="btn-blue" onclick="showAd()">
                <i class="fas fa-play-circle"></i> WATCH VIDEO AD
            </button>
            <div id="timer-display" class="timer-badge" style="display: none;">Next Ad in: <span id="countdown">00:00</span></div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAy2nEcb--kbjU7tSIm6lJG5ZpEFSus7sg",
            authDomain: "efootball-57d9b.firebaseapp.com",
            projectId: "efootball-57d9b",
            storageBucket: "efootball-57d9b.firebasestorage.app",
            messagingSenderId: "1031993322489",
            appId: "1:1031993322489:web:0336c8e1869318a8222b28"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tg = window.Telegram.WebApp;
        const userId = String(tg.initDataUnsafe?.user?.id || "774900");
        
        let userGP = 0;
        let adReward = 500; // ডিফল্ট রিওয়ার্ড

        // ১. রিয়েল-টাইম ব্যালেন্স এবং অ্যাডমিন কনফিগ লোড
        db.ref('users/' + userId).on('value', snap => {
            userGP = snap.val()?.gp || 0;
            document.getElementById('user-gp').innerText = userGP.toLocaleString() + " GP";
        });

        db.ref('config/ad_reward').on('value', snap => {
            if(snap.exists()) adReward = snap.val();
        });

        // ২. Adsgram Setup (আপনার অরিজিনাল ব্লক আইডি ব্যবহার করবেন)
        const AdController = window.Adsgram?.init({ blockId: "4774" });

        function showAd() {
            const btn = document.getElementById('earn-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading Ad...';

            AdController.show().then((result) => {
                // অ্যাড দেখা সফল হলে সরাসরি ফায়ারবেসে পয়েন্ট যোগ হবে
                db.ref('users/' + userId + '/gp').transaction(current => (current || 0) + adReward);
                alert(`সাফল্যের সাথে অ্যাড দেখেছেন! ${adReward} GP যোগ করা হয়েছে।`);
                startTimer();
            }).catch((err) => {
                alert("অ্যাড লোড হয়নি, আবার চেষ্টা করুন।");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play-circle"></i> WATCH VIDEO AD';
            });
        }

        // ৩. টাইমার ফাংশন (ডিজাইন ঠিক রাখার জন্য)
        function startTimer() {
            const btn = document.getElementById('earn-btn');
            const timerDisplay = document.getElementById('timer-display');
            btn.classList.add('btn-lock');
            btn.disabled = true;
            timerDisplay.style.display = 'inline-block';

            let timeLeft = 30; // ৩০ সেকেন্ড ওয়েট করতে হবে
            const interval = setInterval(() => {
                timeLeft--;
                document.getElementById('countdown').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
                if(timeLeft <= 0) {
                    clearInterval(interval);
                    btn.classList.remove('btn-lock');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-play-circle"></i> WATCH VIDEO AD';
                    timerDisplay.style.display = 'none';
                }
            }, 1000);
        }
    </script>
</body>
</html>
