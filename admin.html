<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - eFootball HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --red: #ff4b2b; --green: #22c55e; --blue: #3b82f6; --yellow: #fbbf24; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        
        .top-bar { display: flex; align-items: center; padding: 15px 20px; background: rgba(18, 30, 54, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--red); position: sticky; top: 0; z-index: 1000; justify-content: space-between; }
        .top-bar a { color: white; text-decoration: none; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .admin-tag { background: var(--red); color: white; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; text-transform: uppercase; }

        .container { padding: 20px; }
        .manage-box { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .manage-box h3 { font-size: 16px; margin-top: 0; margin-bottom: 15px; color: var(--yellow); display: flex; align-items: center; gap: 10px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-card b { display: block; font-size: 18px; margin-top: 5px; color: var(--yellow); }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; }
        input { width: 100%; background: #050a18; border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: white; outline: none; box-sizing: border-box; font-size: 14px; }
        
        .btn { border: none; padding: 12px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; font-size: 13px; }
        .btn-blue { background: var(--blue); } .btn-green { background: var(--green); } .btn-red { background: var(--red); } .btn-yellow { background: var(--yellow); color: #000; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html"><i class="fas fa-chevron-left"></i> <span>Back to Hub</span></a>
        <span class="admin-tag">Master Dashboard</span>
    </div>

    <div class="container">
        
        <div class="manage-box" style="border-color: var(--blue);">
            <h3 style="color: var(--blue);"><i class="fas fa-search"></i> User Profile Search</h3>
            <div class="input-group">
                <input type="text" id="search-uid" placeholder="Enter User ID (e.g. 774900)">
                <button class="btn btn-blue" onclick="searchUser()">LOAD PROFILE</button>
            </div>
            
            <div id="user-panel" style="display:none; margin-top:15px; border-top:1px solid var(--border); padding-top:15px;">
                <p id="display-info" style="color: var(--green); font-size: 12px; font-weight: bold; margin-bottom: 15px;"></p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="input-group"><label>Balance (GP)</label><input type="number" id="edit-gp"></div>
                    <div class="input-group"><label>Ads Watched</label><input type="number" id="edit-ads"></div>
                </div>
                <div class="input-group"><label>TON Wallet</label><input type="text" id="edit-ton"></div>
                <div class="input-group"><label>BNB Wallet</label><input type="text" id="edit-bnb"></div>
                <button class="btn btn-green" onclick="saveUserChanges()">UPDATE DATA</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-coins" style="color: var(--yellow);"></i><span>System GP</span><b id="live-gp">0</b></div>
            <div class="stat-card"><i class="fas fa-ad" style="color: var(--green);"></i><span>Total Ads</span><b id="live-ads">0</b></div>
        </div>

        <div class="manage-box">
            <h3><i class="fas fa-tools"></i> Global Config</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="input-group"><label>Min Withdraw</label><input type="number" id="conf-min"></div>
                <div class="input-group"><label>GP Rate ($1)</label><input type="number" id="conf-rate"></div>
            </div>
            <button class="btn btn-yellow" onclick="saveConfig()">SAVE CONFIG</button>
        </div>

        <div class="manage-box" style="border-color: var(--red);">
            <h3 style="color: var(--red);"><i class="fas fa-hand-holding-usd"></i> Withdrawal Manager</h3>
            <div id="admin-withdraw-list"></div>
        </div>

    </div>

    <script>
        function refreshStats() {
            document.getElementById('live-gp').innerText = (localStorage.getItem('user_gp') || 0);
            document.getElementById('live-ads').innerText = (localStorage.getItem('total_ads_watched') || 0);
        }

        function saveConfig() {
            const config = { min_limit: parseInt(document.getElementById('conf-min').value) || 10000, rate: parseInt(document.getElementById('conf-rate').value) || 10000 };
            localStorage.setItem('admin_config', JSON.stringify(config));
            alert("Settings Saved!");
        }

        function searchUser() {
            const uid = document.getElementById('search-uid').value;
            if(!uid) return;
            document.getElementById('user-panel').style.display = 'block';
            document.getElementById('edit-gp').value = localStorage.getItem('user_gp') || 0;
            const ads = localStorage.getItem('total_ads_watched') || 0;
            document.getElementById('edit-ads').value = ads;
            document.getElementById('display-info').innerText = "Showing Data for ID: #" + uid;
            document.getElementById('edit-ton').value = localStorage.getItem('wallet_ton') || "";
            document.getElementById('edit-bnb').value = localStorage.getItem('wallet_bnb') || "";
        }

        function saveUserChanges() {
            localStorage.setItem('user_gp', document.getElementById('edit-gp').value);
            localStorage.setItem('total_ads_watched', document.getElementById('edit-ads').value);
            localStorage.setItem('wallet_ton', document.getElementById('edit-ton').value);
            localStorage.setItem('wallet_bnb', document.getElementById('edit-bnb').value);
            alert("Updated!"); refreshStats();
        }

        function loadWithdrawals() {
            const list = document.getElementById('admin-withdraw-list');
            const reqs = JSON.parse(localStorage.getItem('all_withdraw_requests')) || [];
            if(reqs.length === 0) { list.innerHTML = "<p style='font-size:12px; color:#94a3b8;'>No requests.</p>"; return; }
            list.innerHTML = reqs.reverse().map(r => `
                <div style="background:#050a18; padding:15px; border-radius:12px; border:1px solid var(--border); margin-bottom:10px;">
                    <div style="font-size:11px; color:var(--yellow);">ID: #${r.userId}</div>
                    <h3 style="margin:5px 0;">${r.amount} GP</h3>
                    <div style="font-size:11px; color:#94a3b8;">TON: ${r.tonWallet}<br>BNB: ${r.bnbWallet}</div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button onclick="handleReq(${r.id}, 'success')" style="flex:1; background:var(--green); border:none; padding:8px; border-radius:8px; color:white;">ACCEPT</button>
                        <button onclick="handleReq(${r.id}, 'rejected')" style="flex:1; background:var(--red); border:none; padding:8px; border-radius:8px; color:white;">REJECT</button>
                    </div>
                </div>
            `).join('');
        }

        function handleReq(id, status) {
            let reqs = JSON.parse(localStorage.getItem('all_withdraw_requests')) || [];
            const idx = reqs.findIndex(r => r.id === id);
            if(idx !== -1) {
                if(status === 'rejected') {
                    let gp = parseInt(localStorage.getItem('user_gp')) || 0;
                    localStorage.setItem('user_gp', gp + reqs[idx].amount);
                }
                reqs[idx].status = status;
                localStorage.setItem('all_withdraw_requests', JSON.stringify(reqs));
                loadWithdrawals(); refreshStats();
            }
        }

        window.onload = () => {
            const c = JSON.parse(localStorage.getItem('admin_config'));
            if(c) { document.getElementById('conf-min').value = c.min_limit; document.getElementById('conf-rate').value = c.rate; }
            refreshStats(); loadWithdrawals();
        };
    </script>
</body>
</html>
