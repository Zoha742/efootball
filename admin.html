<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - eFootball HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --red: #ff4b2b; --green: #22c55e; --blue: #3b82f6; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--border); width: 100%; max-width: 350px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: #0a1226; color: white; outline: none; box-sizing: border-box;}
        .login-btn { background: var(--blue); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #admin-content { display: none; padding: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: #0a1226; color: white; box-sizing: border-box;}
        .action-btn { background: var(--green); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        .list-item { background: #0a1226; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <i class="fas fa-user-shield" style="font-size: 40px; color: var(--blue); margin-bottom: 15px;"></i>
            <h2>Admin Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="login-btn" onclick="checkLogin()">LOGIN</button>
        </div>
    </div>

    <div id="admin-content">
        <h2 style="text-align: center; color: var(--blue);">Zoha's Command Center</h2>
        <div class="card">
            <h3><i class="fas fa-cogs"></i> Withdraw Config</h3>
            <div class="input-group">
                <label>Minimum Withdraw (GP):</label>
                <input type="number" id="min-limit">
            </div>
            <div class="input-group">
                <label>Exchange Rate (GP = $1):</label>
                <input type="number" id="rate">
            </div>
            <button class="action-btn" onclick="saveSettings()">Save Configuration</button>
        </div>
        <div class="card">
            <h3><i class="fas fa-wallet"></i> Pending Requests</h3>
            <div id="requests-list">Loading...</div>
        </div>
        <div class="card">
            <h3><i class="fas fa-envelope"></i> Support Messages</h3>
            <div id="messages-list">No new messages.</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAy2nEcb--kbjU7tSIm6lJG5ZpEFSus7sg",
          authDomain: "efootball-57d9b.firebaseapp.com",
          databaseURL: "https://efootball-57d9b-default-rtdb.firebaseio.com",
          projectId: "efootball-57d9b",
          storageBucket: "efootball-57d9b.firebasestorage.app",
          messagingSenderId: "1031993322489",
          appId: "1:1031993322489:web:0336c8e1869318a8222b28",
          measurementId: "G-1SLL8RNP5M"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        function checkLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === "Zoha" && p === "s#642S") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                initDashboard();
            } else { alert("Access Denied!"); }
        }

        function initDashboard() { loadConfig(); loadWithdraws(); loadMessages(); }

        function loadConfig() {
            db.ref('config').on('value', snap => {
                if(snap.exists()) {
                    document.getElementById('min-limit').value = snap.val().min_limit;
                    document.getElementById('rate').value = snap.val().rate;
                }
            });
        }

        function saveSettings() {
            db.ref('config').update({
                min_limit: parseInt(document.getElementById('min-limit').value),
                rate: parseInt(document.getElementById('rate').value)
            }).then(() => alert("Settings Updated!"));
        }

        function loadWithdraws() {
            db.ref('withdraw_requests').on('value', snap => {
                let html = "";
                snap.forEach(child => {
                    let r = child.val();
                    if(r.status === 'pending') {
                        html += `<div class="list-item">
                            <b>User ID: ${r.userId}</b><br>Amount: ${r.amount} GP<br>Method: ${r.method}<br>
                            <button onclick="updateReq('${child.key}', 'success')" style="color:green">Accept</button>
                            <button onclick="updateReq('${child.key}', 'rejected')" style="color:red">Reject</button>
                        </div>`;
                    }
                });
                document.getElementById('requests-list').innerHTML = html || "No Pending Requests";
            });
        }

        function updateReq(key, status) {
            db.ref('withdraw_requests/' + key).update({ status: status }).then(() => alert("Request " + status));
        }

        function loadMessages() {
            db.ref('support').on('value', snap => {
                let html = "";
                snap.forEach(child => {
                    let m = child.val();
                    html += `<div class="list-item"><b>From: ${m.userId}</b><br>${m.text}</div>`;
                });
                document.getElementById('messages-list').innerHTML = html || "No Messages";
            });
        }
    </script>
</body>
</html>
