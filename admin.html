<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - eFootball HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --red: #ff4b2b; --green: #22c55e; --blue: #3b82f6; --yellow: #fbbf24; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .top-bar { display: flex; align-items: center; padding: 15px 20px; background: rgba(18, 30, 54, 0.8); border-bottom: 1px solid var(--red); position: sticky; top: 0; z-index: 1000; justify-content: space-between; }
        .container { padding: 20px; }
        .manage-box { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea { width: 100%; background: #050a18; border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: white; outline: none; box-sizing: border-box; }
        .btn { border: none; padding: 12px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <span>Admin Hub</span>
        <span style="background:var(--red); padding:4px 8px; border-radius:5px; font-size:10px;">MASTER</span>
    </div>

    <div class="container">
        <div class="manage-box" style="border-color: var(--blue);">
            <h3 style="color:var(--blue);"><i class="fas fa-search"></i> User Search & Control</h3>
            <div class="input-group">
                <input type="text" id="search-uid" placeholder="Enter User ID (e.g. 774900)">
                <button class="btn" style="background:var(--blue);" onclick="searchUser()">SEARCH USER</button>
            </div>
            <div id="user-panel" style="display:none; margin-top:15px; border-top:1px solid #1e2d4d; padding-top:15px;">
                <h4 id="panel-title" style="color:var(--yellow);">User ID: #000</h4>
                <div class="input-group"><label>GP Balance</label><input type="number" id="edit-gp"></div>
                <div class="input-group"><label>TON Wallet</label><input type="text" id="edit-ton"></div>
                <div class="input-group"><label>BNB Wallet</label><input type="text" id="edit-bnb"></div>
                <button class="btn" style="background:var(--green);" onclick="saveUserChanges()">UPDATE USER DATA</button>
            </div>
        </div>

        <div class="manage-box" style="border-color: var(--red);">
            <h3 style="color:var(--red);"><i class="fas fa-hand-holding-usd"></i> Withdrawal Requests</h3>
            <div id="withdraw-list"></div>
        </div>

        <div class="manage-box" style="border-color: var(--yellow);">
            <h3 style="color:var(--yellow);"><i class="fas fa-cogs"></i> App Config</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div class="input-group"><label>Min Withdraw</label><input type="number" id="conf-min"></div>
                <div class="input-group"><label>GP Rate ($1)</label><input type="number" id="conf-rate"></div>
            </div>
            <button class="btn" style="background:var(--yellow); color:black;" onclick="saveConfig()">SAVE CONFIG</button>
        </div>

        <div class="manage-box" style="border-color: var(--green);">
            <h3 style="color:var(--green);"><i class="fas fa-comments"></i> Support Inbox</h3>
            <div id="admin-inbox-list"></div>
        </div>
    </div>

    <script>
        // Search & Edit Logic
        function searchUser() {
            const uid = document.getElementById('search-uid').value;
            if(!uid) return;
            document.getElementById('user-panel').style.display = 'block';
            document.getElementById('panel-title').innerText = "User ID: #" + uid;
            document.getElementById('edit-gp').value = localStorage.getItem('user_gp') || 0;
            document.getElementById('edit-ton').value = localStorage.getItem('wallet_ton') || "";
            document.getElementById('edit-bnb').value = localStorage.getItem('wallet_bnb') || "";
        }

        function saveUserChanges() {
            localStorage.setItem('user_gp', document.getElementById('edit-gp').value);
            localStorage.setItem('wallet_ton', document.getElementById('edit-ton').value);
            localStorage.setItem('wallet_bnb', document.getElementById('edit-bnb').value);
            alert("User data updated!");
        }

        // Withdraw Logic
        function loadWithdraws() {
            const list = document.getElementById('withdraw-list');
            const requests = JSON.parse(localStorage.getItem('all_withdraw_requests')) || [];
            if(requests.length === 0) { list.innerHTML = "<p style='font-size:12px; color:#94a3b8;'>No requests.</p>"; return; }
            list.innerHTML = requests.reverse().map(r => `
                <div style="background:#050a18; padding:15px; border-radius:10px; border:1px solid #1e2d4d; margin-bottom:10px;">
                    <div style="font-size:12px; color:var(--yellow);">ID: #${r.userId} | ${r.date}</div>
                    <h3 style="margin:5px 0;">${r.amount} GP</h3>
                    <div style="font-size:11px; color:#94a3b8;">TON: ${r.tonWallet}<br>BNB: ${r.bnbWallet}</div>
                    ${r.status === 'pending' ? `
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button onclick="handleReq(${r.id}, 'success')" style="flex:1; background:var(--green); border:none; padding:8px; border-radius:5px; color:white;">ACCEPT</button>
                            <button onclick="handleReq(${r.id}, 'rejected')" style="flex:1; background:var(--red); border:none; padding:8px; border-radius:5px; color:white;">REJECT</button>
                        </div>
                    ` : `<div style="text-align:center; font-weight:bold; color:white; margin-top:10px;">${r.status.toUpperCase()}</div>`}
                </div>
            `).join('');
        }

        function handleReq(id, status) {
            let requests = JSON.parse(localStorage.getItem('all_withdraw_requests')) || [];
            const index = requests.findIndex(r => r.id === id);
            if(index !== -1) {
                if(status === 'rejected') {
                    let gp = parseInt(localStorage.getItem('user_gp')) || 0;
                    localStorage.setItem('user_gp', gp + requests[index].amount);
                }
                requests[index].status = status;
                localStorage.setItem('all_withdraw_requests', JSON.stringify(requests));
                loadWithdraws();
            }
        }

        // Config Logic
        function saveConfig() {
            const config = { min_limit: document.getElementById('conf-min').value, rate: document.getElementById('conf-rate').value };
            localStorage.setItem('admin_config', JSON.stringify(config));
            alert("Config updated!");
        }

        window.onload = () => {
            const c = JSON.parse(localStorage.getItem('admin_config'));
            if(c) { document.getElementById('conf-min').value = c.min_limit; document.getElementById('conf-rate').value = c.rate; }
            loadWithdraws();
        };
    </script>
</body>
</html>
