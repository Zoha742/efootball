<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - eFootball HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card-dark: #121e36; --red: #ff4b2b; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; padding-bottom: 90px; }
        
        .admin-header { font-size: 22px; font-weight: bold; color: var(--red); border-left: 4px solid var(--red); padding-left: 10px; margin-bottom: 25px; text-transform: uppercase; }
        
        .admin-card { background: var(--card-dark); border-radius: 20px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(255, 75, 43, 0.1); margin-bottom: 20px; }
        .admin-card h3 { font-size: 16px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .admin-card h3 i { color: var(--red); }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
        .input-group input { width: 100%; background: #050a18; border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: white; outline: none; }
        
        .btn-update { width: 100%; background: linear-gradient(135deg, #ff4b2b, #ff416c); border: none; color: white; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-update:active { transform: scale(0.95); }

        .btn-reset { width: 100%; background: transparent; border: 1px solid var(--red); color: var(--red); padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-reset:hover { background: rgba(255, 75, 43, 0.1); }

        /* Bottom Nav (Same as index) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: rgba(5, 10, 24, 0.85); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000; }
        .nav-item { text-align: center; color: #64748b; text-decoration: none; font-size: 11px; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="admin-header">Admin Control Panel</div>

    <div class="admin-card">
        <h3><i class="fas fa-user-edit"></i> Manage User Data</h3>
        
        <div class="input-group">
            <label>Set GP Points (Current: <span id="cur-gp">0</span>)</label>
            <input type="number" id="gp-input" placeholder="Enter GP Amount">
        </div>

        <div class="input-group">
            <label>Set Tasks Done (Current: <span id="cur-task">0</span>)</label>
            <input type="number" id="task-input" placeholder="Enter Task Count">
        </div>

        <button class="btn-update" onclick="updateUserData()">Update Profile</button>
    </div>

    <div class="admin-card" style="border-color: rgba(255, 75, 43, 0.3);">
        <h3><i class="fas fa-tools"></i> System Tools</h3>
        <p style="font-size: 12px; color: #94a3b8; margin-bottom: 10px;">Warning: This will clear all progress for the user.</p>
        <button class="btn-reset" onclick="resetSystem()">Full Reset Data</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="legend.html" class="nav-item"><i class="fas fa-crown"></i>Legend</a>
        <a href="task.html" class="nav-item"><i class="fas fa-clipboard-check"></i>Task</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i>Profile</a>
    </nav>

    <script>
        // Load existing values from localStorage
        function loadAdminData() {
            const gp = localStorage.getItem('user_gp') || 0;
            const tasks = localStorage.getItem('tasks_done') || 0;
            document.getElementById('cur-gp').innerText = gp;
            document.getElementById('cur-task').innerText = tasks;
        }

        // Update data in localStorage
        function updateUserData() {
            const newGp = document.getElementById('gp-input').value;
            const newTask = document.getElementById('task-input').value;

            if(newGp !== "") localStorage.setItem('user_gp', newGp);
            if(newTask !== "") localStorage.setItem('tasks_done', newTask);

            alert("Data Updated! Profile-e check korun.");
            loadAdminData(); // Refresh current display
        }

        // Clear all data
        function resetSystem() {
            if(confirm("Apni ki nishchit? Sob data delete hoye jabe!")) {
                localStorage.removeItem('user_gp');
                localStorage.removeItem('tasks_done');
                alert("Sob data reset kora hoyeche.");
                loadAdminData();
            }
        }

        window.onload = loadAdminData;
    </script>
</body>
</html>
