<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - eFootball HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --card: #121e36; --red: #ff4b2b; --green: #22c55e; --blue: #3b82f6; --yellow: #fbbf24; --text: #ffffff; --border: #1e2d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .top-bar { display: flex; align-items: center; padding: 15px 20px; background: rgba(18, 30, 54, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--red); position: sticky; top: 0; z-index: 1000; justify-content: space-between; }
        .top-bar a { color: white; text-decoration: none; font-size: 18px; }
        .container { padding: 20px; }
        .manage-box { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .manage-box h3 { font-size: 16px; margin-top: 0; margin-bottom: 15px; color: var(--yellow); display: flex; align-items: center; gap: 10px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; }
        input, textarea { width: 100%; background: #050a18; border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: white; outline: none; box-sizing: border-box; font-family: inherit; }
        .btn { border: none; padding: 12px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-blue { background: var(--blue); } .btn-green { background: var(--green); } .btn-red { background: var(--red); } .btn-yellow { background: var(--yellow); color: #000; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid var(--border); text-align: center; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html"><i class="fas fa-chevron-left"></i> <span>Back to Hub</span></a>
        <span style="background:var(--red); padding:4px 8px; border-radius:5px; font-size:10px; font-weight:bold;">ADMIN MASTER</span>
    </div>

    <div class="container">
        <div class="manage-box" style="border-color: var(--green);">
            <h3 style="color: var(--green);"><i class="fas fa-gift"></i> Gift GP to All Users</h3>
            <div class="input-group">
                <label>GP Amount</label>
                <input type="number" id="gift-amount" placeholder="Ex: 5000">
            </div>
            <button class="btn btn-green" onclick="sendGift()">SEND GIFT GP</button>
        </div>

        <div class="manage-box" style="border-color: var(--blue);">
            <h3 style="color: var(--blue);"><i class="fas fa-search"></i> User Profile Search</h3>
            <div class="input-group">
                <input type="text" id="search-uid" placeholder="Enter User ID (Ex: 774900)">
                <button class="btn btn-blue" onclick="searchUser()">LOAD USER DATA</button>
            </div>
            <div id="user-panel" style="display:none; margin-top:15px; border-top:1px solid var(--border); padding-top:15px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="input-group"><label>GP Balance</label><input type="number" id="edit-gp"></div>
                    <div class="input-group"><label>Ads Count</label><input type="number" id="edit-ads"></div>
                </div>
                <button class="btn btn-green" onclick="saveUserChanges()">UPDATE USER</button>
            </div>
        </div>

        <div class="manage-box" style="border-color: var(--yellow);">
            <h3 style="color: var(--yellow);"><i class="fas fa-sliders-h"></i> System Settings</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="input-group"><label>Min Withdraw</label><input type="number" id="conf-min"></div>
                <div class="input-group"><label>GP Rate ($1)</label><input type="number" id="conf-rate"></div>
            </div>
            <button class="btn btn-yellow" onclick="saveConfig()">SAVE CONFIG</button>
        </div>

        <div class="manage-box" style="border-color: var(--red);">
            <h3 style="color: var(--red);"><i class="fas fa-hand-holding-usd"></i> Withdrawal Manager</h3>
            <div id="admin-withdraw-list"></div>
        </div>

        <div class="manage-box" style="border-color: #9c27b0;">
            <h3 style="color: #9c27b0;"><i class="fas fa-envelope"></i> Support Inbox</h3>
            <div id="admin-inbox"></div>
        </div>
    </div>

    <script>
        function sendGift() {
            const amount = parseInt(document.getElementById('gift-amount').value);
            if(!amount || isNaN(amount)) return alert("Invalid Amount!");
            let gp = parseInt(localStorage.getItem('user_gp')) || 0;
            localStorage.setItem('user_gp', gp + amount);
            alert(amount + " GP Gifted Successfully!");
            document.getElementById('gift-amount').value = "";
        }

        function searchUser() {
            const panel = document.getElementById('user-panel');
            panel.style.display = 'block';
            let gp = parseInt(localStorage.getItem('user_gp'));
            document.getElementById('edit-gp').value = isNaN(gp) ? 0 : gp;
            document.getElementById('edit-ads').value = localStorage.getItem('total_ads_watched') || 0;
        }

        function saveUserChanges() {
            localStorage.setItem('user_gp', document.getElementById('edit-gp').value);
            localStorage.setItem('total_ads_watched', document.getElementById('edit-ads').value);
            alert("User data updated!");
        }

        function saveConfig() {
            const config = { 
                min_limit: document.getElementById('conf-min').value || 10000, 
                rate: document.getElementById('conf-rate').value || 10000 
            };
            localStorage.setItem('admin_config', JSON.stringify(config));
            alert("System Config Saved!");
        }

        function loadWithdrawals() {
            const list = document.getElementById('admin-withdraw-list');
            const reqs = JSON.parse(localStorage.getItem('all_withdraw_requests')) || [];
            if(reqs.length === 0) { list.innerHTML = "<p style='font-size:12px; color:#94a3b8;'>No requests found.</p>"; return; }
            list.innerHTML = reqs.reverse().map(r => `
                <div style="background:#050a18; padding:15px; border-radius:12px; border:1px solid #1e2d4d; margin-bottom:10px;">
                    <div style="font-size:11px; color:var(--yellow);">ID: #${r.userId} | ${r.date}</div>
                    <h3 style="margin:5px 0;">${r.amount} GP</h3>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button onclick="handleReq(${r.id}, 'success')" style="flex:1; background:var(--green); border:none; padding:8px; border-radius:8px; color:white;">ACCEPT</button>
                        <button onclick="handleReq(${r.id}, 'rejected')" style="flex:1; background:var(--red); border:none; padding:8px; border-radius:8px; color:white;">REJECT</button>
                    </div>
                </div>
            `).join('');
        }

        function handleReq(id, status) {
            let reqs = JSON.parse(localStorage.getItem('all_withdraw_requests')) || [];
            const idx = reqs.findIndex(r => r.id === id);
            if(idx !== -1) {
                if(status === 'rejected') {
                    let gp = parseInt(localStorage.getItem('user_gp')) || 0;
                    localStorage.setItem('user_gp', gp + reqs[idx].amount);
                }
                reqs[idx].status = status;
                localStorage.setItem('all_withdraw_requests', JSON.stringify(reqs));
                loadWithdrawals();
            }
        }

        function loadInbox() {
            const list = document.getElementById('admin-inbox');
            const msgs = JSON.parse(localStorage.getItem('admin_messages')) || [];
            if(msgs.length === 0) { list.innerHTML = "<p style='font-size:12px; color:#94a3b8;'>No messages.</p>"; return; }
            list.innerHTML = msgs.reverse().map(m => `
                <div style="background:#050a18; padding:15px; border-radius:12px; border:1px solid #1e2d4d; margin-bottom:10px;">
                    <small style="color:var(--green);">${m.userName} (#${m.userId})</small>
                    <p style="margin:8px 0; font-size:13px;">${m.message}</p>
                </div>
            `).join('');
        }

        window.onload = () => {
            const c = JSON.parse(localStorage.getItem('admin_config'));
            if(c) { document.getElementById('conf-min').value = c.min_limit; document.getElementById('conf-rate').value = c.rate; }
            loadWithdrawals(); loadInbox();
        };
    </script>
</body>
</html>
