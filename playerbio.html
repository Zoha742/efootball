<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Bio</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* আপনার অরিজিনাল ডিজাইন হুবহু ১:১ রাখা হয়েছে */
        body { background: #050a18; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; }
        .back-btn { position: absolute; left: 15px; top: 20px; color: #3b82f6; font-size: 24px; cursor: pointer; }
        .bio-container { margin-top: 50px; animation: fadeIn 0.5s; }
        .bio-img { width: 100%; max-width: 280px; border-radius: 20px; border: 3px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .player-name { margin-top: 25px; color: #3b82f6; font-size: 24px; text-transform: uppercase; }
        .bio-text { margin-top: 20px; padding: 0 15px; line-height: 1.7; color: #ccc; font-size: 14px; text-align: justify; }
        .ad-space { margin-top: 40px; background: #121e36; border-radius: 10px; padding: 15px; color: gray; font-size: 11px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <i class="fas fa-arrow-left back-btn" onclick="window.location.href='player.html'"></i>
    
    <div class="bio-container">
        <img id="p-img" class="bio-img" src="" alt="Player Image">
        <h2 id="p-name" class="player-name"></h2>
        <div id="p-bio" class="bio-text"></div>
    </div>

    <div class="ad-space">
        ADVERTISEMENT SPACE
    </div>

    <script>
        // Firebase Configuration (Only for server link)
        const firebaseConfig = {
            apiKey: "AIzaSyAy2nEcb--kbjU7tSIm6lJG5ZpEFSus7sg",
            authDomain: "efootball-57d9b.firebaseapp.com",
            projectId: "efootball-57d9b",
            storageBucket: "efootball-57d9b.firebasestorage.app",
            messagingSenderId: "1031993322489",
            appId: "1:1031993322489:web:0336c8e1869318a8222b28"
        };
        firebase.initializeApp(firebaseConfig);

        window.onload = function() {
            // আপনার অরিজিনাল কমান্ড: localStorage থেকে ডাটা নেওয়া
            const data = localStorage.getItem('selected_player');
            if (data) {
                const p = JSON.parse(data);
                document.getElementById('p-img').src = p.img;
                document.getElementById('p-name').innerText = p.name;
                document.getElementById('p-bio').innerText = p.bio || "No biography available.";
            }
        };
    </script>
</body>
</html>
