<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050a18; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; }
        .back-btn { position: absolute; left: 15px; top: 20px; color: #3b82f6; font-size: 24px; cursor: pointer; }
        .bio-container { margin-top: 50px; animation: fadeIn 0.5s; }
        .bio-img { width: 100%; max-width: 280px; border-radius: 20px; border: 3px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .player-name { margin-top: 25px; color: #3b82f6; font-size: 24px; text-transform: uppercase; }
        .bio-text { margin-top: 20px; padding: 0 15px; line-height: 1.7; color: #ccc; font-size: 14px; text-align: justify; }
        .ad-space { margin-top: 40px; background: #121e36; border-radius: 10px; padding: 15px; color: gray; font-size: 11px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <i class="fas fa-arrow-left back-btn" onclick="window.location.href='player.html'"></i>
    
    <div class="bio-container">
        <img id="p-img" class="bio-img" src="" alt="Player Image">
        <h2 id="p-name" class="player-name"></h2>
        <div id="p-bio" class="bio-text"></div>
    </div>

    <div class="ad-space">
        <p>[BANNER AD AREA - int-42]</p>
    </div>

    <script>
        // LocalStorage থেকে ডাটা রিসিভ করা
        const playerData = JSON.parse(localStorage.getItem('selected_player'));
        
        if (playerData) {
            document.getElementById('p-img').src = playerData.img;
            document.getElementById('p-name').innerText = playerData.name;
            document.getElementById('p-bio').innerText = playerData.bio;
        } else {
            document.body.innerHTML = "<h2>Player data not found!</h2>";
        }
    </script>
</body>
</html>
